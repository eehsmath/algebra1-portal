<!-- Slope Trainer — PP fixes v2.2 (patched) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Slope Trainer</title>
<style>
  :root{
    --bg:#eef3ff; --panel:#ffffff; --ui:#dfe6ff; --ink:#0f2340;
    --blue:#1a60ff; --green:#16a34a; --teal:#36c2a0; --danger:#e5484d
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:ui-rounded,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  .app{max-width:1240px;margin:18px auto;padding:0 12px;display:grid;grid-template-columns:45% 55%;gap:12px}
  @media (max-width:980px){ .app{grid-template-columns:1fr} }
  .card{background:var(--panel);border:1px solid var(--ui);border-radius:16px;box-shadow:0 8px 20px rgba(25,40,80,0.06)}
  .stage{padding:10px}
  .panel{padding:12px}
  .h{font-weight:900;font-size:18px;padding:10px}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .row.spread{justify-content:space-between;margin-bottom:8px}
  .row.left{gap:12px}
  .seg{display:inline-flex;border:1px solid var(--ui);border-radius:12px;overflow:hidden}
  .seg button{border:0;background:#fff;padding:8px 12px;font-weight:900;cursor:pointer}
  .seg button.active{background:#f1f6ff;color:#133a9a}
  .btn{height:44px;border-radius:12px;border:1px solid var(--ui);background:#fff;font-weight:900;padding:0 14px;cursor:pointer}
  .btn.alt{border:0;background:linear-gradient(90deg,#ffd7a3,#ffecc6);color:#081635}
  .btn.warn{border:0;background:linear-gradient(90deg,#ffe6a8,#ffcf70);color:#081635}
  .btn.info{border:0;background:linear-gradient(90deg,#cfe0ff,#9bb9ff);color:#081635}
  .btn.danger{border:0;background:linear-gradient(90deg,#ffd0db,#ffa7b9);color:#081635}
  .btn.primary{border:0;background:linear-gradient(90deg,var(--blue),var(--teal));color:#fff}
  .field{display:grid;grid-template-columns:220px minmax(0,1fr) max-content;gap:8px;align-items:center;margin-bottom:8px}
  .field > *{min-width:0}
  [data-mode="graph"] .field .in{height:64px;font-size:22px}
  [data-mode="eq"] .field .in{font-size:18px}
  .in{border:2px solid var(--ui);border-radius:12px;padding:0 14px;font-weight:900;height:56px;font-size:20px;width:100%}
  .in:disabled{background:#f7f9ff;color:#91a2bf}
  .btnchk{height:44px;padding:0 12px;border-radius:12px;border:0;background:linear-gradient(90deg,var(--blue),var(--teal));color:#fff;font-weight:900;cursor:pointer;min-width:92px;justify-self:end;white-space:nowrap}
  .btnchk:disabled{opacity:.55;cursor:not-allowed;filter:saturate(.6)}
  .btnchk.ok{background:linear-gradient(90deg,#b9f6cf,#7de0a6)}
  .btnchk.bad{background:linear-gradient(90deg,#ffd2d2,#ffb3b3)}
  .radio{display:flex;gap:12px;flex-wrap:wrap}
  .radio label{display:flex;align-items:center;gap:6px;font-weight:800}
  .stat{border:1px solid var(--ui);border-radius:12px;padding:10px}
  .pill{display:inline-block;padding:6px 12px;border-radius:999px;border:1px solid var(--ui);background:#fff;font-weight:900;margin:3px 6px 0 0}
  .ok{background:#eafff2;border-color:#bfeacc;color:#0b6b2f}
  .bad{background:#fff3f3;border-color:#ffd4d4;color:#a33232}
  .hint{background:#fff9d6;border-color:#ffe38a;color:#7a5a00}
  .pillA{background:#e8f0ff;border-color:#c8d9ff;color:var(--blue)}
  .pillB{background:#e7f8ec;border-color:#c4ebd2;color:var(--green)}
  .pillClick{cursor:pointer;user-select:none}
  #canvas{width:100%;aspect-ratio:1;background:#fff;border:1px solid #e7edff;border-radius:12px;display:block}
  #given{display:none}
  .givenBig{font-size:28px;font-weight:900}
  .givenBig .pill{font-size:26px}
  .equationBig{font-size:30px;font-weight:900}
  .twrap{display:flex;justify-content:center}
  table.tbl{table-layout:fixed;width:min(480px,92%);margin:6px auto;border-collapse:separate;border-spacing:0 6px}
  .tbl th,.tbl td{padding:10px 12px;text-align:center;font-weight:900;border:1px dashed #e6ecff;background:#fbfdff;font-size:22px}
  .tbl th{background:#eff4ff}
  .modal{position:fixed;inset:0;background:rgba(15,23,42,0.45);display:none;z-index:30;align-items:flex-start;justify-content:center;overflow:auto}
  .modal.show{display:flex}
  .modalCard{margin:40px 12px;max-width:1000px;width:min(1000px,95vw);background:#fff;border:1px solid var(--ui);border-radius:24px;box-shadow:0 40px 80px rgba(2,6,23,0.25)}
  .modalHead{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px dashed #e5e7eb}
  .modalBody{padding:18px}
  .statCard{border:2px solid #edf2ff;background:#ffffff;border-radius:16px;padding:16px}
  .grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
  .grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:12px}
  .history{display:flex;flex-wrap:wrap;gap:8px}
  .kbd{position:sticky;bottom:6px;display:none;flex-wrap:wrap;gap:6px;padding:8px;border:1px solid var(--ui);background:#fff;border-radius:14px;box-shadow:0 8px 20px rgba(25,40,80,0.06);z-index:5}
  .kbd.show{display:flex}
  .kbd button{min-width:40px;height:40px;border:1px solid var(--ui);border-radius:10px;background:#f6f9ff;font-weight:900;cursor:pointer}
  .kbd .wide{min-width:86px}



/* === Chromebook & Mobile Safety Overrides (SlopeAPP) === */

/* Fit inside Google Sites iframes; allow scroll on short screens */
html, body { height:auto; min-height:100dvh; }
body { overflow:auto; }
.app { width:min(1240px, 100%); }

/* Keep columns usable on short displays (Chromebooks, split view, landscape phones) */
@media (max-height: 820px){
  .app { grid-template-columns: 1fr; }         /* stack graph/panel to avoid clipping */
  .stage, .panel { margin: 8px 0; }
}

/* Make the field row collapse gracefully on phones so buttons never run off-screen */
@media (max-width: 760px){
  .field { grid-template-columns: 1fr; }
  .btnchk { justify-self: stretch; }           /* full-width Check buttons on narrow screens */
  .seg { flex-wrap: wrap; }
}

/* Tame big typography so headers don’t push controls off-screen */
.givenBig      { font-size: clamp(18px, 3.2vw, 28px); }
.givenBig .pill{ font-size: clamp(16px, 3vw, 26px); }
.equationBig   { font-size: clamp(20px, 3.6vw, 30px); }
.tbl th, .tbl td { font-size: clamp(16px, 2.4vw, 22px); }

/* Canvas sizing: keep it visible on short screens while staying responsive */
#canvas {
  width: 100%;
  aspect-ratio: 4 / 3;                          /* a bit wider than tall for easier reading */
  max-height: min(72dvh, 780px);                /* never exceed viewport height */
  display: block;
}

/* On very narrow phones, tighten keypad a bit */
@media (max-width: 420px){
  .kbd { padding: 6px; }
  .kbd button { min-width: 36px; height: 36px; }
  .kbd .wide { min-width: 72px; }
}

/* Modal safety: never overflow the viewport */
.modalCard { max-height: 92dvh; }
.modalBody { max-height: calc(92dvh - 110px); overflow-y: auto; }

<body data-mode="graph">
  <div class="app">
    <div class="card stage">
      <div class="h">📐 Slope Trainer</div>
      <canvas id="canvas"></canvas>
    </div>

    <div class="card panel">
      <div class="row spread">
        <div class="row left">
          <div class="seg" id="tabs">
            <button data-tab="pts">2 Points</button>
            <button data-tab="graph" class="active">Graph</button>
            <button data-tab="tbl">Table</button>
            <button data-tab="eq">Equation</button>
            <button data-tab="pp">Parallel ⟂ Perp</button>
          </div>

      <div id="inputs"></div>

        <button id="btnCheckAll" class="btn primary">Check all</button>
      </div>

      <div id="kb" class="kbd" aria-label="On-screen keyboard"></div>

      <div class="stat" style="margin-top:10px">
        <div class="row" style="justify-content:space-between">
          <div><b>Feedback</b></div>
          <div>Correct: <span id="stCorrect">0</span> · Attempts: <span id="stAttempts">0</span> · Streak: <span id="stStreak">0</span></div>

      </div>

  <!-- Summary Modal -->
  <div id="modal" class="modal" aria-hidden="true">

      <div class="modalHead">
        <div>
          <div style="font-size:28px;font-weight:900">Session Summary</div>

        </div>

        </div>

        <div class="grid4">
          <div class="statCard"><div style="font-size:12px;font-weight:900;color:#64748b">Correct</div><div id="mCorr" style="font-size:26px;font-weight:900">0</div></div>
          <div class="statCard"><div style="font-size:12px;font-weight:900;color:#64748b">Attempts</div><div id="mAtt" style="font-size:26px;font-weight:900">0</div></div>
          <div class="statCard"><div style="font-size:12px;font-weight:900;color:#64748b">Accuracy</div><div id="mAcc" style="font-size:26px;font-weight:900">0%</div></div>
          <div class="statCard"><div style="font-size:12px;font-weight:900;color:#64748b">Longest streak</div><div id="mStr" style="font-size:26px;font-weight:900">0</div></div>
        </div>
        <div class="grid3">
          <div class="statCard"><div style="font-size:12px;font-weight:900;color:#64748b">2 Points</div><div id="mPts" style="font-size:22px;font-weight:900">0 / 0</div></div>
          <div class="statCard"><div style="font-size:12px;font-weight:900;color:#64748b">Graph</div><div id="mGraph" style="font-size:22px;font-weight:900">0 / 0</div></div>
          <div class="statCard"><div style="font-size:12px;font-weight:900;color:#64748b">Table · Equation · P∥⊥</div><div id="mOther" style="font-size:22px;font-weight:900">0 / 0</div></div>
        </div>
        <div style="margin-top:14px">
          <div style="font-size:12px;color:#64748b;font-weight:900;margin-bottom:6px">Recent checks</div>

<script>
/* ====== Helpers ====== */
const $ = s => document.querySelector(s);

function ensurePPGraphVisible() {
  // create containers if they don't exist
  state.lines = state.lines || {};
  state.lines.A = state.lines.A || {};
  state.lines.B = state.lines.B || {};

  state.lines.A.visible = true;
  state.lines.B.visible = true;

  // keep the A/B pills visually in sync
  const aBtn = document.querySelector('#btnLineA');
  const bBtn = document.querySelector('#btnLineB');
  if (aBtn) aBtn.classList.toggle('active', state.lines.A.visible);
  if (bBtn) bBtn.classList.toggle('active', state.lines.B.visible);
}


/* ====== Global State ====== */
let mode='graph', level='int', showHint=false;
let prob=null, probPP=null;
const st={attempts:0,correct:0,streak:0,longest:0};
const per={pts:{a:0,c:0}, graph:{a:0,c:0}, tbl:{a:0,c:0}, eq:{a:0,c:0}, pp:{a:0,c:0}};
const credit={}, resolved={}, history=[], chips={};
let highlightP=false, highlightQ=false;
let ppType='random';
let ppShowA = false, ppShowB = false;


/* ====== Header & Controls ====== */
function bindHeader(){
  const tabs=$('#tabs');
  tabs.addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    Array.from(tabs.children).forEach(x=>x.classList.toggle('active',x===b));
    mode=b.dataset.tab; document.body.setAttribute('data-mode',mode);
    showHint=(mode==='graph');
    $('#btnHint').style.display=(mode==='graph')?'none':'inline-block';
    $('#btnHint').textContent=(showHint?'Hide Graph':'Show Graph');
    buildProblem();
  });

  const diff=$('#difficulty');
  diff.addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    Array.from(diff.children).forEach(x=>x.classList.toggle('active',x===b));
    level=b.dataset.d; buildProblem();
  });

  $('#btnNew').onclick=()=>buildProblem();
  $('#btnReset').onclick=()=>{ Object.assign(st,{attempts:0,correct:0,streak:0,longest:0}); for(const k in per) per[k]={a:0,c:0}; setStats(); buildProblem(); };
  $('#btnReveal').onclick=()=>renderAnswers(true);
  $('#btnCheckAll').onclick=()=>checkAll();
  $('#btnSummary').onclick=()=>openSummary();
  $('#modalClose').onclick=()=>$('#modal').classList.remove('show');
  $('#modal').addEventListener('click',e=>{ if(e.target && e.target.id==='modal') $('#modal').classList.remove('show'); });
  $('#btnHint').onclick=()=>{ if(mode==='graph') return; showHint=!showHint; $('#btnHint').textContent = showHint?'Hide Graph':'Show Graph'; draw(); };
}

/* ====== Keyboard ====== */
let activeInput=null; const kb=$('#kb');
function insertTok(t){
  if(!activeInput) return;
  const el=activeInput;
  if(t==='undefined'){ el.value='undefined'; }
  else if(t==='\b'){ const s=el.selectionStart,e=el.selectionEnd; if(s>0){ el.value=el.value.slice(0,s-1)+el.value.slice(e); el.setSelectionRange(s-1,s-1);} }
  else{ const s=el.selectionStart,e=el.selectionEnd; el.value=el.value.slice(0,s)+t+el.value.slice(e); el.setSelectionRange(s+t.length,s+t.length); }
  el.dispatchEvent(new Event('input',{bubbles:true})); el.focus();
}
function buildKB(type){
  kb.innerHTML='';
  const add=(t,v=t,cls='')=>{ const b=document.createElement('button'); b.textContent=t; if(cls) b.className=cls; b.onclick=()=>insertTok(v); kb.appendChild(b); };
  const digits=()=>{ for(let i=0;i<=9;i++) add(String(i)); };
  const common=()=>{ 
    add('←','\b'); 
    add('Clear','', 'wide kb-clear'); 
    const clearBtn = kb.querySelector('button.kb-clear');
    if(clearBtn){ clearBtn.onclick=function(){ if(activeInput){ activeInput.value=''; activeInput.dispatchEvent(new Event('input',{bubbles:true})); activeInput.focus(); } }; }
  };
  if(type==='slope'){ add('-'); add('/'); add('.'); digits(); add('undefined','undefined','wide'); common(); }
  else if(type==='point'){ add('('); add(')'); add(','); add('-'); add('.'); digits(); common(); }
  else if(type==='equ'){ add('y=','y=','wide'); add('x=','x=','wide'); add('+'); add('-'); add('/'); add('='); add('('); add(')'); add('x'); add('y'); add('.'); digits(); common(); }
  else { digits(); add('-'); add('.'); common(); }
}
function hookKB(inp,type){ 
  inp.addEventListener('focus',()=>{ activeInput=inp; buildKB(type||'slope'); kb.classList.add('show'); }); 
  inp.addEventListener('blur',()=>{ setTimeout(()=>{ const ae=document.activeElement; const onInput = ae && ae.classList && ae.classList.contains('in'); const onKB = kb.contains(ae); if(!onInput && !onKB){ kb.classList.remove('show'); activeInput=null; } },150); });
}

/* ====== Feedback / Stats ====== */
function setStats(){ $('#stAttempts').textContent=st.attempts; $('#stCorrect').textContent=st.correct; $('#stStreak').textContent=st.streak; }
function pill(text, cls){ const s=document.createElement('span'); s.className='pill '+(cls||''); s.textContent=text; return s; }
function setChip(label, ok){ const key=label.toLowerCase(); let chip=chips[key]; if(!chip){ chip=pill('', ''); chips[key]=chip; $('#feedback').appendChild(chip); } chip.className='pill '+(ok?'ok':'bad'); chip.textContent=label+': '+(ok?'Correct':'Incorrect'); }
function mark(btn, ok){ btn.classList.remove('ok','bad'); btn.classList.add(ok?'ok':'bad'); btn.textContent= ok ? '✓' : '✗'; }
function finalize(btn, ok, label, creditKey){
  setChip(label, ok); history.push({label,ok}); if(history.length>10) history.shift();
  if(!resolved[creditKey||label]){
    st.attempts++; per[mode].a++;
    if(ok && !credit[creditKey||label]){ st.correct++; per[mode].c++; credit[creditKey||label]=true; st.streak++; } else if(ok){ st.streak++; } else { st.streak=0; }
    st.longest=Math.max(st.longest,st.streak); setStats();
  }
  resolved[creditKey||label]=true;
  btn.disabled=true; mark(btn,ok);
}

/* ====== Math / Parsing ====== */
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ const t=b; b=a%b; a=t; } return a||1; }
function nearly(a,b,eps= level==='int'? 1e-2 : 1e-1){ return Math.abs(a-b)<=eps; }
function toFraction(m){ for(let d=1; d<=8; d++){ const n=Math.round(m*d); if(Math.abs(n/d - m) < 1e-6){ const g=gcd(n,d); return {num:n/g, den:d/g}; } } return {num:m, den:1}; }
function tidy(n){ if(n===null || !isFinite(n)) return n; if(level==='int') return Math.round(n); return Number(n.toFixed(2)); }
function fmt(n){ if(n===null) return '—'; if(typeof n!=='number' || !isFinite(n)) return String(n); const val=tidy(n); if(Number.isInteger(val)) return String(val); return String(val).replace(/(\.\d*?[1-9])0+$/,'$1').replace(/\.0$/,''); }
// Pretty-print y=mx+b with no "0x", no "+ 0", and ±1x simplified

function fmtMxB(m, b) {
  if (m === null) return 'x = ' + fmt(b);
  const mNum = (typeof m === 'number') ? m : Number(m);
  const bNum = (typeof b === 'number') ? b : Number(b);
  const EPS  = 1e-9;

  // If the slope is (near) zero, print a horizontal line with no "0x"
  if (!isFinite(mNum) || Math.abs(mNum) < EPS) {
    return 'y = ' + fmt(bNum || 0);
  }

  // Simplify ±1x
  let mStr = fmt(mNum);
  if (Math.abs(mNum - 1) < EPS)  mStr = '';
  if (Math.abs(mNum + 1) < EPS)  mStr = '-';

  // Intercept string (omit +0 / -0 completely)
  let bStr = '';
  if (isFinite(bNum) && Math.abs(bNum) >= EPS) {
    bStr = (bNum > 0) ? (' + ' + fmt(bNum)) : (' - ' + fmt(Math.abs(bNum)));
  }

  return 'y = ' + mStr + 'x' + bStr;
}

function canonEq(text){
  const p = parseEquation(text);
  if(!p) return text;                         // unknown form → leave as-is
  if(p.type === 'vertical') return 'x = ' + fmt(p.x);
  return fmtMxB(p.m, p.b);                    // ALWAYS removes 0x, +0, and simplifies ±1x
}


function parseFrac(s){ const t=String(s||'').trim(); const f=t.match(/^([+-]?\d+)\s*\/\s*([+-]?\d+)$/); if(f){ let num=+f[1], den=+f[2]; if(den===0) return {undef:true}; if(den<0){ num*=-1; den*=-1; } const g=gcd(num,den); return {v:num/den,num:num/g,den:den/g,raw:true}; } if(/^(undef|undefined|no\s*slope|vertical|∞|inf)$/i.test(t)) return {undef:true}; const v=Number(t); if(!Number.isNaN(v)) return {v}; return null; }
function parseFracMaybe(s){ const r=parseFrac(String(s||'').trim()); return r && (r.undef || typeof r.v==='number'); }
function isPointText(v){ return /^\(\s*[-+]?\d+(?:\.\d+)?\s*,\s*[-+]?\d+(?:\.\d+)?\s*\)$/.test(String(v||'')); }
function parsePoint(v){ const m=String(v||'').trim().match(/^\(\s*([-+]?\d+(?:\.\d+)?)\s*,\s*([-+]?\d+(?:\.\d+)?)\s*\)$/); return m?{x:+m[1],y:+m[2]}:null; }
function pointOK(text,target){ const p=parsePoint(text); return !!p && nearly(p.x,target.x) && nearly(p.y,target.y); }
function classOf(m){ if(m===null) return 'undefined'; if(nearly(m,0)) return 'zero'; return m>0?'positive':'negative'; }
function parseNumberOrFrac(s){ const r=parseFrac(s); if(!r) return null; if(r.undef) return {undef:true}; return {v:r.v}; }
function simplifyFrac(m){ if(m===null) return 'undefined'; for(let d=1; d<=9; d++){ const n=Math.round(m*d); if(Math.abs(n/d - m) < 1e-6){ const g=gcd(n,d); const N=n/g,D=d/g; return D===1? String(N): N+'/'+D; } } return String(Number(m.toFixed(4))); }
function parseEquation(s){
  const t=String(s||'').replace(/\s+/g,'').toLowerCase().replace(/[{}]/g,'').replace(/\u221e/gi,'inf');
  if(!t) return null;
  let m=t.match(/^x=([-+]?[\d.]+(?:\/[-+]?\d+)?)$/);
  if(m){ const n=parseNumberOrFrac(m[1]); if(!n||n.undef) return null; return {type:'vertical', x:n.v}; }
  m=t.match(/^y=(.+)$/);
  if(m){
    const expr=m[1].replace(/[()]/g,'');
    const parts = expr.replace(/-/g,'+-').split('+').filter(Boolean);
    let mcoef=0, b=0, seenX=false;
    for(let part of parts){
      if(part.includes('x')){
        seenX=true;
        const c=part.replace('x','');
        if(c===''||c==='+') mcoef+=1;
        else if(c==='-') mcoef+=-1;
        else { const n=parseNumberOrFrac(c); if(!n||n.undef) return null; mcoef+=n.v; }
      } else {
        const n=parseNumberOrFrac(part); if(!n||n.undef) return null; b+=n.v;
      }
    }
    if(!seenX){ return {type:'line', m:0, b:b}; }
    return {type:'line', m:mcoef, b:b};
  }
  m=t.match(/^([+-]?\d+)x([+-]\d+)y=([+-]?\d+)$/);
  if(m){
    const A=+m[1], B=+m[2], C=+m[3]; if(B===0) return null;
    return {type:'line', m:-A/B, b:C/B};
  }
  return null;
}
function equationMatchesTo(mb, user){
  const p=parseEquation(user); if(!p) return false;
  if(mb.type==='vertical') return p.type==='vertical' && nearly(p.x,mb.x);
  if(p.type==='vertical') return false;
  return nearly(p.m, mb.m) && nearly(p.b, mb.b);
}
function equationMatches(user, truth, expectM){
  const p=parseEquation(user); if(!p) return false;
  if(truth.type==='vertical'){ return p.type==='vertical' && nearly(p.x, truth.x); }
  if(p.type==='vertical') return false;
  return nearly(p.m, expectM) && nearly(p.b, truth.b);
}
function slopeOK(input, mTrue){
  const r=parseFrac(input);
  if(!r) return false;
  if(mTrue===null) return !!r.undef;
  if(r.undef) return false;

/* ====== Random Generators ====== */
function rpick(a){ return a[Math.floor(Math.random()*a.length)]; }
function rint(a,b){ return Math.floor(a+Math.random()*(b-a+1)); }
function randRiseRun(){ const rise=rint(1,5), run=rint(1,5); const g=gcd(rise,run); const rr={rise:rise/g, run:run/g}; if(Math.random()<0.5) rr.rise*=-1; return rr; }

function genLine(){
  if(level==='int'){
    const special=Math.random()<0.2? rpick(['zero','undef']):null;
    if(special==='zero') return {m:0,b:rint(-7,7)};
    if(special==='undef') return {m:null,x0:rint(-7,7)};
    const {rise,run}=randRiseRun(); const b=rint(-6,6); return {m:rise/run,b};
  }else{
    if(Math.random()<0.15) return {m:null,x0:rint(-7,7)};
    const m=tidy(Math.random()*4-2); const b=tidy(Math.random()*6-3);
    return {m,b};
  }
}
function genTwoPoints(){
  if(level==='int'){
    if(Math.random()<0.15){ const x=rint(-6,6), y1=rint(-6,2), y2=y1+rpick([2,3,4,5,6]); return {p1:[x,y1], p2:[x,y2], m:null}; }
    const {rise,run}=randRiseRun(); const dir=Math.random()<0.5?-1:1;
    let x1=rint(-8,8-dir*run), y1=rint(-8,8-dir*rise);
    const x2=x1+dir*run, y2=y1+dir*rise;
    return {p1:[x1,y1], p2:[x2,y2], m:rise/run};
  }else{
    if(Math.random()<0.15){ const x=tidy(Math.random()*8-4); const y1=tidy(Math.random()*8-4); const y2=tidy(y1+(Math.random()*4+1)); return {p1:[x,y1],p2:[x,y2],m:null}; }
    const m=tidy(Math.random()*4-2);
    const x1=tidy(Math.random()*6-3), y1=tidy(Math.random()*6-3);
    const dx=tidy(Math.random()*3+1);
    const p1=[x1,y1], p2=[tidy(x1+dx), tidy(y1+m*dx)];
    return {p1,p2,m};
  }
}
function genTable(){
  if(level==='int'){
    const {rise,run}=randRiseRun();
    const x0=rint(-6,6), y0=rint(-6,6);
    const ks=[-1,0,1,2];
    const rows=ks.map(k=>[x0 + k*run, y0 + k*rise]);
    return {rows, m:rise/run};
  }else{
    const rr=randRiseRun(); const m=rr.rise/rr.run;
    const x0=tidy(Math.random()*6-3);
    const y0=tidy(Math.random()*6-3);
    const step=rr.run/2;
    const ks=[-1,0,1,2];
    const xs=ks.map(k=>tidy(x0 + k*step));
    const ys=xs.map(x=>tidy(y0 + m*(x - x0)));
    return {rows:xs.map((x,i)=>[x,ys[i]]), m};
  }
}
function genEquation(){
  const roll=Math.random();
  if(roll<0.15){ const c= level==='int'? rint(-7,7) : tidy(Math.random()*8-4); return {form:'vertical',text:'x = '+fmt(c), m:null, x0:c}; }
  if(roll<0.30){ const c= level==='int'? rint(-7,7) : tidy(Math.random()*8-4); return {form:'horizontal',text:'y = ' + fmt(c), m:0, b:c}; }
  if(roll<0.85){ let m,b; if(level==='int'){ const rr=randRiseRun(); m=rr.rise/rr.run; b=rint(-6,6);} else { const rr=randRiseRun(); m=rr.rise/rr.run; b=tidy(Math.random()*6-3); }
    return {form:'slopeint', text: fmtMxB(m,b), m, b}; }
  if(roll<0.95){ let A=rpick([-5,-4,-3,-2,-1,1,2,3,4,5]), B=rpick([-5,-4,-3,-2,-1,1,2,3,4,5]); if(B===0) B=1; let C=rint(-10,10); const g=gcd(gcd(A,B),C); A/=g; B/=g; C/=g; return {form:'standard', text:(A===1?'':(A===-1?'-':A))+ 'x ' + (B>=0?'+':'-')+' '+Math.abs(B)+'y = '+C, m: -A/B, b: C/B}; }
  const rr=randRiseRun(); const m=rr.rise/rr.run; const x1=rint(-6,6), y1=rint(-6,6); return {form:'pointslope', text:'y - ('+y1+') = '+(Math.abs(m)===1? (m<0?'-':'') : (m))+'(x - ('+x1+'))', m, b: y1 - m*x1};
}

/* ====== PP helpers (robust) ====== */
function slopeOf(line){
  if (line == null) return null;
  if (line.m === null) return null;
  if (typeof line.m === 'number' && isFinite(line.m)) return line.m;

  if (line.p1 && line.p2) {
    const [x1,y1]=line.p1, [x2,y2]=line.p2;
    return (x1===x2) ? null : (y2 - y1) / (x2 - x1);
  }
  if (line.rows && line.rows.length >= 2) {
    const a=line.rows[0], b=line.rows[line.rows.length-1];
    return (a[0]===b[0]) ? null : (b[1]-a[1])/(b[0]-a[0]);
  }
  if (line.text) {
    const p = parseEquation(line.text);
    if (!p) return null;
    return p.type === 'vertical' ? null : p.m;
  }
  return null;
}
function interceptOf(line){
  const m = slopeOf(line);
  if (m === null) {
    const x = (line && (line.x0 != null ? line.x0
              : (line.p1 ? line.p1[0]
              : (line.rows ? line.rows[0][0]
              : (line.text ? ((parseEquation(line.text)||{}).x) : 0))))) ;
    return { type:'vertical', x };
  }
  if (typeof line.b === 'number' && isFinite(line.b)) return { type:'line', b: line.b };
  if (line.p1) { const [x,y]=line.p1; return { type:'line', b: y - m*x }; }
  if (line.rows && line.rows.length) { const [x,y]=line.rows[0]; return { type:'line', b: y - m*x }; }
  if (line.text) {
    const p = parseEquation(line.text);
    if (p && p.type !== 'vertical') return { type:'line', b: p.b };
  }
  return { type:'line', b: 0 };
}
function makeLineFromMB(m, b, kind){
  if(m===null){
    const x0=(typeof b==='number')?b:rint(-7,7);
    if(kind==='pts'){ const y1=rint(-6,3), y2=y1+rpick([2,3,4,5]); return {kind, m:null, x0, p1:[x0,y1], p2:[x0,y2]}; }
    if(kind==='tbl'){ const y0=(typeof b==='number')?b:rint(-6,6); const rows=[[x0,y0],[x0,y0+2],[x0,y0+4],[x0,y0+6]]; return {kind, m:null, x0, rows}; }
    if(kind==='eq'){ return {kind, m:null, x0, text:'x = '+fmt(x0)}; }
    return {kind:'graph', m:null, x0};
  }else{
    if(kind==='pts'){
      const fr=toFraction(m);
      const run=Math.abs(fr.den), rise=(m>=0?1:-1)*Math.abs(fr.num);
      let x1;
      if(level==='int'){ const k=rint(-8,8-run); x1 = Math.round(k/run)*run; }
      else { x1=tidy(Math.random()*6-3); }
      let y1 = (typeof b==='number' ? (m*x1 + b) : rint(-8,8-Math.abs(rise)));
      if(level!=='int') y1=tidy(y1);
      const x2=x1+run, y2= (level==='int') ? y1+rise : tidy(y1+rise);
      return {kind, m, b:(typeof b==='number')?b: (level==='int'? rint(-6,6): tidy(Math.random()*6-3)), p1:[x1,y1], p2:[x2,y2]};
    }
    

if (kind === 'tbl') {
  const fr = toFraction(m);               // m = num/den
  const step = fr.den;                    // Δx
  const dy   = fr.num;                    // Δy
  const x0   = rint(-6, 6);

  // pick/derive intercept, then anchor the first row ON the line:
  const B = (typeof b === 'number')
              ? b
              : (level === 'int' ? rint(-6, 6) : tidy(Math.random()*6 - 3));
  const y0  = (level === 'int') ? (m * x0 + B) : tidy(m * x0 + B);

  const ks   = [-1, 0, 1, 2];
  const rows = ks.map(k => [
    x0 + k * step,
    (level === 'int') ? (y0 + k * dy) : tidy(y0 + k * dy)
  ]);

  return { kind, m, b: B, rows };
}



    if(kind==='eq'){
      if (m === null) {
        const x0 = (typeof b === 'number') ? b : rint(-7,7);
        return { kind, m:null, x0, text: 'x = ' + fmt(x0) };
      }
      const B = (typeof b === 'number') ? b : (level === 'int' ? rint(-6,6) : tidy(Math.random()*6-3));
      return { kind, m, b:B, text: fmtMxB(m, B) };
    }
    return {kind:'graph', m, b:(typeof b==='number')?b: (level==='int'? rint(-6,6): tidy(Math.random()*6-3))};
  }
}
function makeMB_throughPoint(slope, Pt){
  if(slope===null) return {type:'vertical', x:Pt.x};
  if(nearly(slope,0)) return {type:'line', m:0, b:Pt.y};
  return {type:'line', m:slope, b: Pt.y - slope*Pt.x};
}
function genPP(){
  const map={random:null, graph:['graph','graph'], pts:['pts','pts'], tbl:['tbl','tbl'], eq:['eq','eq'],
    'graph+pts':['graph','pts'], 'graph+tbl':['graph','tbl'], 'graph+eq':['graph','eq'],
    'pts+tbl':['pts','tbl'], 'pts+eq':['pts','eq'], 'tbl+eq':['tbl','eq']};
  let pair = map[ppType] || null;
  if(!pair){
    const allPairs=[['graph','graph'],['pts','pts'],['tbl','tbl'],['eq','eq'],
      ['graph','pts'],['graph','tbl'],['graph','eq'],['pts','tbl'],['pts','eq'],['tbl','eq']];
    pair = rpick(allPairs);
  }
  const [kindA, kindB] = pair;

  let A;
  if(kindA==='graph'){ const L=genLine(); A = (L.m===null)? {kind:'graph',m:null,x0:L.x0} : {kind:'graph',m:L.m,b:L.b}; }
  if(kindA==='pts'){ const P=genTwoPoints(); A = P.m===null ? {kind:'pts',m:null,p1:P.p1,p2:P.p2} : {kind:'pts',m:P.m,p1:P.p1,p2:P.p2}; }
  if(kindA==='tbl'){ const T=genTable(); A = {kind:'tbl',m:T.m,rows:T.rows}; if(!Number.isFinite(A.m)) A.m=null; }
  if(kindA==='eq'){ const E=genEquation(); A = {kind:'eq',m:E.m==null?null:E.m,b:E.b,x0:E.x0,text:E.text}; }

  const mA=slopeOf(A); const bAinfo=interceptOf(A); const bA=(bAinfo.type==='line')?bAinfo.b:null;
  const rRoll=Math.random(); let target='parallel';
  if(rRoll<0.4) target='parallel'; else if(rRoll<0.75) target='perpendicular'; else target='neither';

  let mB=null;
  if(target==='parallel'){ mB = (mA===null)? null : mA; }
  else if(target==='perpendicular'){ if(mA===null) mB=0; else if(nearly(mA,0)) mB=null; else mB = -1/mA; }
  else{
    if(mA===null){ mB = rpick([0, 1, -2, 1/2, -3/2]); }
    else {
      const candidates=[-2,-1.5,-1,-0.5,0,0.5,1,1.5,2,3/4,2/3,3/2].filter(t=>!nearly(t,mA) && !(Math.abs(mA*t+1)<1e-6));
      mB = rpick(candidates);
    }
  }

  let bB=null;
  if(mB===null){
    const x0=rint(-7,7);
    return {A, B:{kind:kindB, ...makeLineFromMB(null,x0,kindB)}, target, Ppara:[rint(-5,5), rint(-5,5)], Pperp:[rint(-5,5), rint(-5,5)]};
  }else{
    bB = (level==='int')? rint(-6,6) : tidy(Math.random()*6-3);
    if(target==='parallel' && bAinfo.type==='line' && nearly(bB,bA)) bB += (bB===6?-1:1);
    return {A, B: makeLineFromMB(mB,bB,kindB), target, Ppara:[rint(-5,5), rint(-5,5)], Pperp:[rint(-5,5), rint(-5,5)]};
  }
}

function vertOrB_single(){

    boxY(vertOrB_single(),'yi_pts');
    box.appendChild(fieldRow('equation of line','eq_pts','y=mx+b  or  Ax+By=C  or  x= / y=',v=>!!parseEquation(v),v=>equationMatches(v, vertOrB_single(), prob.m),'equ'));
    box.appendChild(radioRow('classification','cls_pts',['positive','negative','zero','undefined'], val=>val===classOf(prob.m)));
    return;
  }
  if(mode==='graph'){
    box.appendChild(fieldRow('slope (m)','m_graph','e.g. -2, 1/3, undefined',v=>!!parseFracMaybe(v),v=>slopeOK(v,prob.m),'slope'));
    boxY(vertOrB_single(),'yi_graph');
    box.appendChild(fieldRow('equation of line','eq_graph','y=mx+b  or  Ax+By=C  or  x= / y=',v=>!!parseEquation(v),v=>equationMatches(v, vertOrB_single(), prob.m),'equ'));
    box.appendChild(radioRow('classification','cls_graph',['positive','negative','zero','undefined'], val=>val===classOf(prob.m)));
    return;
  }
  if(mode==='tbl'){
    G.style.display='block';
    const T=document.createElement('div'); T.className='twrap';
    T.innerHTML='<table class="tbl"><thead><tr><th>x</th><th>y</th></tr></thead><tbody>'+
      prob.rows.map(r=>'<tr><td>'+fmt(r[0])+'</td><td>'+fmt(r[1])+'</td></tr>').join('')+
    '</tbody></table>';
    G.appendChild(T);
    box.appendChild(fieldRow('slope (m)','m_tbl','e.g. 2, -3/4',v=>!!parseFracMaybe(v),v=>slopeOK(v,prob.m),'slope'));
    boxY(vertOrB_single(),'yi_tbl');
    box.appendChild(fieldRow('equation of line','eq_tbl','y=mx+b  or  Ax+By=C  or  x= / y=',v=>!!parseEquation(v),v=>equationMatches(v, vertOrB_single(), prob.m),'equ'));
    box.appendChild(radioRow('classification','cls_tbl',['positive','negative','zero','undefined'], val=>val===classOf(prob.m)));
    return;
  }
  if(mode==='eq'){
    G.style.display='block'; G.classList.add('equationBig');
    G.innerHTML='<b>Equation:</b> <span class="pill hint" style="font-size:28px">'+canonEq(prob.text)+'</span>';
    box.appendChild(fieldRow('slope (m)','m_eq','e.g. -A/B, 0, undefined',v=>!!parseFracMaybe(v),v=>slopeOK(v,prob.m),'slope'));
    boxY(vertOrB_single(),'yi_eq');
    box.appendChild(radioRow('classification','cls_eq',['positive','negative','zero','undefined'], val=>val===classOf(prob.m)));
  }
}

/* ====== Check-All & Answers ====== */
function getVal(id){ const el=$('#'+id); if(!el) return ''; if(el.type==='radio') return (document.querySelector('input[name="'+id+'"]:checked')||{}).value||''; return el.value; }
function checkField(id,checker,btn,label){
  const ok=checker(getVal(id));
  finalize(btn, ok, label, id);
  resolved[id]=true;
}
function requiredIds(){
  const ids=[];
  if(mode==='pts'){ ids.push('m_pts','cls_pts','eq_pts','yi_pts'); }
  if(mode==='graph'){ ids.push('m_graph','cls_graph','eq_graph','yi_graph'); }
  if(mode==='tbl'){ ids.push('m_tbl','cls_tbl','eq_tbl','yi_tbl'); }
  if(mode==='eq'){ ids.push('m_eq','cls_eq','yi_eq'); }
  if(mode==='pp'){ ids.push('mA','mB','rel_pp','eq_para','eq_perp'); }
  return ids;
}
function checkAll(){
  const ops=[]; let vb;
  if(mode==='pts'){ vb=vertOrB_single();
    ops.push(['m_pts','slope (m)', v=>slopeOK(v,prob.m)]);
    ops.push(['yi_pts','y-intercept', v=>vb.type==='vertical'? true : pointOK(v,{x:0,y:vb.b})]);
    ops.push(['eq_pts','equation of line', v=>equationMatches(v,vb,prob.m)]);
    ops.push(['cls_pts','classification', v=>v===classOf(prob.m), true]);
  }
  if(mode==='graph'){ vb=vertOrB_single();
    ops.push(['m_graph','slope (m)', v=>slopeOK(v,prob.m)]);
    ops.push(['yi_graph','y-intercept', v=>vb.type==='vertical'? true : pointOK(v,{x:0,y:vb.b})]);
    ops.push(['eq_graph','equation of line', v=>equationMatches(v,vb,prob.m)]);
    ops.push(['cls_graph','classification', v=>v===classOf(prob.m), true]);
  }
  if(mode==='tbl'){ vb=vertOrB_single();
    ops.push(['m_tbl','slope (m)', v=>slopeOK(v,prob.m)]);
    ops.push(['yi_tbl','y-intercept', v=>vb.type==='vertical'? true : pointOK(v,{x:0,y:vb.b})]);
    ops.push(['eq_tbl','equation of line', v=>equationMatches(v,vb,prob.m)]);
    ops.push(['cls_tbl','classification', v=>v===classOf(prob.m), true]);
  }
  if(mode==='eq'){ vb=vertOrB_single();
    ops.push(['m_eq','slope (m)', v=>slopeOK(v,prob.m)]);
    ops.push(['yi_eq','y-intercept', v=>vb.type==='vertical'? true : pointOK(v,{x:0,y:vb.b})]);
    ops.push(['cls_eq','classification', v=>v===classOf(prob.m), true]);
  }
  if(mode==='pp'){
    const mA=slopeOf(probPP.A), mB=slopeOf(probPP.B);
    ops.push(['mA','slope of A (m₁)', v=>slopeOK(v,mA)]);
    ops.push(['mB','slope of B (m₂)', v=>slopeOK(v,mB)]);
    ops.push(['rel_pp','relationship (A vs B)', v=>v===probPP.target, true]);
    ops.push(['eq_para','eqn through P ∥ A', v=>{
      const Pt={x:probPP.Ppara[0], y:probPP.Ppara[1]}; const mb=makeMB_throughPoint(mA, Pt); return equationMatchesTo(mb, v);
    }]);
    ops.push(['eq_perp','eqn through Q ⟂ A', v=>{
      let mPerp=null; const mA2=slopeOf(probPP.A); if(mA2===null) mPerp=0; else if(nearly(mA2,0)) mPerp=null; else mPerp=-1/mA2;
      const Pt={x:probPP.Pperp[0], y:probPP.Pperp[1]}; const mb=makeMB_throughPoint(mPerp, Pt); return equationMatchesTo(mb, v);
    }]);
  }

  for(const [id,label,fn,isRadio] of ops){
    const btnEl = getBtnFor(id); if(!btnEl) continue;
    if(btnEl.disabled && id.startsWith('yi_')) continue;
    if(resolved[id]) continue;
    const val = isRadio ? ((document.querySelector('input[name="'+id+'"]:checked')||{}).value||'') : getVal(id);
    const ok=fn(val); finalize(btnEl, ok, label, id); resolved[id]=true;
  }
  const req=requiredIds(); 
  const allCorrect=req.every(id=>{ const btn=getBtnFor(id); const yiDisabled = id.startsWith('yi_') && btn && btn.disabled; return !!credit[id] || yiDisabled; });
  setChip('All', allCorrect);
}
function renderAnswers(force){
  if(!force) return;
  const a=$('#answers'); a.innerHTML='';
  if(mode==='pp'){
    const mA=slopeOf(probPP.A), mB=slopeOf(probPP.B);
    a.appendChild(pill('m₁ = '+(mA===null?'undefined':simplifyFrac(mA)),'hint'));
    a.appendChild(pill('m₂ = '+(mB===null?'undefined':simplifyFrac(mB)),'hint'));
    a.appendChild(pill('relationship: '+probPP.target,'hint'));
    const Pp={x:probPP.Ppara[0], y:probPP.Ppara[1]}, Pq={x:probPP.Pperp[0], y:probPP.Pperp[1]};
    const mbp=makeMB_throughPoint(mA,Pp);

    const mbq=makeMB_throughPoint(mPerp,Pq);
    {
      const textP = (mbp.type === 'vertical') ? ('x = ' + fmt(Pp.x)) : fmtMxB(mbp.m, mbp.b);

      a.appendChild(pill('through Q ⟂ A: ' + textQ, 'hint'));

    return;
  }
  const vb=vertOrB_single();
  const m = prob.m===null ? 'undefined' : simplifyFrac(prob.m);

  a.appendChild(pill('classification: '+classOf(prob.m),'hint'));

}

/* ====== Canvas & Drawing ====== */
const canvas=document.getElementById('canvas'), ctx=canvas.getContext('2d');
const AX={xmin:-10,xmax:10,ymin:-10,ymax:10};
function sizeCanvas(){
  const dpr=Math.max(1,Math.floor(window.devicePixelRatio||1));
  const r=canvas.getBoundingClientRect(); const w=Math.floor(r.width||600), h=Math.floor(r.height||600);
  canvas.width=w*dpr; canvas.height=h*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
}
function getVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || '#000'; }
function ux(x){ const W=canvas.clientWidth; return (x-AX.xmin)/(AX.xmin*-1+AX.xmax)*W; }
function uy(y){ const H=canvas.clientHeight; return H-(y-AX.ymin)/(AX.ymin*-1+AX.ymax)*H; }
function clearCanvas(){ ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width,canvas.height); ctx.restore(); }
function drawGrid(){
  clearCanvas();
  const W=canvas.clientWidth, H=canvas.clientHeight;
  ctx.strokeStyle='#e9eefb'; ctx.lineWidth=1;
  for(let x=-10;x<=10;x++){ const px=ux(x); ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,H); ctx.stroke(); }
  for(let y=-10;y<=10;y++){ const py=uy(y); ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(W,py); ctx.stroke(); }
  ctx.strokeStyle=getVar('--blue'); ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(ux(0),0); ctx.lineTo(ux(0),H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,uy(0)); ctx.lineTo(W,uy(0)); ctx.stroke();
  ctx.fillStyle='rgba(15,35,64,.95)'; ctx.font='900 18px ui-rounded, system-ui'; ctx.textAlign='center'; ctx.textBaseline='top';
  const ay=uy(0); const yLabel=(ay>H-26)? ay-22 : ay+6;
  for(let x=-10;x<=10;x+=2){ if(x!==0) ctx.fillText(x, ux(x), Math.max(2, Math.min(H-20, yLabel))); }
  ctx.textAlign=(ux(0)>26)?'right':'left'; ctx.textBaseline='middle'; const ax=ux(0); const xCol=Math.max(8, Math.min(W-8, ax + (ux(0)>26?-8:8)));
  for(let y=-10;y<=10;y+=2){ if(y!==0) ctx.fillText(y, xCol, uy(y)); }
}
function inBounds(x,y){ return x>=AX.xmin && x<=AX.xmax && y>=AX.ymin && y<=AX.ymax; }


function collectPoints(line){
  const pts=[];
  if(line.kind==='pts'){ pts.push(line.p1, line.p2); return pts; }
  if(line.kind==='tbl'){ for(const r of line.rows){ if(inBounds(r[0],r[1])) pts.push([r[0],r[1]]); } return pts; }

  const m = slopeOf(line);
  if (m === null) {
    const x = (line.x0!=null ? line.x0 : (line.p1 ? line.p1[0] : (line.rows ? line.rows[0][0] : 0)));
    return [[x, AX.ymin+2],[x, AX.ymax-2]];
  }

  const ib=interceptOf(line);
  const b=(ib.type==='line')? ib.b : 0;

  const candidates=[-8,-4,0,4,8];
  const out=[];
  for (const x of candidates){
    const y = m*x + b;           // no tidy here — exact point on the line
    if(inBounds(x,y)) out.push([x,y]);
    if(out.length>=2) break;
  }
  if(out.length<2){ out.push([0,b],[1,m+b]); }
  return out;
}



function drawLineFromMB(m, b, color, dashed=false){
  ctx.save(); ctx.lineWidth=3; ctx.strokeStyle=color;
  if(dashed){ ctx.setLineDash([8,8]); ctx.lineWidth=2; }
  if(m===null){
    const x0=(typeof b==='number')?b:0;
    ctx.beginPath(); ctx.moveTo(ux(x0),0); ctx.lineTo(ux(x0),canvas.clientHeight); ctx.stroke();
  } else {
    const xa=AX.xmin, xb=AX.xmax, ya=m*xa+b, yb=m*xb+b;
    ctx.beginPath(); ctx.moveTo(ux(xa),uy(ya)); ctx.lineTo(ux(xb),uy(yb)); ctx.stroke();
  }
  ctx.restore();
}
function drawMarker(x,y,color){ ctx.save(); ctx.fillStyle=color; ctx.beginPath(); ctx.arc(ux(x),uy(y),4.8,0,Math.PI*2); ctx.fill(); ctx.restore(); }
function drawGivenLine(line,color){
  ctx.save(); ctx.lineWidth=3; ctx.strokeStyle=color;
  if(slopeOf(line)===null){
    const x0=line.x0!=null?line.x0:(line.p1?line.p1[0]:(line.rows?line.rows[0][0]:0));
    ctx.beginPath(); ctx.moveTo(ux(x0),0); ctx.lineTo(ux(x0),canvas.clientHeight); ctx.stroke();
  } else {
    const m=slopeOf(line); const ib=interceptOf(line); const b=(ib.type==='line')?ib.b:0;
    const xa=AX.xmin, xb=AX.xmax, ya=m*xa+b, yb=m*xb+b;
    ctx.beginPath(); ctx.moveTo(ux(xa),uy(ya)); ctx.lineTo(ux(xb),uy(yb)); ctx.stroke();
  }
  const pts=collectPoints(line);
  for(const p of pts){ if(!inBounds(p[0],p[1])) continue; drawMarker(p[0],p[1],color); }
  ctx.restore();
}
function draw(){
  drawGrid();

  if(mode==='pp'){
  drawGrid();

  if(probPP){
    if(ppShowA) drawGivenLine(probPP.A, getVar('--blue'));
    if(ppShowB) drawGivenLine(probPP.B, getVar('--green'));

    const mA=slopeOf(probPP.A);

    if(highlightP){
      const P={x:probPP.Ppara[0], y:probPP.Ppara[1]};
      const mb=makeMB_throughPoint(mA,P);
      if(mb.type==='vertical') drawLineFromMB(null,P.x,'#f59e0b',true);
      else drawLineFromMB(mb.m, mb.b, '#f59e0b', true);
      drawMarker(P.x,P.y,'#f59e0b');
    }
    if(highlightQ){
      const Q={x:probPP.Pperp[0], y:probPP.Pperp[1]};
      const mPerp=(mA===null)?0:(nearly(mA,0)?null:-1/mA);
      const mb=makeMB_throughPoint(mPerp,Q);
      if(mb.type==='vertical') drawLineFromMB(null,Q.x,'#a855f7',true);
      else drawLineFromMB(mb.m, mb.b, '#a855f7', true);
      drawMarker(Q.x,Q.y,'#a855f7');
    }
  }
  return;
}


  if(!prob) return;
  if(!(mode==='graph' || showHint)) return;

  if(prob.m===null){
    const x0 = (prob.x0!=null)? prob.x0 : (prob.p1?prob.p1[0] : (prob.rows?prob.rows[0][0]:0));
    drawLineFromMB(null,x0,getVar('--blue'));
  } else {
    let m=prob.m, b=prob.b;
    if(b===undefined){
      if(mode==='pts'){ const p1=prob.p1, p2=prob.p2; m=(p2[1]-p1[1])/(p2[0]-p1[0]); b=p1[1]-m*p1[0]; }
      if(mode==='tbl'){ const first=prob.rows[0], last=prob.rows[prob.rows.length-1]; m=(last[1]-first[1])/(last[0]-first[0]); b=first[1]-m*first[0]; }
      if(mode==='eq'){ b = prob.b || 0; }
    }
    drawLineFromMB(m,b,getVar('--blue'));
  }

  let sample={kind:'graph', m:prob.m};
  if(prob.m===null){ sample.x0 = (prob.x0!=null)? prob.x0 : (prob.p1?prob.p1[0] : (prob.rows?prob.rows[0][0]:0)); }
  else { sample.b = (prob.b!=null)?prob.b:0; }
  const pts= (mode==='pts')? [prob.p1,prob.p2] :
             (mode==='tbl')? prob.rows :
             collectPoints(sample);
  const color = (mode==='tbl') ? '#22c55e' : (mode==='pts' ? '#ff6b6b' : '#0ea5e9');
  for(const p of pts){ const [x,y]=p; if(!inBounds(x,y)) continue; drawMarker(x,y,color); }
}



// Default which PP graphs are visible, based on ppType (and the actual kinds when random)
function setPPDefaults() {
  // Base: hide both
  ppShowA = false;
  ppShowB = false;

  switch (ppType) {
    case 'graph':                 // Graph
      ppShowA = true;             // LineA (show)
      ppShowB = true;             // LineB (show)
      break;

    case 'graph+pts':             // Graph + Point
    case 'graph+tbl':             // Graph + Table
    case 'graph+eq':              // Graph + EQ
      ppShowA = true;             // LineA (show)
      ppShowB = false;            // LineB (hide)
      break;

    // Table / Equation / 2 Points AND their pairings below → "No graph by default"
    case 'pts':                   // 2 Points
    case 'tbl':                   // Table
    case 'eq':                    // Equation
    case 'pts+tbl':               // Point + Table
    case 'pts+eq':                // Point + EQ
    case 'tbl+eq':                // Table + EQ
      // keep both false
      break;

    case 'random':
    default:
      // For Random: show a line only if that side's "kind" really is a graph
      if (probPP && probPP.A && probPP.A.kind === 'graph') ppShowA = true;
      if (probPP && probPP.B && probPP.B.kind === 'graph') ppShowB = true;
      break;
  }
}




/* ====== Scaffolding ====== */
function safeRO(cb){ if('ResizeObserver' in window){ new ResizeObserver(cb).observe(canvas); } else { window.addEventListener('resize',cb); } }
function buildProblem(){
  for(const k in credit) delete credit[k];
  for(const k in resolved) delete resolved[k];
  for(const k in chips) delete chips[k];
  $('#feedback').innerHTML=''; $('#answers').innerHTML='';
  const G=$('#given'); G.style.display='none'; G.className='stat'; G.innerHTML='';
  highlightP=false; highlightQ=false;

  if (mode === 'pp') {
  probPP = genPP();
  prob   = null;

  // set the default visibility exactly as specified
  setPPDefaults();

  // reset highlights and hide the global Show Graph button in PP
  highlightP = false;
  highlightQ = false;
  $('#btnHint').style.display = 'none';
} else {
  // (unchanged non-PP branch)
  showHint = (mode === 'graph');
  $('#btnHint').style.display = (mode === 'graph') ? 'none' : 'inline-block';
  $('#btnHint').textContent   = 'Show Graph';
  if (mode === 'graph') prob = genLine();
  if (mode === 'pts')   prob = genTwoPoints();
  if (mode === 'tbl')   prob = genTable();
  if (mode === 'eq')    prob = genEquation();
  probPP = null;
}

  buildInputs(); draw();
}
