  .grid{max-width:100%;height:auto;border:1px solid #e7edff;border-radius:12px;background:#fff;margin-top:10px}

<script src="../portal.js"></script>
<script>
(function(){
'use strict';

/* ===== PURE MATH LIBRARY ===== */
function ri(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function rc(arr){ return arr[ri(0,arr.length-1)]; }
function rnz(a,b){ var x=0; while(x===0) x=ri(a,b); return x; }
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ var t=a%b; a=b; b=t; } return a||1; }
function R(n,d){ d=(d===undefined)?1:d; if(d<0){n=-n;d=-d;} var g=gcd(n,d); return {n:n/g, d:d/g}; }
function req(a,b){ return a.n*b.d === b.n*a.d; }
function rint(x){ return R(x,1); }
function parseRat(s){
  if(s===null || s===undefined) return null;
  s = String(s).trim().replace(/\u2212/g,'-').replace(/\s+/g,'');
  if(!s || !/\d/.test(s)) return null;
  var m = s.match(/^(-?\d+)\/(-?\d+)$/);
  if(m){ var d=parseInt(m[2],10); if(!d) return null; return R(parseInt(m[1],10), d); }
  if(/^-?\d+$/.test(s)) return R(parseInt(s,10),1);
  m = s.match(/^(-)?(\d*)\.(\d+)$/);
  if(m){ var neg=!!m[1], ip=m[2]||'0', fp=m[3];
    var den=Math.pow(10,fp.length), num=parseInt(ip,10)*den + parseInt(fp,10);
    return R(neg?-num:num, den); }
  return null;
}
var MIN='\u2212';
function fmtInt(x){ return x<0 ? MIN+Math.abs(x) : String(x); }
function ratHTML(r){
  if(r.d===1) return fmtInt(r.n);
  var s = r.n<0 ? MIN : '';
  return s+'<span class="vfrac"><span>'+Math.abs(r.n)+'</span><span>'+r.d+'</span></span>';
}

/* ---- radical helpers ---- */
function simplifyRadical(n){
  var coef=1, rad=n, k=2;
  while(k*k<=rad){
    while(rad % (k*k) === 0){ rad = rad/(k*k); coef*=k; }
    k++;
  }
  return {coef:coef, rad:rad};
}
function radHTML(coef,rad){
  if(coef===0) return '0';
  var sign = coef<0 ? MIN : '';
  var ac=Math.abs(coef);
  var coefStr = ac===1 ? '' : String(ac);
  return sign+coefStr+'\u221a'+rad;
}

function ordinal(n){
  var s=['th','st','nd','rd'], v=n%100;
  return n+(s[(v-20)%10]||s[v]||s[0]);
}

/* ---- exponent term helper: coef * x^exp (exp may be negative) ---- */
function powTermHTML(coef, exp){
  var coefStr = (coef===1?'':(coef===-1?MIN:fmtInt(coef)));
  var expStr = exp<0 ? MIN+Math.abs(exp) : String(exp);
  return coefStr+'x<sup>'+expStr+'</sup>';
}

/* ---- UI helpers ---- */
function inBox(id, wide){ return '<input class="in'+(wide?' wide':'')+'" id="'+id+'" inputmode="text" autocomplete="off" />'; }
function seg(id,cur,opts){
  var h='<div class="drSeg" id="'+id+'" role="tablist">';
  opts.forEach(function(o){ h+='<button type="button" data-v="'+o[0]+'">'+o[1]+'</button>'; });
  return h+'</div>';
}
function segWrap(label,id,cur,opts){
  return '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">'+
    '<span style="font-size:12px;font-weight:900;letter-spacing:.4px;color:var(--muted)">'+label+'</span>'+
    seg(id,cur,opts)+'</div>';
}
function wireSeg(id,cur,cb){
  var box=document.getElementById(id); if(!box) return;
  Array.prototype.forEach.call(box.querySelectorAll('button'),function(btn){
    if(btn.getAttribute('data-v')===cur) btn.classList.add('active');
    btn.addEventListener('click',function(){
      Array.prototype.forEach.call(box.querySelectorAll('button'),function(b){b.classList.remove('active');});
      btn.classList.add('active'); cb(btn.getAttribute('data-v'));
    });
  });
}

/* =====================================================================
   A.11A — Simplify Numerical Radical Expressions (square roots)
   ===================================================================== */
var cMode11A='mix';
var RAD_BASES=[2,3,5,6,7,10,11,13,14,15];

function genSimplify(){
  var k=ri(2,6), m=rc(RAD_BASES);
  return {kind:'simplify', n:k*k*m, coef:k, rad:m};
}
function genMultiply(){
  var a,b,sr;
  do{ a=ri(2,12); b=ri(2,12); sr=simplifyRadical(a*b); } while(sr.rad===1);
  return {kind:'multiply', a:a, b:b, coef:sr.coef, rad:sr.rad};
}
function genAddSub(){
  var flavor=rc(['direct','needSimplify']);
  var m=rc(RAD_BASES);
  var op=rc(['+','-']);
  var c1,c2,n1,n2;
  if(flavor==='direct'){ c1=ri(1,9); c2=ri(1,9); }
  else { var k1=ri(2,4), k2=ri(2,5); c1=k1; c2=k2; n1=k1*k1*m; n2=k2*k2*m; }
  var resCoef = op==='+' ? c1+c2 : c1-c2;
  var tries=0;
  while(resCoef===0 && tries<10){
    if(flavor==='direct'){ c2=ri(1,9); }
    else { var k2b=ri(2,5); c2=k2b; n2=k2b*k2b*m; }
    resCoef = op==='+' ? c1+c2 : c1-c2;
    tries++;
  }
  return {kind:'addsub', flavor:flavor, m:m, op:op, c1:c1, c2:c2, n1:n1, n2:n2, resCoef:resCoef};
}

var SE_A11A = {
  id:'A.11A', letter:'A', short:'Simplify Radicals',
  title:'Simplify Radical Expressions',
  blurb:'Simplify numerical radical expressions involving square roots.',

  gen:function(){
    var kind=(cMode11A==='mix')?rc(['simplify','multiply','addsub']):cMode11A;
    if(kind==='simplify') return genSimplify();
    if(kind==='multiply') return genMultiply();
    return genAddSub();
  },
  prompt:function(p){
    var selector=segWrap('TYPE','radSeg',cMode11A,
      [['mix','Mixed'],['simplify','Simplify'],['multiply','Multiply'],['addsub','Add & Subtract']]);
    var body;
    if(p.kind==='simplify'){
      body='Simplify:<br><span class="given">\u221a'+p.n+'</span>';
    } else if(p.kind==='multiply'){
      body='Multiply and simplify:<br><span class="given">\u221a'+p.a+' \u00b7 \u221a'+p.b+'</span>';
    } else {
      var t1,t2;
      if(p.flavor==='direct'){ t1=radHTML(p.c1,p.m); t2=radHTML(p.c2,p.m); }
      else { t1='\u221a'+p.n1; t2='\u221a'+p.n2; }
      body='Simplify:<br><span class="given">'+t1+' '+p.op+' '+t2+'</span>';
    }
    return selector+body;
  },
  answerHTML:function(p){
    return '<div class="answer"><span class="lbl">Simplified radical:</span>'+inBox('coef')+'<span>\u221a</span>'+inBox('rad')+'</div>';
  },
  read:function(p){
    var coef=parseRat(document.getElementById('coef').value);
    var rad=parseRat(document.getElementById('rad').value);
    if(coef===null||rad===null) return null;
    return {coef:coef, rad:rad};
  },
  check:function(p,ans){
    if(p.kind==='addsub') return req(ans.coef,rint(p.resCoef)) && req(ans.rad,rint(p.m));
    return req(ans.coef,rint(p.coef)) && req(ans.rad,rint(p.rad));
  },
  hints:function(p){
    if(p.kind==='simplify') return ['Find the largest perfect square that divides evenly into the number under the root.', 'Pull that perfect square out as its square root; whatever is left stays under the radical.'];
    if(p.kind==='multiply') return ['Multiply the numbers under the roots first: \u221aa \u00b7 \u221ab = \u221a(a\u00b7b).', 'Then simplify the resulting radical by pulling out any perfect-square factor.'];
    if(p.flavor==='direct') return ['These are already like radicals (same number under the root) \u2014 just combine the coefficients out front.'];
    return ['Simplify each radical separately first \u2014 pull out any perfect-square factor from each.', 'Once both radicals have the same number underneath, combine their coefficients.'];
  },
  steps:function(p){
    var s='';
    if(p.kind==='simplify'){
      s+='<span class="st">1. '+p.n+' = '+(p.coef*p.coef)+' \u00d7 '+p.rad+', and '+(p.coef*p.coef)+' is a perfect square ('+p.coef+'\u00b2).</span>';
      s+='<span class="st">2. \u221a'+p.n+' = \u221a('+(p.coef*p.coef)+' \u00d7 '+p.rad+') = '+p.coef+'\u221a'+p.rad+'</span>';
      s+='<span class="st final">Simplified: '+radHTML(p.coef,p.rad)+'</span>';
    } else if(p.kind==='multiply'){
      s+='<span class="st">1. \u221a'+p.a+' \u00b7 \u221a'+p.b+' = \u221a('+p.a+' \u00d7 '+p.b+') = \u221a'+(p.a*p.b)+'</span>';
      s+='<span class="st">2. Pull out the largest perfect-square factor of '+(p.a*p.b)+'.</span>';
      s+='<span class="st final">Simplified: '+radHTML(p.coef,p.rad)+'</span>';
    } else {
      if(p.flavor==='needSimplify'){
        s+='<span class="st">1. Simplify each radical: \u221a'+p.n1+' = '+radHTML(p.c1,p.m)+', and \u221a'+p.n2+' = '+radHTML(p.c2,p.m)+'</span>';
      } else {
        s+='<span class="st">1. Both terms already share the same radicand, \u221a'+p.m+'.</span>';
      }
      s+='<span class="st">2. Combine the coefficients: '+fmtInt(p.c1)+(p.op==='+'?' + ':' \u2212 ')+fmtInt(p.c2)+' = '+fmtInt(p.resCoef)+'</span>';
      s+='<span class="st final">Result: '+radHTML(p.resCoef,p.m)+'</span>';
    }
    return s;
  },
  emptyMsg:'Fill in both the coefficient and the number under the radical.',
  init:function(p){ wireSeg('radSeg',cMode11A,function(v){ cMode11A=v; newProblem(); }); }
};

/* =====================================================================
   A.11B — Simplify Using the Laws of Exponents (integral & rational)
   ===================================================================== */
var cMode11B='mix';

function genAlg(){
  var subop=rc(['mul','div','pow']);
  if(subop==='mul'){
    var coefA=rnz(-6,6), expA=ri(1,5), coefB=rnz(-6,6), expB=ri(1,5);
    return {subop:subop, coefA:coefA,expA:expA,coefB:coefB,expB:expB,
      resCoef:R(coefA*coefB,1), resExp:expA+expB};
  }
  if(subop==='div'){
    var expB2=ri(1,4), expA2=expB2+ri(1,4);
    var coefA2=rnz(-9,9), coefB2=rnz(-9,9);
    return {subop:subop, coefA:coefA2,expA:expA2,coefB:coefB2,expB:expB2,
      resCoef:R(coefA2,coefB2), resExp:expA2-expB2};
  }
  // pow
  var coefA3=rnz(-4,4), expA3=ri(1,3), k=ri(2,3);
  return {subop:subop, coefA:coefA3, expA:expA3, k:k,
    resCoef:R(Math.pow(coefA3,k),1), resExp:expA3*k};
}


function genPosExp(){
  var subcase=rc(['negExp','zeroExp']);
  if(subcase==='negExp'){
    var coef=rnz(-9,9), n=ri(1,5);
    return {subcase:subcase, coef:coef, n:n};
  }
  var coef0=rnz(-9,9);
  return {subcase:subcase, coef:coef0};
}
function genNumeric(){
  var subcase=rc(['negInt','rational']);
  if(subcase==='negInt'){
    var base=ri(2,9), n=ri(1,3);
    return {subcase:subcase, base:base, n:n, value:R(1,Math.pow(base,n))};
  }
  var k,n2,m,tries=0;
  do{
    k=rc([2,3]); n2=rc([2,3,4]); m=ri(1,n2-1); tries++;
  } while(gcd(m,n2)!==1 && tries<25);
  var base2=Math.pow(k,n2);
  var value=Math.pow(k,m);
  return {subcase:subcase, base:base2, m:m, n:n2, value:R(value,1)};
}

var SE_A11B = {
  id:'A.11B', letter:'B', short:'Laws of Exponents',
  title:'Laws of Exponents',
  blurb:'Simplify numeric and algebraic expressions using the laws of exponents, including integral and rational exponents.',

  gen:function(){
    var kind=(cMode11B==='mix')?rc(['alg','posExp','numeric']):cMode11B;
    var p = kind==='alg' ? genAlg() : (kind==='posExp' ? genPosExp() : genNumeric());
    p.kind=kind;
    return p;
  },
  prompt:function(p){
    var selector=segWrap('TYPE','expSeg',cMode11B,
      [['mix','Mixed'],['alg','Algebraic Laws'],['posExp','Positive Exponents'],['numeric','Numeric Evaluation']]);
    var body;
    if(p.kind==='alg'){
      if(p.subop==='mul') body='Multiply and simplify:<br><span class="given">('+powTermHTML(p.coefA,p.expA)+')('+powTermHTML(p.coefB,p.expB)+')</span>';
      else if(p.subop==='div') body='Divide and simplify:<br><span class="given">('+powTermHTML(p.coefA,p.expA)+') \u00f7 ('+powTermHTML(p.coefB,p.expB)+')</span>';
      else body='Simplify:<br><span class="given">('+powTermHTML(p.coefA,p.expA)+')<sup>'+p.k+'</sup></span>';
    } else if(p.kind==='posExp'){
      if(p.subcase==='negExp') body='Rewrite using only positive exponents:<br><span class="given">'+powTermHTML(p.coef,-p.n)+'</span>';
      else body='Simplify:<br><span class="given">'+powTermHTML(p.coef,0)+'</span>';
    } else {
      if(p.subcase==='negInt') body='Evaluate:<br><span class="given">'+p.base+'<sup>'+MIN+p.n+'</sup></span>';
      else body='Evaluate:<br><span class="given">'+p.base+'<sup>'+p.m+'/'+p.n+'</sup></span>';
    }
    return selector+body;
  },
  answerHTML:function(p){
    if(p.kind==='alg'){
      return '<div class="answer"><span class="lbl">Simplified form:</span>'+inBox('coef')+'<span>x^</span>'+inBox('exp','narrow')+'</div>';
    }
    if(p.kind==='posExp'){
      if(p.subcase==='negExp'){
        return '<div class="answer"><span class="lbl">Rewrite as a fraction:</span>'+inBox('num')+'<span>/ x^</span>'+inBox('den','narrow')+'</div>';
      }
      return '<div class="answer"><span class="lbl">Simplified value:</span>'+inBox('val')+'</div>';
    }
    return '<div class="answer"><span class="lbl">Value:</span>'+inBox('val','wide')+'</div>';
  },
  read:function(p){
    if(p.kind==='alg'){
      var coef=parseRat(document.getElementById('coef').value);
      var exp=parseRat(document.getElementById('exp').value);
      if(coef===null||exp===null) return null;
      return {coef:coef, exp:exp};
    }
    if(p.kind==='posExp'){
      if(p.subcase==='negExp'){
        var num=parseRat(document.getElementById('num').value);
        var den=parseRat(document.getElementById('den').value);
        if(num===null||den===null) return null;
        return {num:num, den:den};
      }
      var val=parseRat(document.getElementById('val').value);
      if(val===null) return null;
      return {val:val};
    }
    var val2=parseRat(document.getElementById('val').value);
    if(val2===null) return null;
    return {val:val2};
  },
  check:function(p,ans){
    if(p.kind==='alg') return req(ans.coef,p.resCoef) && req(ans.exp,rint(p.resExp));
    if(p.kind==='posExp'){
      if(p.subcase==='negExp') return req(ans.num,rint(p.coef)) && req(ans.den,rint(p.n));
      return req(ans.val,rint(p.coef));
    }
    return req(ans.val, p.value);
  },
  hints:function(p){
    if(p.kind==='alg'){
      if(p.subop==='mul') return ['When multiplying powers with the same base, add the exponents.', 'Multiply the coefficients out front separately.'];
      if(p.subop==='div') return ['When dividing powers with the same base, subtract the exponents (top minus bottom).', 'Divide the coefficients out front separately \u2014 a fraction is fine.'];
      return ['When raising a power to a power, multiply the exponents.', 'Raise the coefficient out front to that same power too.'];
    }
    if(p.kind==='posExp'){
      if(p.subcase==='negExp') return ['A negative exponent means "reciprocal": x\u207b\u207f = 1/x\u207f.', 'Move the variable to the denominator and make the exponent positive \u2014 the coefficient stays in the numerator.'];
      return ['Anything (nonzero) raised to the zero power equals 1.', 'So the x\u2070 part just disappears, leaving only the coefficient.'];
    }
    if(p.subcase==='negInt') return ['A negative exponent means "reciprocal": base\u207b\u207f = 1/base\u207f.', 'Compute base\u207f first, then write 1 over that.'];
    return ['A rational exponent m/n means: take the '+ordinal(p.n)+' root, then raise it to the '+ordinal(p.m)+' power (in either order).', 'Look for the whole number whose '+ordinal(p.n)+' power gives the base \u2014 that\u2019s the '+ordinal(p.n)+' root to start from.'];
  },
  steps:function(p){
    var s='';
    if(p.kind==='alg'){
      if(p.subop==='mul'){
        s+='<span class="st">1. Add the exponents: '+p.expA+' + '+p.expB+' = '+p.resExp+'</span>';
        s+='<span class="st">2. Multiply the coefficients: '+fmtInt(p.coefA)+' \u00d7 '+fmtInt(p.coefB)+' = '+fmtInt(p.coefA*p.coefB)+'</span>';
      } else if(p.subop==='div'){
        s+='<span class="st">1. Subtract the exponents: '+p.expA+' \u2212 '+p.expB+' = '+p.resExp+'</span>';
        s+='<span class="st">2. Divide the coefficients: '+fmtInt(p.coefA)+' \u00f7 '+fmtInt(p.coefB)+' = '+ratHTML(p.resCoef)+'</span>';
      } else {
        s+='<span class="st">1. Multiply the exponents: '+p.expA+' \u00d7 '+p.k+' = '+p.resExp+'</span>';
        s+='<span class="st">2. Raise the coefficient to the '+p.k+' power: '+fmtInt(p.coefA)+'<sup>'+p.k+'</sup> = '+fmtInt(p.resCoef.n)+'</span>';
      }
      s+='<span class="st final">Result: '+ratHTML(p.resCoef)+'x<sup>'+p.resExp+'</sup></span>';
    } else if(p.kind==='posExp'){
      if(p.subcase==='negExp'){
        s+='<span class="st">1. '+powTermHTML(p.coef,-p.n)+' means '+fmtInt(p.coef)+' \u00d7 x'+MIN+p.n+'.</span>';
        s+='<span class="st">2. Move x'+MIN+p.n+' to the denominator to make the exponent positive: x'+MIN+p.n+' = 1/x<sup>'+p.n+'</sup></span>';
        s+='<span class="st final">Result: '+fmtInt(p.coef)+' / x<sup>'+p.n+'</sup></span>';
      } else {
        s+='<span class="st">1. x\u2070 = 1 (for any nonzero x), so '+fmtInt(p.coef)+' \u00d7 x\u2070 = '+fmtInt(p.coef)+' \u00d7 1.</span>';
        s+='<span class="st final">Result: '+fmtInt(p.coef)+'</span>';
      }
    } else {
      if(p.subcase==='negInt'){
        s+='<span class="st">1. '+p.base+'<sup>'+p.n+'</sup> = '+Math.pow(p.base,p.n)+'</span>';
        s+='<span class="st">2. A negative exponent flips it to a reciprocal: '+p.base+'<sup>'+MIN+p.n+'</sup> = 1/'+Math.pow(p.base,p.n)+'</span>';
        s+='<span class="st final">Value: '+ratHTML(p.value)+'</span>';
      } else {
        s+='<span class="st">1. '+p.base+' = '+Math.round(Math.pow(p.base,1/p.n))+'<sup>'+p.n+'</sup>, so the '+ordinal(p.n)+' root of '+p.base+' is '+Math.round(Math.pow(p.base,1/p.n))+'.</span>';
        s+='<span class="st">2. Raise that root to the '+ordinal(p.m)+' power: '+Math.round(Math.pow(p.base,1/p.n))+'<sup>'+p.m+'</sup> = '+p.value.n+'</span>';
        s+='<span class="st final">Value: '+p.value.n+'</span>';
      }
    }
    return s;
  },
  emptyMsg:'Fill in every box.',
  init:function(p){ wireSeg('expSeg',cMode11B,function(v){ cMode11B=v; newProblem(); }); }
};

var SES=[SE_A11A, SE_A11B];

/* ===== THE FIXED CONTROLLER (unchanged between modules) ===== */
var current={se:SES[0], p:null, done:false, recorded:false, hintIdx:0, hintLogged:false};
var session={a:0,c:0};
var $=function(s){return document.querySelector(s);};

function stoneStats(id){
  return (window.Portal && Portal.skill) ? Portal.skill(id) : {progress:0, attempts:0, mastered:false};
}
function renderRail(){
  var host=$('#stones'); host.innerHTML='';
  SES.forEach(function(se){
    var st=stoneStats(se.id);
    var cls='stone'+(se===current.se?' active':'')+(st.mastered?' mastered':st.attempts?' started':'');
    var b=document.createElement('button');
    b.type='button'; b.className=cls;
    b.innerHTML='<span class="dot">'+(st.mastered?'\u2713':se.letter)+'</span>'+
      '<span><span class="nm">'+se.id+' \u00b7 '+se.short+'</span>'+
      '<span class="mini"><i style="width:'+Math.round(st.progress*100)+'%"></i></span></span>';
    b.addEventListener('click', function(){ current.se=se; newProblem(); });
    host.appendChild(b);
  });
}
function newProblem(){
  var se=current.se;
  current.p=se.gen(); current.done=false; current.recorded=false; current.hintIdx=0; current.hintLogged=false;
  $('#seTitle').innerHTML=se.title;
  $('#seBlurb').textContent=se.blurb;
  $('#seTag').textContent='TEKS '+se.id;
  $('#prompt').innerHTML=se.prompt(current.p);
  $('#answerArea').innerHTML=se.answerHTML(current.p);
  $('#fb').textContent=''; $('#fb').className='fb';
  $('#hintBox').className='note'; $('#hintBox').innerHTML='';
  $('#stepsBox').className='stepsBox'; $('#stepsBox').innerHTML='';
  $('#checkBtn').disabled=false;
  if(se.init) se.init(current.p);
  renderRail();
  var first=$('#answerArea input'); if(first) first.focus();
}
function onCheck(){
  if(current.done) return;
  var se=current.se, ans=se.read(current.p);
  if(!ans){
    $('#fb').className='fb bad';
    $('#fb').textContent=se.emptyMsg||'Fill in every box — fractions like 3/4 are fine.';
    return;
  }
  var ok=se.check(current.p, ans);
  if(se.allowRecheck){ if(ok) current.done=true; }
  else { current.done=true; $('#checkBtn').disabled=true; if(se.reveal) se.reveal(current.p); }
  if(!current.recorded){
    current.recorded=true;
    session.a++; if(ok) session.c++;
    $('#sesScore').textContent=session.c+' / '+session.a;
    if(window.Portal && Portal.record) Portal.record(se.id, ok);
  }
  $('#fb').className='fb '+(ok?'ok':'bad');
  $('#fb').textContent= ok?'Correct \u2713'
    : (se.allowRecheck?'Not quite \u2717 — read the tips, adjust, and check again.'
                      :'Not quite \u2717 — open the steps to see the path.');
  renderRail();
}
function onHint(){
  var hints=current.se.hints(current.p);
  var h=hints[Math.min(current.hintIdx, hints.length-1)];
  current.hintIdx++;
  var box=$('#hintBox'); box.classList.add('show');
  box.innerHTML += (box.innerHTML?'<br>':'')+'\u2022 '+h;
  if(!current.hintLogged && window.Portal && Portal.hint){ Portal.hint(current.se.id); current.hintLogged=true; }
}
function onSteps(){
  var box=$('#stepsBox'); box.classList.add('show');
  box.innerHTML=current.se.steps(current.p);
  if(!current.hintLogged && window.Portal && Portal.hint){ Portal.hint(current.se.id); current.hintLogged=true; }
}
$('#checkBtn').addEventListener('click', onCheck);
$('#hintBtn').addEventListener('click', onHint);
$('#stepsBtn').addEventListener('click', onSteps);
$('#nextBtn').addEventListener('click', newProblem);
window.addEventListener('keydown', function(e){
  var tag=(e.target.tagName||'').toLowerCase();
  if(e.key==='Enter' && tag!=='select'){ e.preventDefault(); onCheck(); }
  if((e.key==='n'||e.key==='N') && tag!=='input'){ newProblem(); }
});

var want=new URLSearchParams(location.search).get('se');
if(want){ var f=SES.filter(function(s){return s.id.toLowerCase()===want.toLowerCase();})[0]; if(f) current.se=f; }
newProblem();

})();
</script>
