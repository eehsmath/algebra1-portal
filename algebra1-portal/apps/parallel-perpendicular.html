<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Parallel • Perpendicular • Neither — Slope Drill</title>
<style>
  :root{
    --bg:#0b0d10;
    --card:#151922;
    --ink:#e7ecf3;
    --muted:#9fb0c8;
    --accent:#6ee7ff;
    --ok:#22c55e;
    --err:#ef4444;
  }
  html,body{height:100%}
  body{
    margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif;
    background:linear-gradient(180deg, #0b0d10 0%, #0e131b 100%); color:var(--ink);
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .app{
    width:min(1000px, 96vw); background:var(--card);
    border-radius:18px; box-shadow:0 10px 30px rgba(0,0,0,.35);
    padding:20px;
  }
  .head{
    display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px;
  }
  .head h1{font-size:20px; margin:0; font-weight:700; letter-spacing:.2px; color:#eaf6ff;}
  .controls{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .btn{
    border:0; border-radius:12px; padding:10px 16px; font-weight:700;
    background:#1e2633; color:#d9e7ff; cursor:pointer;
    transition:transform .02s ease, background .2s ease, box-shadow .2s ease;
  }
  .btn:active{ transform: translateY(1px); }
  .btn.primary{ background: #1b90ff; color:white; }
  .btn.next{ background:#2b3342; }
  .btn:disabled{ opacity:.6; cursor:not-allowed; }

  .board{
    display:grid; grid-template-columns: 1fr 14px 1fr; align-items:stretch;
    border-radius:14px; overflow:hidden; border:1px solid #263044;
    background: #0f141c;
  }
  .panel{
    display:flex; align-items:center; justify-content:center;
    min-height:220px; padding:18px; text-align:center;
  }
  .divider{background:#263044;}
  .panel h2{font-size:14px; font-weight:700; color:var(--muted); letter-spacing:.5px; margin:0 0 10px;}
  .slope{
    display:flex; flex-direction:column; align-items:center; gap:12px;
  }

  /* Fraction styling */
  .frac{
    display:inline-flex; flex-direction:column; align-items:center; justify-content:center;
    font-size: clamp(40px, 10vw, 90px); line-height:1.05; font-weight:800; letter-spacing:.5px;
  }
  .frac .num, .frac .den{ padding:0 .2em; }
  .frac .bar{
    width:100%; height:6px; background:linear-gradient(90deg,#5ad0ff,#9fd7ff);
    border-radius:3px; margin:.08em 0;
  }
  .int{
    font-size: clamp(40px, 10vw, 90px); font-weight:800; line-height:1.05; letter-spacing:.5px;
  }
  .sign{ font-size: clamp(32px, 6vw, 54px); margin-right:.15em; opacity:.9 }

  /* Options */
  .options{
    display:flex; gap:18px; flex-wrap:wrap; justify-content:center; margin:18px 0 8px;
  }
  .chip{
    display:flex; align-items:center; gap:10px; background:#141a24; padding:10px 14px; border-radius:999px;
    border:1px solid #263044; cursor:pointer; user-select:none;
  }
  .chip input{ accent-color:#1b90ff; width:18px; height:18px; }
  .feedback{
    text-align:center; font-weight:800; letter-spacing:.3px; margin-top:6px; min-height:28px;
  }
  .ok{ color:var(--ok); }
  .err{ color:var(--err); }

  .meta{
    display:flex; justify-content:center; gap:16px; color:var(--muted); font-size:12px; margin-top:6px;
  }

  /* Accessibility focus */
  .btn:focus-visible, .chip:has(input:focus-visible){
    outline: 3px solid #59c6ff; outline-offset: 2px;
  }

/* === Chromebook & Mobile Safety Overrides (Parallel/Perpendicular Drill) === */

/* Fit inside Google Sites iframes and allow scroll on short screens */
html, body { height:auto; min-height:100dvh; }
body { overflow:auto; }

/* Respect parent container width (avoids vw weirdness inside embeds) */
.app { width:min(1000px, 100%); }

/* Keep the header controls reachable while content scrolls */
.head { position: sticky; top: 0; z-index: 3; background: var(--card); padding-top: 6px; }

/* When the viewport is short (Chromebooks, split view, landscape phones),
   align to the top so nothing gets clipped by vertical centering */
@media (max-height: 820px){
  body { align-items:flex-start; }
  .app { margin:12px auto; }
}

/* Narrow screens: stack the two slope panels; keep everything readable */
@media (max-width: 720px){
  .board { grid-template-columns: 1fr; }
  .divider { display:none; }
  .panel { min-height: 180px; padding: 16px; }
  .controls { flex-wrap: wrap; gap: 8px; }
  .options { gap: 12px; }
}

/* Typography safety so big numerals don't shove buttons off-screen on phones */
.frac { font-size: clamp(28px, 10vw, 80px); }
.int  { font-size: clamp(28px, 10vw, 80px); }
.sign { font-size: clamp(22px, 7vw, 50px); }

/* Improve radio tap targets on very small phones */
@media (max-width: 380px){
  .chip { padding: 10px 12px; gap: 8px; }
  .chip input { width:20px; height:20px; }
}


</style>
</head>
<body>
  <div class="app">
    <div class="head">
      <h1>Parallel • Perpendicular • Neither — Slope Drill</h1>
      <div class="controls">
        <button id="submitBtn" class="btn primary">Submit</button>
        <button id="nextBtn" class="btn next">Next</button>
      </div>
    </div>

    <div class="board" aria-live="polite">
      <div class="panel">
        <div class="slope">
          <h2>Slope A</h2>
          <div id="slopeA"></div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="panel">
        <div class="slope">
          <h2>Slope B</h2>
          <div id="slopeB"></div>
        </div>
      </div>
    </div>

    <div class="options" role="radiogroup" aria-label="Choose the relationship">
      <label class="chip"><input type="radio" name="rel" value="parallel"> Parallel</label>
      <label class="chip"><input type="radio" name="rel" value="perpendicular"> Perpendicular</label>
      <label class="chip"><input type="radio" name="rel" value="neither"> Neither</label>
    </div>

    <div id="feedback" class="feedback" aria-live="polite"></div>
    <div id="meta" class="meta"></div>
  </div>

<script>
(function(){
  // -------- Utilities
  const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
  const gcd = (a,b) => { a=Math.abs(a); b=Math.abs(b); while(b){ [a,b]=[b,a%b]; } return a||1; };
  const simplify = (n,d) => {
    if(d===0) throw new Error("Denominator cannot be zero");
    if(d<0){ n=-n; d=-d; }
    const g = gcd(n,d);
    return {n: n/g, d: d/g};
  };
  const copy = o => JSON.parse(JSON.stringify(o));

  // Render slope as big fraction (or integer)
  function renderSlope(el, frac){
    el.innerHTML = "";
    const {n, d} = frac;
    const neg = n < 0;
    const absN = Math.abs(n);
    const absD = Math.abs(d);

    if (absD === 1) {
      // integer
      const wrap = document.createElement("div");
      wrap.style.display = "flex"; wrap.style.alignItems = "center"; wrap.style.justifyContent = "center";
      if(neg){ const s=document.createElement("span"); s.className="sign"; s.textContent="−"; wrap.appendChild(s); }
      const int = document.createElement("span");
      int.className="int"; int.textContent = String(absN);
      wrap.appendChild(int);
      el.appendChild(wrap);
    } else {
      const wrap = document.createElement("div");
      wrap.style.display = "flex"; wrap.style.alignItems = "center"; wrap.style.justifyContent = "center";
      if(neg){ const s=document.createElement("span"); s.className="sign"; s.textContent="−"; wrap.appendChild(s); }

      const fracEl = document.createElement("span");
      fracEl.className = "frac";
      const num = document.createElement("span"); num.className = "num"; num.textContent = String(absN);
      const bar = document.createElement("span"); bar.className = "bar";
      const den = document.createElement("span"); den.className = "den"; den.textContent = String(absD);
      fracEl.append(num, bar, den);
      wrap.appendChild(fracEl);
      el.appendChild(wrap);
    }
  }

  // Compare relationships
  function isParallel(a,b){
    // equal slopes
    return a.n * b.d === b.n * a.d;
  }
  function isPerpendicular(a,b){
    // product = -1  => (a.n/a.d)*(b.n/b.d) = -1  -> a.n*b.n = - a.d*b.d
    return (a.n * b.n) === - (a.d * b.d);
  }

  // Random rational slope (finite): numerator [-9..9]\{0}, denominator [1..9]
  // Optionally allow zero (for parallel/none), but avoid zero when we need a perpendicular pair (to keep both finite).
  function randomSlope({allowZero=true}={}){
    let n = 0;
    if(allowZero){
      // allow n=0 but not always
      do { n = randInt(-9,9); } while(n === 0 && Math.random()<0.5); // 50% chance to avoid 0
    }else{
      do { n = randInt(-9,9); } while(n === 0);
    }
    let d;
    do { d = randInt(1,9); } while(d === 0);
    return simplify(n,d);
  }

  // Build a pair with a chosen relationship
  function makePair(target){
    // Start with A
    let A;
    if (target === 'perpendicular'){
      A = randomSlope({allowZero:false}); // avoid zero to keep reciprocal finite
      // B = - (d/n) reduced
      let B = simplify(-A.d, A.n);
      // randomize equivalent forms for display (sometimes scale both by k)
      if(Math.random() < 0.35){
        const k = randInt(2,4);
        B = simplify(B.n * k, B.d * k);
      }
      return {A, B, target};
    }
    if (target === 'parallel'){
      A = randomSlope({allowZero:true});
      // B equal slope, maybe scaled
      let k = randInt(1,4);
      let B = simplify(A.n * k, A.d * k);
      return {A, B, target};
    }
    // neither
    A = randomSlope({allowZero:true});
    let tries = 0;
    while(true){
      let B = randomSlope({allowZero:true});
      const par = isParallel(A,B);
      const perp = isPerpendicular(A,B);
      if(!par && !perp){
        // avoid extremely "close" to parallel/perp visually: (optional tweak)
        return {A, B, target};
      }
      if(++tries > 200){
        // fallback: force a not-parallel, not-perp B
        B = simplify(A.n + 1, A.d + 2);
        if(!isParallel(A,B) && !isPerpendicular(A,B)) return {A,B,target};
      }
    }
  }

  // Evaluate selection to text label
  function relationshipOf(A,B){
    if(isParallel(A,B)) return 'parallel';
    if(isPerpendicular(A,B)) return 'perpendicular';
    return 'neither';
  }

  // -------- App state & wiring
  const slopeAEl = document.getElementById('slopeA');
  const slopeBEl = document.getElementById('slopeB');
  const feedbackEl = document.getElementById('feedback');
  const metaEl = document.getElementById('meta');
  const submitBtn = document.getElementById('submitBtn');
  const nextBtn = document.getElementById('nextBtn');
  const radios = Array.from(document.querySelectorAll('input[name="rel"]'));

  let current = null;
  let locked = false;

  function renderProblem(){
    feedbackEl.textContent = "";
    metaEl.textContent = "";
    radios.forEach(r => { r.checked = false; r.disabled = false; });
    submitBtn.disabled = false;
    locked = false;

    // pick target distribution
    const bucket = Math.random();
    const target = bucket < 0.34 ? 'parallel' : bucket < 0.67 ? 'perpendicular' : 'neither';
    current = makePair(target);

    renderSlope(slopeAEl, current.A);
    renderSlope(slopeBEl, current.B);
  }

  function getChoice(){
    const checked = radios.find(r => r.checked);
    return checked ? checked.value : null;
  }

  function lockInputs(){ radios.forEach(r => r.disabled = true); submitBtn.disabled = true; locked = true; }

  function onSubmit(){
    if(locked) return;
    const choice = getChoice();
    if(!choice){
      feedbackEl.className = "feedback err";
      feedbackEl.textContent = "Choose an option first.";
      return;
    }
    const truth = relationshipOf(current.A, current.B);
    const ok = (choice === truth);
    lockInputs();
    feedbackEl.className = "feedback " + (ok ? "ok" : "err");
    feedbackEl.textContent = ok ? "Correct ✓" : "Incorrect ✗";

    // Small explanation (optional but helpful)
    const A = current.A, B = current.B;
    const num = (x)=> x.n + "/" + x.d;
    let msg = "";
    if(truth === 'parallel'){
      msg = `Parallel because ${A.n}·${B.d} = ${B.n}·${A.d} (${A.n*B.d} = ${B.n*A.d}).`;
    }else if(truth === 'perpendicular'){
      msg = `Perpendicular because (${A.n}/${A.d})·(${B.n}/${B.d}) = -1 (${A.n*B.n} = -${A.d*B.d}).`;
    }else{
      const par = A.n*B.d, parR = B.n*A.d;
      const perpL = A.n*B.n, perpR = -A.d*B.d;
      msg = `Neither because not equal slopes (${par} ≠ ${parR}) and product ≠ -1 (${perpL} ≠ ${perpR}).`;
    }
    metaEl.textContent = msg;
  }

  submitBtn.addEventListener('click', onSubmit);
  nextBtn.addEventListener('click', renderProblem);

  // Keyboard shortcuts: 1/2/3 select option, Enter submit, N next
  window.addEventListener('keydown', (e)=>{
    if(e.key === '1') radios[0].checked = true;
    if(e.key === '2') radios[1].checked = true;
    if(e.key === '3') radios[2].checked = true;
    if(e.key === 'Enter') onSubmit();
    if(e.key.toLowerCase() === 'n') renderProblem();
  });

  // Init
  renderProblem();
})();
</script>
</body>
</html>
