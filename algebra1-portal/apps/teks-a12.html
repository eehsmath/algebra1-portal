<!DOCTYPE html>
<html lang="en">
<head>

<title>A.12 Studio — Equations, Relations &amp; Functions</title>
<style>
  :root{
    --bg:#eef3ff; --panel:#fff; --ui:#dfe6ff; --ink:#0f2340; --muted:#5b6f96;
    --blue:#2f6cff; --teal:#36c2a0; --gold:#f4c431; --danger:#e5484d; --vio:#8e78ff;
    --accent:#f4a531; --shadow:0 8px 20px rgba(25,40,80,.06);
  }
  *{box-sizing:border-box}
  html,body{min-height:100dvh}
  body{margin:0; background:var(--bg); color:var(--ink); overflow:auto;
    font-family:ui-rounded, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif}
  .wrap{width:min(1240px,100%); margin:14px auto; padding:0 12px}
  .hdr{background:var(--panel); border:1px solid var(--ui); border-radius:16px; box-shadow:var(--shadow);
    padding:12px 16px; margin-bottom:12px; display:flex; align-items:center; gap:12px; flex-wrap:wrap}
  .back{font-weight:900; text-decoration:none; color:var(--blue); font-size:14px; padding:8px 12px;
    border:1px solid var(--ui); border-radius:10px; background:#fff}
  .hdr h1{margin:0; font-size:clamp(17px,2.6vw,22px); font-weight:900; flex:1; min-width:200px}
  .hdr .eyebrow{display:block; font-size:11px; letter-spacing:.8px; color:var(--muted); text-transform:uppercase; font-weight:900}
  .pill{display:inline-block; padding:6px 12px; border-radius:999px; border:1px solid var(--ui);
    background:#fff; font-weight:900; font-size:13px}
  .pill b{color:var(--blue)}
  .cols{display:grid; grid-template-columns:250px 1fr; gap:12px; align-items:start}
  @media (max-width:900px){ .cols{grid-template-columns:1fr} }
  .rail{background:var(--panel); border:1px solid var(--ui); border-radius:16px; box-shadow:var(--shadow); padding:10px}
  .rail .rh{font-size:11px; letter-spacing:.8px; color:var(--muted); text-transform:uppercase; font-weight:900; padding:4px 8px 8px}
  .stones{display:flex; flex-direction:column; position:relative}
  .stones::before{content:""; position:absolute; left:24px; top:18px; bottom:18px; border-left:3px dotted #d5deff}
  .stone{display:flex; align-items:center; gap:10px; padding:6px 8px; border:0; background:none;
    border-radius:12px; cursor:pointer; text-align:left; font-family:inherit; color:var(--ink); width:100%}
  .stone:hover{background:#f5f8ff}
  .stone.active{background:#eef4ff; outline:2px solid #bcd2ff}
  .stone .dot{width:34px; height:34px; flex:none; border-radius:50%; border:3px solid #d5deff; background:#fff;
    z-index:1; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:13px; color:var(--muted)}
  .stone.started .dot{border-color:var(--accent); color:var(--ink)}
  .stone.mastered .dot{background:var(--accent); border-color:var(--accent); color:#fff}
  .stone .nm{font-weight:900; font-size:13px; line-height:1.2}
  .stone .mini{height:5px; border-radius:999px; background:#edf2ff; margin-top:4px; overflow:hidden; width:110px}
  .stone .mini i{display:block; height:100%; background:var(--accent); border-radius:999px}
  @media (max-width:900px){
    .rail{position:sticky; top:8px; z-index:5}
    .stones{flex-direction:row; overflow-x:auto; gap:6px; padding-bottom:4px}
    .stones::before{display:none}
    .stone{flex:none; flex-direction:column; gap:4px; padding:6px; width:auto; min-width:74px}

    .stone .nm{font-size:11px; text-align:center; max-width:90px}

  .seHead{display:flex; justify-content:space-between; gap:10px; align-items:flex-start; flex-wrap:wrap;

  .seHead .blurb{color:var(--muted); font-weight:700; font-size:13px; margin-top:3px; max-width:640px}

  .prompt{font-size:clamp(17px,2.4vw,21px); font-weight:800; line-height:1.55; margin:6px 0 14px}
  .prompt .given{background:#f6f9ff; border:1px solid #e7edff; border-radius:12px; padding:10px 14px;
    display:inline-block; margin-top:8px; font-size:clamp(19px,3vw,26px)}

    font-size:.72em; line-height:1.05; font-weight:900; margin:0 2px}
  .vfrac span:first-child{border-bottom:2.5px solid currentColor; padding:0 4px}
  .vfrac span:last-child{padding:0 4px}
  table.ttab{border-collapse:collapse; margin-top:8px; font-size:clamp(16px,2.4vw,20px)}
  .ttab th,.ttab td{border:2px solid #d9e2ff; padding:6px 16px; text-align:center; font-weight:900; min-width:54px}
  .ttab th{background:#f1f6ff; color:#133a9a}
  .answer{display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:clamp(20px,3.4vw,28px); font-weight:900; margin:10px 0 6px}
  .answer .lbl{font-size:15px; color:var(--muted); width:100%; font-weight:900}
  .in{height:56px; width:96px; border:2px solid var(--ui); border-radius:12px; text-align:center;
    font-weight:900; font-size:22px; font-family:inherit; color:var(--ink)}
  .in.wide{width:120px}
  .in:focus-visible, .sel:focus-visible, button:focus-visible{outline:3px solid #59c6ff; outline-offset:2px}
  .sel{height:56px; border:2px solid var(--ui); border-radius:12px; font-weight:900; font-size:20px;

  .sysRow{display:flex; align-items:center; gap:8px; margin:6px 0}
  .radio{display:flex; gap:16px; flex-wrap:wrap; font-size:16px; margin-top:6px}
  .radio label{display:flex; align-items:center; gap:6px; font-weight:800; cursor:pointer}

  .mc{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px}
  @media (max-width:720px){ .mc{grid-template-columns:1fr} }
  .mc button{border:2px solid var(--ui); background:#fff; border-radius:14px; padding:12px 14px;
    font-family:inherit; font-weight:800; font-size:15.5px; text-align:left; cursor:pointer; color:var(--ink); line-height:1.5}

  .mc button:disabled{cursor:default; opacity:.85}
  .mc button.right{border-color:#7de0a6; background:#eafff2}
  .mc button.wrong{border-color:#ffb3b3; background:#fff3f3}
  .btnRow{display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; align-items:center}
  .btn{height:46px; border-radius:12px; border:1px solid var(--ui); background:#fff; font-weight:900;
    padding:0 16px; cursor:pointer; font-family:inherit; font-size:15px; color:var(--ink)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.55; cursor:not-allowed}
  .btn.check{border:0; background:linear-gradient(90deg,var(--blue),var(--teal)); color:#081635; min-width:110px}
  .btn.hint{border:0; background:linear-gradient(90deg,#ffe6a8,#ffcf70); color:#081635}
  .btn.steps{border:0; background:linear-gradient(90deg,#cfe0ff,#9bb9ff); color:#081635}
  .btn.next{background:#f6f9ff}
  .fb{font-weight:900; font-size:17px; min-height:26px; margin-top:8px}
  .fb.ok{color:#0b6b2f} .fb.bad{color:#a33232}
  .note{background:#fff9d6; border:1px solid #ffe38a; color:#7a5a00; border-radius:12px; padding:10px 14px;
    font-weight:800; font-size:14.5px; margin-top:10px; display:none; line-height:1.55}
  .note.show{display:block}
  .stepsBox{background:#f6f9ff; border:1px solid #e7edff; border-radius:12px; padding:12px 16px;
    font-weight:800; font-size:15.5px; margin-top:10px; display:none; line-height:1.8}
  .stepsBox.show{display:block}
  .stepsBox .st{display:block; margin:2px 0}
  .stepsBox .final{color:#133a9a}
  .kbdnote{color:var(--muted); font-size:12px; font-weight:800; margin-top:10px}
  .drSeg,.drTog{display:inline-flex; border:1px solid var(--ui); border-radius:12px; overflow:hidden}
  .drSeg button,.drTog button{background:#fff; border:none; padding:7px 10px; font-size:12.5px; font-weight:800;
    cursor:pointer; font-family:inherit; color:var(--ink)}
  .drSeg button.active{background:#f1f6ff; color:#133a9a}
  .drTog button.active{background:#eafff7; color:#0c6d54}
  .grid{max-width:100%;height:auto;border:1px solid #e7edff;border-radius:12px;background:#fff;margin-top:10px}
  .qhead{font-weight:900; margin-top:14px}
</style>

<script src="../portal.js"></script>
<script>
(function(){
'use strict';

/* ===== PURE MATH LIBRARY ===== */
function ri(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function rc(arr){ return arr[ri(0,arr.length-1)]; }
function rnz(a,b){ var x=0; while(x===0) x=ri(a,b); return x; }
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ var t=a%b; a=b; b=t; } return a||1; }
function R(n,d){ d=(d===undefined)?1:d; if(d<0){n=-n;d=-d;} var g=gcd(n,d); return {n:n/g, d:d/g}; }
function radd(a,b){ return R(a.n*b.d + b.n*a.d, a.d*b.d); }
function rsub(a,b){ return R(a.n*b.d - b.n*a.d, a.d*b.d); }
function rmul(a,b){ return R(a.n*b.n, a.d*b.d); }
function req(a,b){ return a.n*b.d === b.n*a.d; }
function rint(x){ return R(x,1); }
function parseRat(s){
  if(s===null || s===undefined) return null;
  s = String(s).trim().replace(/\u2212/g,'-').replace(/\s+/g,'');
  if(!s || !/\d/.test(s)) return null;
  var m = s.match(/^(-?\d+)\/(-?\d+)$/);
  if(m){ var d=parseInt(m[2],10); if(!d) return null; return R(parseInt(m[1],10), d); }
  if(/^-?\d+$/.test(s)) return R(parseInt(s,10),1);
  m = s.match(/^(-)?(\d*)\.(\d+)$/);
  if(m){ var neg=!!m[1], ip=m[2]||'0', fp=m[3];
    var den=Math.pow(10,fp.length), num=parseInt(ip,10)*den + parseInt(fp,10);
    return R(neg?-num:num, den); }
  return null;
}
var MIN='\u2212';
function fmtInt(x){ return x<0 ? MIN+Math.abs(x) : String(x); }
function ratHTML(r){
  if(r.d===1) return fmtInt(r.n);
  var s = r.n<0 ? MIN : '';
  return s+'<span class="vfrac"><span>'+Math.abs(r.n)+'</span><span>'+r.d+'</span></span>';
}
function tableHTML(xs,ys){
  var h='<table class="ttab"><tr><th>x</th>';
  xs.forEach(function(x){ h+='<td>'+fmtInt(x)+'</td>'; });
  h+='</tr><tr><th>y</th>';
  ys.forEach(function(y){ h+='<td>'+fmtInt(y)+'</td>'; });
  h+='</tr></table>';
  return h;
}

/* ---- polynomial helpers (coeffs LOW-to-HIGH degree) ---- */
function polyHTML(coeffs){
  var deg=coeffs.length-1, s='', first=true;
  for(var d=deg; d>=0; d--){
    var c=coeffs[d];
    if(c===0) continue;
    var ac=Math.abs(c), term;
    if(d===0) term=String(ac);
    else if(d===1) term=(ac===1?'':String(ac))+'x';
    else term=(ac===1?'':String(ac))+'x<sup>'+d+'</sup>';
    if(first){ s += (c<0?MIN:'')+term; first=false; }
    else { s += (c<0?' '+MIN+' ':' + ')+term; }
  }
  return first ? '0' : s;
}
function polyMul(a,b){
  var res=new Array(a.length+b.length-1).fill(0);
  for(var i=0;i<a.length;i++) for(var j=0;j<b.length;j++) res[i+j]+=a[i]*b[j];
  return res;
}
function polyEval(coeffs,x){
  var v=0, p=1;
  for(var i=0;i<coeffs.length;i++){ v+=coeffs[i]*p; p*=x; }
  return v;
}
function composeLinearSub(baseCoeffs, subCoeffs){
  var pow0=[1], pow1=subCoeffs.slice(), pow2=polyMul(subCoeffs,subCoeffs);
  var powers=[pow0,pow1,pow2];
  var result=new Array(baseCoeffs.length).fill(0);
  baseCoeffs.forEach(function(coef,i){
    var term=powers[i];
    for(var j=0;j<term.length;j++) result[j]+=coef*term[j];
  });
  return result;
}

function leadTermInt(coef,varLabel){ return (coef===1?'':(coef===-1?MIN:fmtInt(coef)))+varLabel; }
function leadTermRat(r,varLabel){
  if(r.d===1){ if(r.n===1) return varLabel; if(r.n===-1) return MIN+varLabel; return fmtInt(r.n)+varLabel; }
  return ratHTML(r)+varLabel;
}
function joinConstInt(coef){ return coef<0 ? ' '+MIN+' '+Math.abs(coef) : ' + '+coef; }
function joinConstRat(r){ return r.n<0 ? ' '+MIN+' '+ratHTML(R(-r.n,r.d)) : ' + '+ratHTML(r); }
function joinVarInt(coef,varLabel){ var ac=Math.abs(coef); var mag=(ac===1?'':String(ac))+varLabel; return coef<0 ? ' '+MIN+' '+mag : ' + '+mag; }
function joinSignedTerms(parts){
  var s='';
  parts.forEach(function(t,idx){
    if(idx===0) s += (t.coef<0?MIN:'')+t.mag;
    else s += (t.coef<0 ? ' '+MIN+' ' : ' + ')+t.mag;
  });
  return s;
}

/* ---- UI helpers ---- */
function inBox(id, wide){ return '<input class="in'+(wide?' wide':'')+'" id="'+id+'" inputmode="text" autocomplete="off" />'; }
function seg(id,cur,opts){
  var h='<div class="drSeg" id="'+id+'" role="tablist">';
  opts.forEach(function(o){ h+='<button type="button" data-v="'+o[0]+'">'+o[1]+'</button>'; });
  return h+'</div>';
}
function segWrap(label,id,cur,opts){
  return '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">'+
    '<span style="font-size:12px;font-weight:900;letter-spacing:.4px;color:var(--muted)">'+label+'</span>'+
    seg(id,cur,opts)+'</div>';
}
function wireSeg(id,cur,cb){
  var box=document.getElementById(id); if(!box) return;
  Array.prototype.forEach.call(box.querySelectorAll('button'),function(btn){
    if(btn.getAttribute('data-v')===cur) btn.classList.add('active');
    btn.addEventListener('click',function(){
      Array.prototype.forEach.call(box.querySelectorAll('button'),function(b){b.classList.remove('active');});
      btn.classList.add('active'); cb(btn.getAttribute('data-v'));
    });
  });
}

/* ---- multiple-choice helpers ---- */
function makeMC(items, correctIdx){
  var idxArr = items.map(function(_,i){ return i; });
  for(var i=idxArr.length-1;i>0;i--){ var j=ri(0,i); var t=idxArr[i]; idxArr[i]=idxArr[j]; idxArr[j]=t; }
  var opts = idxArr.map(function(i){ return items[i]; });
  var correct = idxArr.indexOf(correctIdx);
  return {opts:opts, correct:correct};
}
function mcHTML(id, mc){
  var h='<div class="mc" id="'+id+'">';
  mc.opts.forEach(function(o,i){ h+='<button type="button" data-i="'+i+'">'+o+'</button>'; });
  return h+'</div>';
}
function mcSelected(id){
  var host=document.getElementById(id); if(!host) return null;
  var sel=host.querySelectorAll ? Array.prototype.filter.call(host.querySelectorAll('button'), function(b){ return b.classList.contains('sel'); })[0] : null;
  return sel ? parseInt(sel.getAttribute('data-i')) : null;
}
function wireMC(id){
  var host=document.getElementById(id); if(!host || !host.querySelectorAll) return;
  Array.prototype.forEach.call(host.querySelectorAll('button'), function(btn){
    btn.addEventListener('click', function(){
      if(btn.disabled) return;
      Array.prototype.forEach.call(host.querySelectorAll('button'), function(b){ b.classList.remove('sel'); });
      btn.classList.add('sel');
    });
  });
}
function markMC(id, correct, chosen){
  var host=document.getElementById(id); if(!host || !host.querySelectorAll) return;
  Array.prototype.forEach.call(host.querySelectorAll('button'), function(btn){
    var i=parseInt(btn.getAttribute('data-i'));
    btn.disabled=true;
    if(i===correct) btn.classList.add('right');
    else if(i===chosen) btn.classList.add('wrong');
  });
}

/* ---- points-only signed grid (for the vertical-line-test graph) ---- */
function plotPointsGrid(o){
  o=o||{}; var Rg=o.Rg||7, S=Math.round(288/(2*Rg)), W=2*Rg*S, H=W, i;
  function X(x){ return (x+Rg)*S; }
  function Y(y){ return (Rg-y)*S; }
  var s='<svg viewBox="0 0 '+W+' '+H+'" width="300" height="300" class="grid" xmlns="http://www.w3.org/2000/svg">';
  for(i=-Rg;i<=Rg;i++){
    s+='<line x1="'+X(i)+'" y1="0" x2="'+X(i)+'" y2="'+H+'" stroke="#e9eefb" stroke-width="1"/>';
    s+='<line x1="0" y1="'+Y(i)+'" x2="'+W+'" y2="'+Y(i)+'" stroke="#e9eefb" stroke-width="1"/>';
  }
  s+='<line x1="'+X(0)+'" y1="0" x2="'+X(0)+'" y2="'+H+'" stroke="#9db4e8" stroke-width="2"/>';
  s+='<line x1="0" y1="'+Y(0)+'" x2="'+W+'" y2="'+Y(0)+'" stroke="#9db4e8" stroke-width="2"/>';
  for(i=-Rg;i<=Rg;i+=2){ if(i===0) continue;
    s+='<text x="'+X(i)+'" y="'+(Y(0)+14)+'" font-size="11" font-weight="700" fill="#5b6f96" text-anchor="middle">'+i+'</text>';
    s+='<text x="'+(X(0)-6)+'" y="'+(Y(i)+4)+'" font-size="11" font-weight="700" fill="#5b6f96" text-anchor="end">'+i+'</text>';
  }
  (o.points||[]).forEach(function(Pt){
    s+='<circle cx="'+X(Pt.x)+'" cy="'+Y(Pt.y)+'" r="6" fill="'+(Pt.color||'#2f6cff')+'" stroke="'+(Pt.color||'#2f6cff')+'" stroke-width="2"/>';
  });
  return s+'</svg>';
}

/* =====================================================================
   A.12A — Is It a Function? (verbal, table, graph, symbolic)
   ===================================================================== */
var cMode12A='mix';
var VERBAL_BANK=[
  {text:'Each student in the class is assigned exactly one locker number.', isFunc:true, reason:'Every student (input) has exactly one locker (output) \u2014 no student has two lockers.'},
  {text:'Each locker is assigned to all of the students who have used it over the years.', isFunc:false, reason:'One locker (input) can be linked to many different students (multiple outputs) over time.'},
  {text:'Each U.S. citizen has exactly one Social Security number.', isFunc:true, reason:'Every citizen (input) maps to exactly one number (output).'},
  {text:'Each Social Security number is linked to everyone who has ever lived at a shared address.', isFunc:false, reason:'One number (input) could be linked to several different people (multiple outputs).'},
  {text:'Each item in a store has exactly one price tag.', isFunc:true, reason:'Every item (input) has exactly one price (output).'},
  {text:'Each price in the store corresponds to every item that costs that much.', isFunc:false, reason:'One price (input) could match many different items (multiple outputs).'},
  {text:'Each car has exactly one license plate number.', isFunc:true, reason:'Every car (input) has exactly one plate number (output).'},
  {text:'Each temperature reading is linked to every city that recorded it on a given day.', isFunc:false, reason:'One temperature (input) could be linked to many different cities (multiple outputs).'},
  {text:'Each student is assigned exactly one student ID number.', isFunc:true, reason:'Every student (input) has exactly one ID (output).'},
  {text:'Each grade level is linked to every student enrolled in it.', isFunc:false, reason:'One grade level (input) is linked to many students (multiple outputs).'}
];
var SYMBOLIC_BANK=[
  {eq:'y = 2x + 5', isFunc:true, reason:'For every x, this formula gives exactly one y.'},
  {eq:'y = x\u00b2 \u2212 3', isFunc:true, reason:'For every x, squaring gives exactly one result, so there is exactly one y.'},
  {eq:'y = |x|', isFunc:true, reason:'Absolute value always gives exactly one output for each input.'},
  {eq:'y = 7', isFunc:true, reason:'Every x gives the same single output, y = 7 \u2014 still exactly one output per input.'},
  {eq:'x = y\u00b2', isFunc:false, reason:'Solving for y gives y = \u00b1\u221ax \u2014 most x-values produce two different y-values.'},
  {eq:'x\u00b2 + y\u00b2 = 25', isFunc:false, reason:'This is a circle \u2014 most x-values correspond to two y-values (above and below the center).'},

function genPoints(n, forceDuplicate){
  var pts=[], usedX=[];
  for(var i=0;i<n;i++){
    var x;
    do{ x=ri(-6,6); } while(usedX.indexOf(x)!==-1);
    usedX.push(x);
    pts.push({x:x, y:ri(-6,6)});
  }
  if(forceDuplicate){
    var idx=ri(0,pts.length-1), dupX=pts[idx].x, dupY;
    do{ dupY=ri(-6,6); } while(dupY===pts[idx].y);
    pts.push({x:dupX, y:dupY});
  }
  return pts;
}
function genA12A(kind){

    return {kind:kind, isFunc:sB.isFunc, eq:sB.eq, reason:sB.reason, q1:makeMC(['Yes','No'], sB.isFunc?0:1)};

  // table or graph
  var isFunc=Math.random()<0.5;

  else { for(var i=pts.length-1;i>0;i--){ var j=ri(0,i); var t=pts[i]; pts[i]=pts[j]; pts[j]=t; } }
  return {kind:kind, isFunc:isFunc, pts:pts, q1:makeMC(['Yes','No'], isFunc?0:1)};
}

/* =====================================================================
   A.12B — Evaluate Functions in Function Notation
   ===================================================================== */
function genB12B(){
  var degree=rc([1,2]);
  var coeffs = degree===2 ? [ri(-6,6), ri(-6,6), rnz(-6,6)] : [ri(-6,6), rnz(-6,6)];
  var mode=rc(['numeric','symbolic']);
  if(mode==='numeric'){
    var k=ri(-6,6);
    var value=polyEval(coeffs,k);
    return {mode:mode, coeffs:coeffs, k:k, value:R(value,1)};
  }
  var subKind=rc(['negX','xPlus1','2x']);
  var subCoeffs = subKind==='negX' ? [0,-1] : (subKind==='xPlus1' ? [1,1] : [0,2]);
  var subLabel = subKind==='negX' ? '\u2212x' : (subKind==='xPlus1' ? 'x + 1' : '2x');
  var result = composeLinearSub(coeffs, subCoeffs);
  return {mode:mode, coeffs:coeffs, subKind:subKind, subLabel:subLabel, result:result};
}

   ===================================================================== */
function seqTerm(type, a1, param, n){
  if(type==='arith') return radd(a1, rmul(rint(n-1), param));
  var val=a1;
  for(var i=1;i<n;i++) val=rmul(val,param);
  return val;
}
function genC12C(){
  var type=rc(['arith','geom']);
  var a1,param,k;
  if(type==='arith'){
    a1=R(ri(-10,10),1); param=R(rnz(-6,6),1); k=ri(4,7);
  } else {
    a1=R(rc([1,2,3,4,-1,-2,-3,-4]),1);
    param=rc([R(2,1),R(3,1),R(-2,1),R(-3,1),R(1,2),R(1,3),R(-1,2)]);
    k = (Math.abs(param.n/param.d)>=3) ? ri(3,4) : ri(3,6);
  }
  return {type:type, a1:a1, param:param, k:k, value:seqTerm(type,a1,param,k)};
}

function genD12D(){

    var rChoices = flavor==='consecutive' ? [R(2,1),R(3,1),R(-2,1),R(-3,1),R(1,2),R(1,3),R(-1,2)] : [R(2,1),R(3,1),R(1,2),R(1,3)];
    param=rc(rChoices);
  }
  var n1,n2;
  if(flavor==='nonconsecutive'){
    n1=ri(2,4);
    var gap = type==='geom' ? rc([1,2]) : rc([2,3,4]);

    terms.tn1=seqTerm(type,a1,param,n1);
    terms.tn2=seqTerm(type,a1,param,n2);
  }
  return {type:type, flavor:flavor, a1:a1, param:param, n1:n1, n2:n2, terms:terms};
}

      s+='<span class="st">1. Substitute the given values into '+e.name+'.</span>';
      s+='<span class="st">2. Isolate '+e.solveFor+' using inverse operations.</span>';
      s+='<span class="st final">'+e.template.replace('___', ratHTML(p.coef))+'</span>';
    } else if(p.shape==='twoTermStandardForm'){
      s+='<span class="st">1. Subtract '+fmtInt(p.a)+'x from both sides: '+fmtInt(p.b)+'y = '+fmtInt(p.c)+' '+(p.a>=0?MIN+' '+p.a:'+ '+(-p.a))+'x</span>';
      s+='<span class="st">2. Divide every term by '+fmtInt(p.b)+'.</span>';
      s+='<span class="st final">y = '+leadTermRat(p.M,'x')+joinConstRat(p.K)+'</span>';
    } else {
      s+='<span class="st">1. Subtract '+fmtInt(p.b)+' from both sides: '+fmtInt(p.m)+'x = y '+(p.b>=0?MIN+' '+p.b:'+ '+(-p.b))+'</span>';
      s+='<span class="st">2. Divide every term by '+fmtInt(p.m)+'.</span>';
      s+='<span class="st final">x = '+leadTermRat(p.P,'y')+joinConstRat(p.Q)+'</span>';
    }
    return s;
  },
  emptyMsg:'Fill in every box.',
  init:function(p){ wireSeg('litSeg',cMode12E,function(v){ cMode12E=v; newProblem(); }); }
};

var SES=[SE_A12A, SE_A12B, SE_A12C, SE_A12D, SE_A12E];

/* ===== THE FIXED CONTROLLER (unchanged between modules) ===== */
var current={se:SES[0], p:null, done:false, recorded:false, hintIdx:0, hintLogged:false};
var session={a:0,c:0};
var $=function(s){return document.querySelector(s);};

function stoneStats(id){
  return (window.Portal && Portal.skill) ? Portal.skill(id) : {progress:0, attempts:0, mastered:false};
}
function renderRail(){
  var host=$('#stones'); host.innerHTML='';
  SES.forEach(function(se){
    var st=stoneStats(se.id);
    var cls='stone'+(se===current.se?' active':'')+(st.mastered?' mastered':st.attempts?' started':'');
    var b=document.createElement('button');
    b.type='button'; b.className=cls;
    b.innerHTML='<span class="dot">'+(st.mastered?'\u2713':se.letter)+'</span>'+
      '<span><span class="nm">'+se.id+' \u00b7 '+se.short+'</span>'+
      '<span class="mini"><i style="width:'+Math.round(st.progress*100)+'%"></i></span></span>';
    b.addEventListener('click', function(){ current.se=se; newProblem(); });
    host.appendChild(b);
  });
}
function newProblem(){
  var se=current.se;
  current.p=se.gen(); current.done=false; current.recorded=false; current.hintIdx=0; current.hintLogged=false;
  $('#seTitle').innerHTML=se.title;
  $('#seBlurb').textContent=se.blurb;
  $('#seTag').textContent='TEKS '+se.id;
  $('#prompt').innerHTML=se.prompt(current.p);
  $('#answerArea').innerHTML=se.answerHTML(current.p);
  $('#fb').textContent=''; $('#fb').className='fb';
  $('#hintBox').className='note'; $('#hintBox').innerHTML='';
  $('#stepsBox').className='stepsBox'; $('#stepsBox').innerHTML='';
  $('#checkBtn').disabled=false;
  if(se.init) se.init(current.p);
  renderRail();
  var first=$('#answerArea input'); if(first) first.focus();
}
function onCheck(){
  if(current.done) return;
  var se=current.se, ans=se.read(current.p);
  if(!ans){
    $('#fb').className='fb bad';
    $('#fb').textContent=se.emptyMsg||'Fill in every box — fractions like 3/4 are fine.';
    return;
  }
  var ok=se.check(current.p, ans);
  if(se.allowRecheck){ if(ok) current.done=true; }
  else { current.done=true; $('#checkBtn').disabled=true; if(se.reveal) se.reveal(current.p); }
  if(!current.recorded){
    current.recorded=true;
    session.a++; if(ok) session.c++;
    $('#sesScore').textContent=session.c+' / '+session.a;
    if(window.Portal && Portal.record) Portal.record(se.id, ok);
  }
  $('#fb').className='fb '+(ok?'ok':'bad');
  $('#fb').textContent= ok?'Correct \u2713'
    : (se.allowRecheck?'Not quite \u2717 — read the tips, adjust, and check again.'
                      :'Not quite \u2717 — open the steps to see the path.');
  renderRail();
}
function onHint(){
  var hints=current.se.hints(current.p);
  var h=hints[Math.min(current.hintIdx, hints.length-1)];
  current.hintIdx++;
  var box=$('#hintBox'); box.classList.add('show');
  box.innerHTML += (box.innerHTML?'<br>':'')+'\u2022 '+h;
  if(!current.hintLogged && window.Portal && Portal.hint){ Portal.hint(current.se.id); current.hintLogged=true; }
}
function onSteps(){
  var box=$('#stepsBox'); box.classList.add('show');
  box.innerHTML=current.se.steps(current.p);
  if(!current.hintLogged && window.Portal && Portal.hint){ Portal.hint(current.se.id); current.hintLogged=true; }
}
$('#checkBtn').addEventListener('click', onCheck);
$('#hintBtn').addEventListener('click', onHint);
$('#stepsBtn').addEventListener('click', onSteps);
$('#nextBtn').addEventListener('click', newProblem);
window.addEventListener('keydown', function(e){
  var tag=(e.target.tagName||'').toLowerCase();
  if(e.key==='Enter' && tag!=='select'){ e.preventDefault(); onCheck(); }
  if((e.key==='n'||e.key==='N') && tag!=='input'){ newProblem(); }
});

var want=new URLSearchParams(location.search).get('se');
if(want){ var f=SES.filter(function(s){return s.id.toLowerCase()===want.toLowerCase();})[0]; if(f) current.se=f; }
newProblem();

})();
</script>
</body>
</html>
