<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Domain & Range Lab — zen final</title>
<style>
  :root{
    --bg:#eef3ff; --panel:#fff; --ui:#d8e2ff; --ink:#0f2340;
    --blue:#2f6cff; --teal:#36c2a0; --pink:#ff5fa2; --vio:#8e78ff; --gold:#f4c431;
    --ioH:56px; --btnH:48px; --radius:14px;
  }
  *{box-sizing:border-box}
  body{ margin:0; background:var(--bg); color:var(--ink);
        font-family:ui-rounded, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
  .app{ max-width:1240px; margin:18px auto; padding:0 12px;
        display:grid; grid-template-columns:1fr 520px; gap:12px; }
  .card{ background:var(--panel); border:1px solid var(--ui); border-radius:16px;
         box-shadow:0 8px 20px rgba(25,40,80,.06); }

  /* LEFT */
  .stage{ position:relative; padding:8px }
  .title{ font-weight:900; font-size:18px; padding:6px 6px 2px }
  .canvas-wrap{ position:relative }
  #canvas{ width:100%; aspect-ratio:1; display:block; border-radius:12px;
           border:1px solid #e7edff; background:#fff; touch-action:none }
  #toolBadge{ position:absolute; left:12px; top:10px; padding:4px 8px; border-radius:10px; font-size:12px; font-weight:800;
    background:#eef3ff; border:1px solid var(--ui); color:#1b3a7a; display:none; pointer-events:none }

  /* RIGHT */
  .panel{ padding:12px; display:flex; flex-direction:column; gap:10px }
  .top-line{ display:flex; align-items:center; gap:10px; flex-wrap:wrap }
  .seg{ display:inline-flex; border:1px solid var(--ui); border-radius:12px; overflow:hidden }
  .seg.xs button{ padding:6px 9px; font-size:12px }
  .seg button{ background:#fff; border:none; font-weight:800; cursor:pointer }
  .seg button.active{ background:#f1f6ff; color:#133a9a }
  .seg button[aria-disabled="true"]{ opacity:.33; pointer-events:none; filter:grayscale(.4) }
  .pipe{ opacity:.5; font-weight:900; padding:0 2px; user-select:none }
  .tog{ display:inline-flex; border:1px solid var(--ui); border-radius:12px; overflow:hidden }
  .tog button{ background:#fff; border:none; padding:6px 9px; font-size:12px; font-weight:800; cursor:pointer }
  .tog button.active{ background:#eafff7; color:#0c6d54 }

  .field{ position:relative }
  .status-bar{ position:relative; z-index:1000; display:flex; align-items:center; gap:8px; margin:0 0 6px 0; min-height:26px }
  .chip-slot{ margin-left:auto; display:flex; gap:8px; flex-wrap:wrap }
  .chip{ padding:10px 16px; border-radius:999px; font-weight:900; font-size:17px;
         border:1px solid var(--ui); background:#fff; box-shadow:0 6px 16px rgba(0,0,0,.08) }
  .chip.ok{ color:#0b6b2f; background:#eafff2; border-color:#bfeacc }
  .chip.bad{ color:#a33232; background:#fff3f3; border-color:#ffd4d4 }
  .chip.hint{ color:#7a5a00; background:#fff9d6; border-color:#ffe38a }

  .io{ display:flex; align-items:center; gap:6px }
  .input-wrap{ position:relative; flex:1; min-height:var(--ioH) }
  .big-input{
    width:100%; min-height:var(--ioH); padding:12px 74px 12px 60px;
    border:2px solid var(--ui); border-radius:var(--radius); background:#fff;
    font-size:30px; font-weight:800; line-height:1.2; letter-spacing:.5px; word-spacing:.85ch;
    font-feature-settings:"tnum" 1,"lnum" 1; font-variant-numeric:tabular-nums lining-nums; outline:none;
  }
  .big-input::placeholder{ color:#9aa9c9 }
  .big-input:focus{ border-color:#a7bbff; box-shadow:0 0 0 3px rgba(167,187,255,.22) }

  .kbd-btn{ position:absolute; left:6px; top:50%; transform:translateY(-50%);
    width:38px; height:38px; border:1px solid var(--ui); border-radius:10px; background:#fff; display:grid; place-items:center; cursor:pointer; z-index:1001 }
  .kbd-btn svg{ width:19px; height:19px }
  .suffix-tools{ display:flex; gap:6px }
  .emoji-btn{ width:var(--ioH); height:var(--ioH); border:1px solid var(--ui); border-radius:var(--radius); background:#fff;
    display:grid; place-items:center; cursor:pointer; font-size:calc(var(--ioH)*.58); line-height:1; transition:.15s all }
  .emoji-btn.active{ background:#eaf1ff; border-color:#a7bbff; box-shadow:0 0 0 3px rgba(167,187,255,.22) inset }

  .kbd-pop{ display:none; position:fixed; z-index:1500; background:#fff;
    border:1px solid var(--ui); border-radius:12px; box-shadow:0 12px 28px rgba(0,0,0,.12); padding:10px }
  .kbd-grid{ display:grid; grid-template-columns:repeat(10,1fr); gap:8px }
  .key{ padding:8px 0; text-align:center; border:1px solid var(--ui); border-radius:10px; background:#fff; font-weight:900; cursor:pointer; user-select:none }

  .btnbar{ display:flex; gap:8px; align-items:center; flex-wrap:wrap }
  .btn{ border:1px solid var(--ui); background:#fff; border-radius:12px; padding:0 16px; font-weight:900; cursor:pointer;
        font-size:13px; height:var(--btnH); display:inline-flex; align-items:center; justify-content:center }
  .btn.check{ border:none; color:#081635; background:linear-gradient(90deg,var(--blue),var(--teal)); box-shadow:0 8px 20px rgba(47,108,255,.20) }
  .btn.new{   border:none; color:#081635; background:linear-gradient(90deg,var(--vio),var(--pink)); box-shadow:0 8px 20px rgba(142,120,255,.18) }
  .btn.clear{ border:none; color:#081635; background:linear-gradient(90deg,#9eb0ff,#c8d2ff); box-shadow:0 8px 20px rgba(152,167,255,.18) }
  .btn.reveal{ border:none; color:#3f2c00; background:linear-gradient(90deg,#ffe291,#ffd24f); box-shadow:0 8px 20px rgba(244,196,49,.26) }
  .btn.grid { width:var(--btnH); padding:0; font-size:calc(var(--btnH)*.58) }
  .btn.reset{ border:none; color:#081635; background:linear-gradient(90deg,#ffd7a3,#ffecc6); box-shadow:0 8px 20px rgba(255,201,130,.20) }
  .btn.box  { width:var(--btnH); padding:0; font-size:calc(var(--btnH)*.58) }

  .stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px }
  .stat{ background:#fff; border:1px solid var(--ui); border-radius:12px; padding:8px; text-align:center }
  .stat b{ display:block; font-size:20px }

  .answer-bar{ margin-top:6px; display:none }
  .answer-chip{ display:inline-block; margin-right:8px; padding:8px 12px; border-radius:999px;
    background:#fff7cc; border:1px solid #ffe28a; color:#7a5a00; font-weight:900 }
  .why{ display:none; margin-top:6px; border:1px dashed #ffe28a; background:#fffdf0; color:#624800;
        border-radius:12px; padding:10px; font-weight:700; line-height:1.25 }

  .coach{ display:none; border:1px solid #ffd4d4; background:#fff7f7; color:#7b3232;
          padding:10px; border-radius:12px; font-weight:700 }
  .coach h4{ margin:0 0 6px 0; font-size:13px; letter-spacing:.3px }
  .coach ul{ margin:0; padding-left:18px }
  .coach li{ margin:3px 0 }

  /* NEW: colored coach lines for Domain/Range */
  .coach li { color: inherit; }
  .coach li.dom{
    color:#0e3d98;               /* blue-leaning for Domain */
    border-left:4px solid #2f6cff;
    padding-left:8px;
  }
  .coach li.rng{
    color:#0c6d54;               /* green-leaning for Range */
    border-left:4px solid #36c2a0;
    padding-left:8px;
  }

  .targets{ display:flex; gap:8px; flex-wrap:wrap }
  .tbtn{ border:1px solid var(--ui); background:#fff; border-radius:10px; height:36px; padding:0 10px; font-weight:900; cursor:pointer }
  .tbtn.active{ background:#f2f8ff; border-color:#b9d1ff; color:#0e3d98 }


/* === DomainAPP: Desktop side-by-side, Chromebook/Mobile safe === */

/* Play nice inside Google Sites and allow page scroll on short screens */
html, body { height:auto; min-height:100dvh; }
body { overflow:auto; }
.app { width:min(1240px, 100%); }

/* --- Default (desktop/Chromebook): keep two columns side by side --- */
.app { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Keep key controls reachable while the user scrolls */
.top-line { position: sticky; top: 0; z-index: 3; background: var(--panel,#fff); padding-top: 6px; }
.btnbar   { position: sticky; top: 52px; z-index: 2; background: var(--panel,#fff); padding: 6px 0; }

/* Canvas stays visible without exceeding viewport height */
#canvas{
  width:100%;
  aspect-ratio: 4 / 3;              /* a bit wider than tall; switch to 1 if you prefer square */
  max-height: min(78dvh, 760px);    /* never taller than the viewport */
  display:block;
}

/* Inputs/chips don’t shove buttons off-screen */
.big-input { font-size: clamp(20px, 3.6vw, 30px); }
.chip      { font-size: clamp(14px, 2.6vw, 17px); padding: 8px 12px; }

/* --- Narrow screens (tablets/phones): stack --- */
@media (max-width: 980px){
  .app { grid-template-columns: 1fr; }
  .stage, .panel { margin: 8px 0; }
  .top-line { position: sticky; top: 0; }
  .btnbar   { position: sticky; top: 48px; }
}

/* --- Emergency stacking only when *really* short and not wide ---
   Keeps desktop/Chromebook 1366×768 side-by-side, but saves tiny viewports */
@media (max-height: 700px) and (max-width: 1200px){
  .app { grid-template-columns: 1fr; }
  .stage, .panel { margin: 8px 0; }
}

<body>

    <!-- LEFT -->
    <div class="card stage">
      <div class="title">📘 Domain & Range Lab</div>
      <div class="canvas-wrap">
        <canvas id="canvas"></canvas>

    <!-- RIGHT -->
    <div class="card panel">

            <!-- SWAPPED ICON: Range = up/down -->
            <button id="btnRangeBand" class="emoji-btn" title="Range Band" aria-label="Range Band">↕️</button>

      </div>

      <!-- Buttons -->
      <div class="btnbar">
        <button id="btnCheck"  class="btn check">Check</button>
        <button id="btnNew"    class="btn new">New</button>
        <button id="btnClear"  class="btn clear">Clear</button>
        <button id="btnReset"  class="btn reset">Reset</button>
        <button id="btnReveal" class="btn reveal">?</button>
        <button id="btnGrid"   class="btn grid"  title="Toggle Grid" aria-label="Toggle Grid">⬜</button>

      <!-- Gold answers + Why -->
      <div id="answerBar" class="answer-bar">

      <!-- Stats -->
      <div class="stats">
        <div class="stat"><span style="opacity:.75;font-size:12px">Correct</span><b id="stCorrect">0</b></div>
        <div class="stat"><span style="opacity:.75;font-size:12px">Attempts</span><b id="stAttempts">0</b></div>
        <div class="stat"><span style="opacity:.75;font-size:12px">Streak</span><b id="stStreak">0</b></div>

      <!-- Coach -->

      <div class="targets">

      </div>
    </div>
  </div>

  <!-- CSV-driven messages -->
  <script id="coachMessages" type="text/csv">
tip_id,priority,category,applies_to,mode,condition,message
numbers_segment_training,1,numbers,both,training,segment_two_numbers,Numbers: Check the endpoint values.
numbers_segment_testing,1,numbers,both,testing,segment_two_numbers,Numbers: Check the endpoint values.
numbers_one_sided_training,1,numbers,both,training,ray_or_full_one_number,Number: Check the boundary point values. (the starting point of the function)
numbers_one_sided_testing,1,numbers,both,testing,ray_or_full_one_number,Number: Check the boundary point values.
numbers_parabola_segment_range,1,numbers,range,both,parabola_segment_vertex_inside,Numbers: Check the max/min value.
direction_domain,2,direction,domain,both,inequality_direction_mismatch,Direction: Shade to the {{left_or_right}}. Use ≥/≤ for that direction. (Tap the line to change)
direction_range,2,direction,range,both,inequality_direction_mismatch,Direction: Shade {{up_or_down}}. Use ≥/≤ for that direction. (Tap the line to change)
endpoint_included,3,endpoints,both,both,endpoint_should_be_included,Endpoints: The endpoint at {{var}} = {{a}} is included — use ≤ or ≥.
endpoint_excluded,3,endpoints,both,both,endpoint_should_be_excluded,Endpoints: The endpoint at {{var}} = {{a}} is not included — use < or >.
form_one_sided,4,form,both,both,answer_is_one_sided,Form: This one is one-sided (ray/full). Use a single inequality like {{var}} ≥ {{a}} or {{var}} ≤ {{a}}.
form_two_sided,4,form,both,both,answer_is_two_sided,"Form: This one is two-sided (segment). Use two bounds like a ≤ {{var}} ≤ b or [a, b]."
form_all_reals_true,4,form,both,both,answer_is_all_reals,Form: Here it’s all real numbers (no endpoints to find).
form_all_reals_false,4,form,both,both,user_claims_all_reals_but_not,Form: It is not all real numbers—look for endpoints.
unbounded_domain,5,unbounded,domain,both,extends_left_or_right_infinite,Unbounded: The graph extends left/right without bound.
unbounded_range,5,unbounded,range,both,extends_up_or_down_infinite,Unbounded: The graph extends up/down without bound.
variable_mismatch_domain,6,variable,domain,both,used_y_instead_of_x,Variable: Use x for Domain.
variable_mismatch_range,6,variable,range,both,used_x_instead_of_y,Variable: Use y for Range.
order_bounds,6,order,both,both,bounds_reversed,Order: Put the smaller number first: a ≤ {{var}} ≤ b.
unreadable,6,readability,both,both,parse_failed,"I can’t read that yet. Try x ≤ 3 or [1, 5]."
  </script>

<script>
/* ---------- keyboard ---------- */
const KEYS=["7","8","9","4","5","6","1","2","3","0","≤","<","≥",">","(",")","[","]",",","∪","−∞","∞","ℝ","x","y","or","all real numbers","−",".","␣"];
function buildKeyboard(id){
  const pop=document.getElementById('kbd-'+id), grid=pop.querySelector('.kbd-grid'); grid.innerHTML="";
  KEYS.forEach(k=>{
    const b=document.createElement('button'); b.className='key'; b.textContent=k;
    b.onclick=()=>{ const input=document.getElementById(id); input.focus();
      const token=(k==="␣")?" ":(k==="all real numbers"?"all real numbers":k);
      const s=input.selectionStart??input.value.length, e=input.selectionEnd??input.value.length;
      input.value=input.value.slice(0,s)+token+input.value.slice(e);
      const pos=s+token.length; input.setSelectionRange(pos,pos); };
    grid.appendChild(b);
  });
}
function placeKeyboard(forId){
  const pop=document.getElementById('kbd-'+forId), input=document.getElementById(forId);
  const r=input.getBoundingClientRect(), margin=8, vw=document.documentElement.clientWidth, vh=window.innerHeight;
  pop.style.width = r.width+'px';
  let left = r.left + window.scrollX, top = r.bottom + window.scrollY + margin;
  if(left + pop.offsetWidth > vw - 10) left = vw - 10 - pop.offsetWidth;
  if(top + pop.offsetHeight > vh - 10 + window.scrollY) top = r.top + window.scrollY - pop.offsetHeight - margin;
  pop.style.left = left + 'px'; pop.style.top = top + 'px';
}
function setupKbd(forId){
  buildKeyboard(forId);
  const btn=document.querySelector('.kbd-btn[data-for="'+forId+'"]');
  const pop=document.getElementById('kbd-'+forId);
  const toggle=(show)=>{ pop.style.display = show ? 'block' : 'none'; if(show) placeKeyboard(forId); };
  btn.addEventListener('click',e=>{ e.stopPropagation(); toggle(pop.style.display!=='block'); });
  window.addEventListener('resize',()=>{ if(pop.style.display==='block') placeKeyboard(forId); });
  document.addEventListener('click',e=>{ if(pop.style.display==='block' && !pop.contains(e.target) && e.target!==btn) toggle(false); });
  document.addEventListener('keydown',e=>{ if(e.key==="Escape") toggle(false); });
}
setupKbd('dom'); setupKbd('rng');
function closeKeyboards(){ document.getElementById('kbd-dom').style.display='none'; document.getElementById('kbd-rng').style.display='none'; }

/* ---------- canvas / grid ---------- */
const canvas=document.getElementById('canvas'), c=canvas.getContext('2d');
const badge=document.getElementById('toolBadge');
function ensureCanvasSize(){
  const dpr = Math.max(1, Math.floor(window.devicePixelRatio || 1));
  const cssSize = canvas.parentElement.clientWidth;
  if(cssSize<=0) return false;
  const target = Math.floor(cssSize * dpr);
  if(canvas.width!==target){
    canvas.style.width = cssSize+'px'; canvas.style.height = cssSize+'px';
    canvas.width  = target; canvas.height = target;
    c.setTransform(1,0,0,1,0,0); c.scale(dpr, dpr);
  }
  return true;
}
new ResizeObserver(()=>{ if(ensureCanvasSize()) draw(); }).observe(canvas.parentElement);

const CFG={ xmin:-10,xmax:10,ymin:-10,ymax:10,tick:1,grid:true };
function ux(x){ const W=canvas.clientWidth; return (x-CFG.xmin)/(CFG.xmax-CFG.xmin)*W }
function uy(y){ const H=canvas.clientHeight; return H-(y-CFG.ymin)/(CFG.ymax-CFG.ymin)*H }
function wx(px){ const W=canvas.clientWidth; return CFG.xmin + px/W * (CFG.xmax-CFG.xmin) }
function wy(py){ const H=canvas.clientHeight; return CFG.ymin + (H-py)/H * (CFG.ymax-CFG.ymin) }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)) }
const EPS=1e-6;

/* ---------- state ---------- */
let blank=false, mode='training';
const UI={ level:'segment', type:'linear', notation:'ineq' };
let currentGraph=null, reveal=false;
let tool='idle';
const overlays={ vertex:false, extrema:false, extra:false };
let gridYLabelX=null;

const DEFAULTS={ double:{ dom:{lo:-2,hi:3,loInc:true,hiInc:true}, rng:{lo:-1,hi:4,loInc:true,hiInc:true} }, single:{ value:0, dir:+1, inc:true } };
const domainBand={ mode:'double', visible:false, lo:-2, hi:3, loInc:true, hiInc:true, value:0, dir:+1, inc:true };
const rangeBand ={ mode:'double', visible:false, lo:-1, hi:4, loInc:true, hiInc:true, value:0, dir:+1, inc:true };

const boxSel={ active:false, x0:0, y0:0, x1:0, y1:0, visible:false };
const hitRadiusPx=28, handleRadiusPx=8, tapThreshold=6, lineHitPx=16;

/* ---------- UI wiring ---------- */
function wireSeg(id, cb){ const el=document.getElementById(id); el.addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return; [...el.children].forEach(x=>x.classList.toggle('active',x===b)); cb(b.dataset.v);
});}
wireSeg('uiLevel', v=>{ UI.level=v; gateZigzag(); updateExtraButton(); if(blank){ applyBandShapeForUI(); setBandDefaultsForCurrentShapes(); draw(); } else newGraph(); });
wireSeg('uiType',  v=>{ UI.type=v;  gateZigzag(); updateExtraButton(); if(blank){ applyBandShapeForUI(); setBandDefaultsForCurrentShapes(); draw(); } else newGraph(); });
wireSeg('uiNotation', v=>{ UI.notation=v; syncInputsFromBands(); draw(); });
wireSeg('uiMode', v=>{ mode=v; if(mode==='training'){ syncInputsFromBands(); } });

document.getElementById('btnGrid').onclick=()=>{ CFG.grid=!CFG.grid; draw(); };
document.getElementById('btnReveal').onclick=()=>{ reveal=!reveal; renderAnswerText(); draw(); };

const domBtn=document.getElementById('btnDomainBand');
const rngBtn=document.getElementById('btnRangeBand');

document.getElementById('btnDomainBand').onclick=()=>{
  if(domainBand.mode==='none') return;
  domainBand.visible=!domainBand.visible;
  domBtn.classList.toggle('active', domainBand.visible);
  if(domainBand.visible && mode==='training') syncInputsFromBands();
  draw();
};
document.getElementById('btnRangeBand').onclick=()=>{
  if(rangeBand.mode==='none') return;
  rangeBand.visible=!rangeBand.visible;
  rngBtn.classList.toggle('active', rangeBand.visible);

function rand(a,b){ return a + Math.random()*(b-a) }
function rint(a,b){ return Math.round(rand(a,b)) }
function choose(arr){ return arr[Math.floor(Math.random()*arr.length)] }
function roundT(v){ const t=CFG.tick; return Math.round(v/t)*t; }

/* ---------- generators (answerable, integers) ---------- */
function genLinear(level){
  let m = choose([-2,-1,1,2]), b = rint(-3,3);
  if(level==='full') return { type:'linear-full', m,b };

  let x1=rint(-7,-1), x2=rint(1,7); if(Math.random()<0.5){ const t=x1;x1=x2;x2=t; }
  let y1=m*x1+b, y2=m*x2+b, tries=0;
  while((Math.abs(y1)>9||Math.abs(y2)>9) && tries<30){ b=rint(-3,3); y1=m*x1+b; y2=m*x2+b; tries++; }

  if(level==='segment'){
    const patterns = [
      {c1:true , c2:false},
      {c1:false, c2:true },
      {c1:true , c2:true },
      {c1:false, c2:false}
    ];
    const pick = Math.random();
    const idx = (pick < 0.30) ? 0 : (pick < 0.60) ? 1 : (pick < 0.80) ? 2 : 3;
    const {c1, c2} = patterns[idx];
    return { type:'linear-seg', m,b, x1, x2, c1, c2 };
  }
  const right = x2 > x1;
  const closed = Math.random() < 0.5;
  return { type:'linear-ray', m,b, ax:x1, right, closed };
}

function genQuadratic(level){
  let a = choose([-2,-1,1,2]); const h=rint(-4,4), k=rint(-2,3);
  if(level==='full') return { type:'quad-full', a,h,k };
  const dMax = ()=> a>0 ? Math.floor(Math.sqrt(Math.max(0,(CFG.ymax-2-k)/a)))
                        : Math.floor(Math.sqrt(Math.max(0,(k-(CFG.ymin+2))/(-a))));
  let dmax = Math.max(2, Math.min(6, dMax())); if(dmax%2===1) dmax--; if(dmax<2){ a=a>0?1:-1; dmax=2; }
  const d = choose([2,4,6].filter(v=>v<=dmax)); const L=h-d, R=h+d;

  if(level==='segment'){
    const patterns = [
      {cL:true , cR:false},
      {cL:false, cR:true },
      {cL:true , cR:true },
      {cL:false, cR:false}
    ];
    const pick = Math.random();
    const idx = (pick < 0.30) ? 0 : (pick < 0.60) ? 1 : (pick < 0.80) ? 2 : 3;
    const {cL, cR} = patterns[idx];
    return { type:'quad-seg', a,h,k, L,R, cL, cR };
  }
  const right = Math.random() < 0.5;
  const closed = Math.random() < 0.5;
  return { type:'quad-ray', a,h,k, right, closed };
}

function genZigzag(){
  const xs=[-6,0,6].map(x=>x+choose([-2,-1,0,1,2]));
  const ys=xs.map(()=>rint(-4,4));
  return { type:'zigzag', xs:xs.map(v=>Math.round(v)), ys, c1:true, c2:false };
}

function answerable(g){
  function inside(x,y){ return x>CFG.xmin+0.8&&x<CFG.xmax-0.8&&y>CFG.ymin+0.8&&y<CFG.ymax-0.8; }
  switch(g.type){
    case 'linear-full': return true;
    case 'quad-full'  : return inside(g.h,g.k);
    case 'linear-seg' : return inside(g.x1,g.m*g.x1+g.b)&&inside(g.x2,g.m*g.x2+g.b);
    case 'linear-ray' : return inside(g.ax,g.m*g.ax+g.b);
    case 'quad-seg'   : return inside(g.L,g.a*(g.L-g.h)**2+g.k)&&inside(g.R,g.a*(g.R-g.h)**2+g.k);
    case 'quad-ray'   : return inside(g.h,g.k);
    case 'zigzag'     : return g.xs.every((x,i)=>inside(x,g.ys[i]));
    default: return false;
  }
}

/* ---------- intervals ---------- */
const I={
  all(){ return {lo:-Infinity, hi:Infinity, loInc:true, hiInc:true}; },
  withEnds(lo,hi,loInc,hiInc){ if(hi<lo){ const t=lo;lo=hi;hi=t; const s=loInc;loInc=hiInc;hiInc=s; } return {lo,hi,loInc,hiInc}; },
  half(a,aInc,b,bInc){ return {lo:a,hi:b,loInc:aInc,hiInc:bInc}; },
  eq(a,b){ return Math.abs(a-b) < 1e-6; },
  same(A,B){
    return ( (A.lo===-Infinity && B.lo===-Infinity) || this.eq(A.lo,B.lo) ) &&
           ( (A.hi=== Infinity && B.hi=== Infinity) || this.eq(A.hi,B.hi) ) &&
           (!!A.loInc===!!B.loInc) && (!!A.hiInc===!!B.hiInc);
  },
  fmt(A,axis,notation){
    const n=v=> (v===Infinity?"∞":(v===-Infinity?"−∞":roundT(v)));
    const b=(A.loInc?"[":"("), e=(A.hiInc?"]":")"), varCh=(axis==='x'?'x':'y');
    let out="";
    if(notation==='interval' || notation==='both'){ out=`${b}${n(A.lo)}, ${n(A.hi)}${e}`; }
    if(notation==='ineq' || notation==='both'){
      if(A.lo===-Infinity && A.hi===Infinity) out="all real numbers";
      else if(A.lo===-Infinity) out=`${varCh} ${A.hiInc?'≤':'<'} ${n(A.hi)}`;
      else if(A.hi===Infinity) out=`${varCh} ${A.loInc?'≥':'>'} ${n(A.lo)}`;
      else out=`${n(A.lo)} ${A.loInc?'≤':'<'} ${varCh} ${A.hiInc?'≤':'<'} ${n(A.hi)}`;
    }
    return out;
  }
};

/* ---------- correct answers (with yL==yR fix) ---------- */
function graphDomain(g){
  switch(g.type){
    case 'linear-full':
    case 'quad-full' : return I.all();
    case 'linear-seg': {
      const leftFirst = g.x1 <= g.x2;
      const lo = Math.min(g.x1,g.x2), hi = Math.max(g.x1,g.x2);
      const loInc = leftFirst ? !!g.c1 : !!g.c2;
      const hiInc = leftFirst ? !!g.c2 : !!g.c1;
      return I.withEnds(lo,hi,loInc,hiInc);
    }
    case 'quad-seg'  : return I.withEnds(Math.min(g.L,g.R), Math.max(g.L,g.R), !!g.cL, !!g.cR);
    case 'linear-ray': return g.right? I.half(g.ax,!!g.closed, Infinity,true) : I.half(-Infinity,true, g.ax,!!g.closed);
    case 'quad-ray'  : return g.right? I.half(g.h ,!!g.closed, Infinity,true) : I.half(-Infinity,true, g.h ,!!g.closed);
    case 'zigzag': {
      const xs=g.xs, xmin=Math.min(...xs), xmax=Math.max(...xs);
      const near=(a,b)=>Math.abs(a-b)<1e-9;
      const includedAt=i=> i===0?!!g.c1 : (i===xs.length-1?!!g.c2 : true);
      const loInc = xs.some((x,i)=>near(x,xmin)&&includedAt(i));
      const hiInc = xs.some((x,i)=>near(x,xmax)&&includedAt(i));
      return I.withEnds(xmin,xmax,loInc,hiInc);
    }
  }
}
function graphRange(g){
  switch(g.type){
    case 'linear-full': return I.all();
    case 'linear-seg': {
      const y1=g.m*g.x1+g.b, y2=g.m*g.x2+g.b;
      return I.withEnds(Math.min(y1,y2), Math.max(y1,y2), (y1<y2?g.c1:g.c2), (y1<y2?g.c2:g.c1));
    }
    case 'linear-ray': {
      const y0=g.m*g.ax+g.b; const dir = (g.right? g.m>0 : g.m<0) ? 1 : -1;
      return dir>0 ? I.half(y0,!!g.closed, Infinity,true) : I.half(-Infinity,true, y0,!!g.closed);
    }
    case 'quad-full':   return (g.a>0)? I.half(g.k,true, Infinity,true) : I.half(-Infinity,true, g.k,true);
    case 'quad-seg': {
      const yL=g.a*(g.L-g.h)**2+g.k, yR=g.a*(g.R-g.h)**2+g.k;
      let lo=Math.min(yL,yR), hi=Math.max(yL,yR);
      let loInc, hiInc;
      if (yL < yR) { loInc = !!g.cL; hiInc = !!g.cR; }
      else if (yR < yL) { loInc = !!g.cR; hiInc = !!g.cL; }
      else { loInc = hiInc = !!(g.cL || g.cR); }
      if(g.L<g.h && g.h<g.R){ const yV=g.k;
        if(g.a>0){ if (Math.abs(yV - lo) < 1e-6) loInc = true; else if (yV < lo - 1e-6) { lo = yV; loInc = true; } }
        else     { if (Math.abs(yV - hi) < 1e-6) hiInc = true; else if (yV > hi + 1e-6) { hi = yV; hiInc = true; } }
      }
      return I.withEnds(lo,hi,loInc,hiInc);
    }
    case 'quad-ray':    return (g.a>0)? I.half(g.k,!!g.closed, Infinity,true) : I.half(-Infinity,true, g.k,!!g.closed);
    case 'zigzag': {
      const ys=g.ys, ymin=Math.min(...ys), ymax=Math.max(...ys);
      const near=(a,b)=>Math.abs(a-b)<1e-9;
      const includedAt=i=> i===0?!!g.c1 : (i===ys.length-1?!!g.c2 : true);
      const loInc = ys.some((y,i)=>near(y,ymin)&&includedAt(i));
      const hiInc = ys.some((y,i)=>near(y,ymax)&&includedAt(i));
      return I.withEnds(ymin,ymax,loInc,hiInc);
    }
  }
}

/* ---------- new graph with gated random ---------- */
function withCanvasReady(fn, tries=0){
  if(ensureCanvasSize() && canvas.clientWidth>0){ fn(); return; }
  if(tries<12){ requestAnimationFrame(()=>withCanvasReady(fn, tries+1)); } else { fn(); }
}
function newGraph(){
  blank = false; reveal = false; tool = 'idle'; boxSel.active=false; boxSel.visible=false; badge.style.display='none';
  clearOverlays(false); setBandDefaultsForCurrentShapes();
  document.getElementById('dom').value=""; document.getElementById('rng').value="";
  renderAnswerText(); document.getElementById('why').style.display='none';

  let pickType=UI.type;
  if(UI.type==='random'){
    if(UI.level==='segment') pickType = choose(['linear','quadratic','zigzag']);
    else if(UI.level==='ray') pickType = choose(['linear','quadratic']);
    else pickType = choose(['linear','quadratic']);
  }
  let g=null, attempts=0;
  do{
    if(pickType==='linear') g=genLinear(UI.level);
    else if(pickType==='quadratic') g=genQuadratic(UI.level);
    else g=genZigzag();
    attempts++;
  } while(!answerable(g) && attempts<60);
  if(!answerable(g)){ g = { type:'linear-seg', m:1, b:0, x1:-4, x2:4, c1:true, c2:false }; }
  currentGraph=g;
  currentGraph.domainAnswer = graphDomain(g);
  currentGraph.rangeAnswer  = graphRange(g);

  applyBandShapeForUI();
  withCanvasReady(draw);
}

/* ---------- band shapes ---------- */
function applyBandShapeForUI(){
  if(UI.level==='segment'){
    domainBand.mode='double'; rangeBand.mode='double';
  }else if(UI.level==='ray'){
    domainBand.mode='single'; rangeBand.mode='single';
  }else if(UI.level==='full'){
    if(UI.type==='quadratic' || (UI.type==='random' && currentGraph && currentGraph.type.startsWith('quad'))){
      domainBand.mode='none'; rangeBand.mode='single';
    } else { domainBand.mode='none'; rangeBand.mode='none'; }
  }
}
function applyBandShapeForBlankRefresh(){ applyBandShapeForUI(); setBandDefaultsForCurrentShapes(); }

/* ---------- draw ---------- */
function draw(){
  // robust clear: kill ghost marks on bottom/right
  c.save(); c.resetTransform(); c.clearRect(0,0,canvas.width,canvas.height); c.restore();

  drawGrid();
  if(!blank && currentGraph) drawGraph(currentGraph, '#1a60ff');
  if(reveal && currentGraph){
    drawBand(currentGraph.domainAnswer,'x','#f4c431',true);
    drawBand(currentGraph.rangeAnswer, 'y','#f4c431',true);
  }
  if(domainBand.visible && domainBand.mode!=='none') drawBand(domainBand,'x','#ff5577');
  if(rangeBand.visible  && rangeBand.mode!=='none')  drawBand(rangeBand ,'y','#ff5577');
  if(boxSel.visible) drawBoxSel();
  drawAnchorLabels();
}

function drawGrid(){
  const W=canvas.clientWidth, H=canvas.clientHeight; if(!CFG.grid) return;
  c.save();
  c.strokeStyle='#e9eefb'; c.lineWidth=1;
  for(let x=CFG.xmin; x<=CFG.xmax+EPS; x+=CFG.tick){ const px=ux(x); c.beginPath(); c.moveTo(px,0); c.lineTo(px,H); c.stroke(); }
  for(let y=CFG.ymin; y<=CFG.ymax+EPS; y+=CFG.tick){ const py=uy(y); c.beginPath(); c.moveTo(0,py); c.lineTo(W,py); c.stroke(); }
  const ax=ux(0), ay=uy(0);
  c.strokeStyle='#0b52ff'; c.lineWidth=2;
  c.beginPath(); c.moveTo(ax,0); c.lineTo(ax,H); c.stroke();
  c.beginPath(); c.moveTo(0,ay); c.lineTo(W,ay); c.stroke();

  c.fillStyle="rgba(15,35,64,.95)"; c.font="900 18px ui-rounded, system-ui";
  c.shadowColor="rgba(255,255,255,.9)"; c.shadowBlur=6;

  // x labels
  c.textAlign='center'; c.textBaseline='top';
  const yLabel=(ay>H-26)? ay-22 : ay+6;
  for(let x=Math.ceil(CFG.xmin/2)*2; x<=CFG.xmax; x+=2){ if(Math.abs(x)<EPS) continue; c.fillText(x, ux(x), Math.max(2, Math.min(H-20, yLabel))); }

  // y labels & (y)
  const leftSide=ax>26; c.textAlign=leftSide?'right':'left'; c.textBaseline='middle';
  const xTickCol=Math.max(8, Math.min(W-8, ax + (leftSide?-8:8)));
  for(let y=Math.ceil(CFG.ymin/2)*2; y<=CFG.ymax; y+=2){ if(Math.abs(y)<EPS) continue; c.fillText(y, xTickCol, uy(y)); }

  c.font="900 20px ui-rounded, system-ui";
  c.textAlign= leftSide ? 'left' : 'right';
  c.textBaseline='top';
  const yOffset = 26 * (leftSide?1:-1);
  gridYLabelX = Math.max(12, Math.min(W-12, ax + yOffset));
  c.fillText('(y)', gridYLabelX, 10);

  c.textAlign='left'; c.textBaseline='bottom';
  c.fillText('(x)', Math.max(0,W-30), Math.max(16, Math.min(H-6, ay-6)));
  c.restore();
}

function gold(ptShape, x, y){
  c.save(); c.fillStyle='#d49800'; c.strokeStyle='#ffd24f'; c.lineWidth=2;
  if(ptShape==='dot'){ c.beginPath(); c.arc(x,y,6,0,Math.PI*2); c.fill(); c.stroke(); }
  if(ptShape==='diamond'){ c.beginPath(); c.moveTo(x, y-8); c.lineTo(x+8,y); c.lineTo(x,y+8); c.lineTo(x-8,y); c.closePath(); c.fill(); c.stroke(); }
  if(ptShape==='square'){ c.beginPath(); c.rect(x-6,y-6,12,12); c.fill(); c.stroke(); }
  c.restore();
}
function tag(text, px, py, align='center') {
  const padX = 8, padY = 5;
  c.save();
  c.font = "800 13px ui-rounded, system-ui";
  const w = c.measureText(text).width + 2*padX, h = 22;
  let x = px, y = py;

  c.translate(x, y);
  c.shadowColor = 'rgba(255,255,255,.9)'; c.shadowBlur = 8;

  c.fillStyle = 'rgba(255,255,255,.95)';
  c.strokeStyle = '#cfd9ff';
  c.lineWidth = 1.5;

  const r = 10;
  c.beginPath();
  c.moveTo(r,0);
  c.lineTo(w-r,0); c.quadraticCurveTo(w,0,w,r);
  c.lineTo(w,h-r); c.quadraticCurveTo(w,h,w-r,h);
  c.lineTo(r,h);   c.quadraticCurveTo(0,h,0,h-r);
  c.lineTo(0,r);   c.quadraticCurveTo(0,0,r,0);
  c.closePath();
  c.fill(); c.stroke();

  c.fillStyle = '#0f2340';
  c.textBaseline = 'middle';
  c.textAlign = 'center';
  c.fillText(text, w/2, h/2);
  c.restore();
}
function monoArrow(x0,y0,x1,y1,up){
  const a= Math.atan2(y1-y0,x1-x0), L=14, t=up?1:-1;
  const x=x1, y=y1, xA=x-L*Math.cos(a)+t*6*Math.sin(a), yA=y-L*Math.sin(a)-t*6*Math.cos(a);
  const xB=x-L*Math.cos(a)-t*6*Math.sin(a), yB=y-L*Math.sin(a)+t*6*Math.cos(a);
  c.save(); c.fillStyle= up?'#0bb35b':'#d13b3b'; c.beginPath(); c.moveTo(x,y); c.lineTo(xA,yA); c.lineTo(xB,yB); c.closePath(); c.fill(); c.restore();
}

function drawGraph(g,color){
  c.save(); c.strokeStyle=color; c.lineWidth=4; c.lineJoin='round'; c.lineCap='round';

  switch(g.type){
    case 'linear-full': {
      const x0=CFG.xmin, x1=CFG.xmax, y0=g.m*x0+g.b, y1=g.m*x1+g.b;
      c.beginPath(); c.moveTo(ux(x0),uy(y0)); c.lineTo(ux(x1),uy(y1)); c.stroke();
      break;
    }
    case 'linear-seg': {
      const y1=g.m*g.x1+g.b, y2=g.m*g.x2+g.b;
      c.beginPath(); c.moveTo(ux(g.x1),uy(y1)); c.lineTo(ux(g.x2),uy(y2)); c.stroke();
      drawEnd(ux(g.x1),uy(y1),g.c1); drawEnd(ux(g.x2),uy(y2),g.c2);
      break;
    }
    case 'linear-ray': {
      const y0=g.m*g.ax+g.b; const axp=ux(g.ax), ayp=uy(y0);
      const xEnd = g.right? CFG.xmax : CFG.xmin; const yEnd = g.m*xEnd+g.b;
      c.beginPath(); c.moveTo(axp,ayp); c.lineTo(ux(xEnd),uy(yEnd)); c.stroke();
      drawEnd(axp,ayp,g.closed); drawArrowTowards(ux(xEnd),uy(yEnd), g.right?1:-1);
      break;
    }
    case 'quad-full': {
      const step=(CFG.xmax-CFG.xmin)/200; c.beginPath();
      for(let x=CFG.xmin; x<=CFG.xmax; x+=step){ const y=g.a*(x-g.h)**2+g.k; const px=ux(x), py=uy(y); (x===CFG.xmin?c.moveTo(px,py):c.lineTo(px,py)); }
      c.stroke();
      break;
    }
    case 'quad-seg': {
      const step=(g.R-g.L)/160; c.beginPath();
      for(let x=g.L; x<=g.R+EPS; x+=step){ const y=g.a*(x-g.h)**2+g.k; const px=ux(x), py=uy(y); (x===g.L?c.moveTo(px,py):c.lineTo(px,py)); }
      c.stroke(); drawEnd(ux(g.L),uy(g.a*(g.L-g.h)**2+g.k),g.cL); drawEnd(ux(g.R),uy(g.a*(g.R-g.h)**2+g.k),g.cR);
      break;
    }
    case 'quad-ray': {
      const step=(CFG.xmax-CFG.xmin)/200, xStart=g.h, xEnd=g.right?CFG.xmax:CFG.xmin;
      c.beginPath();
      for(let x=xStart; g.right? x<=xEnd : x>=xEnd; x+= g.right? step : -step){ const y=g.a*(x-g.h)**2+g.k; const px=ux(x), py=uy(y); (x===xStart?c.moveTo(px,py):c.lineTo(px,py)); }
      c.stroke(); drawEnd(ux(g.h),uy(g.k),g.closed); drawArrowTowards(ux(xEnd),uy(g.a*(xEnd-g.h)**2+g.k), g.right?1:-1);
      break;
    }
    case 'zigzag': {
      c.beginPath(); c.moveTo(ux(g.xs[0]),uy(g.ys[0])); for(let i=1;i<g.xs.length;i++) c.lineTo(ux(g.xs[i]),uy(g.ys[i]));
      c.stroke(); drawEnd(ux(g.xs[0]),uy(g.ys[0]),g.c1); drawEnd(ux(g.xs.at(-1)),uy(g.ys.at(-1)),g.c2);
      break;
    }
  }

  /* Quick targets overlays */
  if(!blank){
    const showV=overlays.vertex, showE=overlays.extrema, showX=overlays.extra;
    switch(g.type){
      case 'linear-full': { if(showX){ const xA=CFG.xmin, xB=CFG.xmax, yA=g.m*xA+g.b, yB=g.m*xB+g.b; const xm=(xA+xB)/2, ym=(yA+yB)/2; tag(`slope m = ${g.m}`, ux(xm), uy(ym)-20); } break; }
      case 'linear-seg' : { if(showX){ const xm=(g.x1+g.x2)/2, ym=(g.m*g.x1+g.b + g.m*g.x2+g.b)/2; tag(`slope m = ${g.m}`, ux(xm), uy(ym)-20); } break; }
      case 'linear-ray' : { if(showX){ const xEnd=g.right?CFG.xmax:CFG.xmin, y0=g.m*g.ax+g.b, yEnd=g.m*xEnd+g.b; const xm=(g.ax+xEnd)/2, ym=(y0+yEnd)/2; tag(`slope m = ${g.m}`, ux(xm), uy(ym)-20); } break; }
      case 'quad-full'  : {
        if(showV){ gold('diamond', ux(g.h), uy(g.k)); tag(`(${g.h}, ${g.k})`, ux(g.h), uy(g.k) - 18); }
        if(showE){ gold('square', ux(g.h), uy(g.k)); tag(g.a>0?'min':'max', ux(g.h), uy(g.k)+20); }
        if(showX){ c.save(); c.setLineDash([6,6]); c.strokeStyle='#f0b400'; c.lineWidth=2; c.beginPath(); c.moveTo(ux(g.h),0); c.lineTo(ux(g.h),canvas.clientHeight); c.stroke(); c.restore(); tag(`axis x = ${g.h}`, ux(g.h), 24); }
        break;
      }
      case 'quad-seg'   : {
        if(showV && g.L<g.h && g.h<g.R){ gold('diamond', ux(g.h), uy(g.k)); tag(`(${g.h}, ${g.k})`, ux(g.h), uy(g.k) - 18); }
        if(showE){
          const yL=g.a*(g.L-g.h)**2+g.k, yR=g.a*(g.R-g.h)**2+g.k;
          const ymin=Math.min(yL,yR, (g.L<g.h&&g.h<g.R)?g.k:Infinity);
          const ymax=Math.max(yL,yR, (g.L<g.h&&g.h<g.R)?g.k:-Infinity);
          if(ymin===g.k){ gold('square', ux(g.h), uy(g.k)); tag('min', ux(g.h), uy(g.k)+20); }
          if(ymax===g.k){ gold('square', ux(g.h), uy(g.k)); tag('max', ux(g.h), uy(g.k)+20); }
        }
        if(showX){ c.save(); c.setLineDash([6,6]); c.strokeStyle='#f0b400'; c.lineWidth=2; c.beginPath(); c.moveTo(ux(g.h),0); c.lineTo(ux(g.h),canvas.clientHeight); c.stroke(); c.restore(); tag(`axis x = ${g.h}`, ux(g.h), 24); }
        break;
      }
      case 'quad-ray'   : {
        if(showV){ gold('diamond', ux(g.h), uy(g.k)); tag(`(${g.h}, ${g.k})`, ux(g.h), uy(g.k) - 18); }
        if(showE){ gold('square', ux(g.h), uy(g.k)); tag(g.a>0?'min':'max', ux(g.h), uy(g.k)+20); }
        if(showX){ c.save(); c.setLineDash([6,6]); c.strokeStyle='#f0b400'; c.lineWidth=2; c.beginPath(); c.moveTo(ux(g.h),0); c.lineTo(ux(g.h),canvas.clientHeight); c.stroke(); c.restore(); tag(`axis x = ${g.h}`, ux(g.h), 24); }
        break;
      }
      case 'zigzag': break;
    }
  }

  c.restore();
}

function drawEnd(x,y,closed){
  const r = handleRadiusPx;
  c.save();
  c.beginPath(); c.arc(x,y,r+2,0,Math.PI*2); c.strokeStyle='rgba(255,255,255,0.95)'; c.lineWidth=4; c.stroke();
  if(closed){ c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.fillStyle='#ff5566'; c.fill();
              c.beginPath(); c.arc(x,y,r-1,0,Math.PI*2); c.strokeStyle='rgba(255,255,255,0.9)'; c.lineWidth=2; c.stroke();
  } else { c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.strokeStyle='#ff5566'; c.lineWidth=4; c.stroke(); }
  c.restore();
}
function drawArrowTowards(x,y,dir){
  c.save(); c.fillStyle='#1a60ff'; c.beginPath(); const s=10;
  if(dir>0){ c.moveTo(x,y); c.lineTo(x-s,y-s); c.lineTo(x-s,y+s); } else { c.moveTo(x,y); c.lineTo(x+s,y-s); c.lineTo(x+s,y+s); }
  c.closePath(); c.fill(); c.restore();
}
function drawBand(b,axis,color,asAnswer=false){
  c.save();
  c.setLineDash([8,6]); c.lineWidth=2; c.strokeStyle=color;

  if(b.mode==='double' || asAnswer===true){
    if(!asAnswer){
      c.globalAlpha=0.18; c.fillStyle=color;
      if(axis==='x'){ const x1=ux(b.lo), x2=ux(b.hi); c.fillRect(Math.min(x1,x2),0,Math.abs(x2-x1),canvas.clientHeight); }
      else{ const y1=uy(b.lo), y2=uy(b.hi); c.fillRect(0,Math.min(y1,y2),canvas.clientWidth,Math.abs(y2-y1)); }
      c.globalAlpha=1;
    }
    if(axis==='x'){
      const x1=ux((b.mode==='double')?b.lo:b.value), x2=ux((b.mode==='double')?b.hi:b.value);
      c.beginPath(); c.moveTo(x1,0); c.lineTo(x1,canvas.clientHeight); c.moveTo(x2,0); c.lineTo(x2,canvas.clientHeight); c.stroke();
      if(b.mode==='double'){ drawEnd(x1, uy(0), b.loInc); drawEnd(x2, uy(0), b.hiInc); }
    } else {
      const y1=uy((b.mode==='double')?b.lo:b.value), y2=uy((b.mode==='double')?b.hi:b.value);
      c.beginPath(); c.moveTo(0,y1); c.lineTo(canvas.clientWidth,y1); c.moveTo(0,y2); c.lineTo(canvas.clientWidth,y2); c.stroke();
      if(b.mode==='double'){ drawEnd(ux(0), y1, b.loInc); drawEnd(ux(0), y2, b.hiInc); }
    }
  }

  if(b.mode==='single' && !asAnswer){
    if(axis==='x'){
      const x=ux(b.value);
      c.globalAlpha=0.18; c.fillStyle=color;
      const fillW = (b.dir>0 ? canvas.clientWidth - x : x);
      c.fillRect(b.dir>0?x:0, 0, Math.max(0,fillW), canvas.clientHeight);
      c.globalAlpha=1;
      c.beginPath(); c.moveTo(x,0); c.lineTo(x,canvas.clientHeight); c.stroke();
      drawEnd(x, uy(0), b.inc);
    } else {
      const y=uy(b.value);
      c.globalAlpha=0.18; c.fillStyle=color;
      c.fillRect(0, b.dir>0?0:y, canvas.clientWidth, b.dir>0? y : (canvas.clientHeight-y));
      c.globalAlpha=1;
      c.beginPath(); c.moveTo(0,y); c.lineTo(canvas.clientWidth,y); c.stroke();
      drawEnd(ux(0), y, b.inc);
    }
  }
  c.restore();
}
function drawBoxSel(){
  const x=Math.min(boxSel.x0,boxSel.x1), y=Math.min(boxSel.y0,boxSel.y1), w=Math.abs(boxSel.x1-boxSel.x0), h=Math.abs(boxSel.y1-boxSel.y0);
  c.save(); c.fillStyle='rgba(100,140,255,.1)'; c.strokeStyle='#5d7cff'; c.setLineDash([6,4]); c.lineWidth=2; c.fillRect(x,y,w,h); c.strokeRect(x,y,w,h); c.restore();
}
function drawZenNum(text,x,y,align='center'){
  c.save(); c.font="800 34px ui-rounded, system-ui"; c.textAlign=align; c.textBaseline="middle";
  c.shadowColor="rgba(255,255,255,.9)"; c.shadowBlur=9; c.fillStyle="rgba(15,35,64,.95)"; c.fillText(String(text),x,y); c.restore();
}
function drawAnchorLabels(){

    } else {

/* ---------- interactions ---------- */
canvas.addEventListener('pointerdown', onDown);
canvas.addEventListener('pointermove', onMove);
canvas.addEventListener('pointerup', onUp);
canvas.addEventListener('pointercancel', onUp);

let dragStart={x:0,y:0}, active={ which:null, moved:false };

function nearLine(px,py,axis,b){ if(axis==='x'){ const x=ux(b.value??0); return Math.abs(px-x)<=lineHitPx; } else { const y=uy(b.value??0); return Math.abs(py-y)<=lineHitPx; } }
function handleHit(px,py){
  function test(x,y,which){ return Math.hypot(px-x,py-y)<=hitRadiusPx?which:null; }
  if(domainBand.visible && domainBand.mode!=='none'){
    if(domainBand.mode==='double'){
      const y=uy(0), x1=ux(domainBand.lo), x2=ux(domainBand.hi);
      const h=test(x1,y,'DLO')||test(x2,y,'DHI'); if(h) return h;
    }else{
      const y=uy(0), x=ux(domainBand.value); const nearH = test(x,y,'DS'); if(nearH) return nearH; if(nearLine(px,py,'x',domainBand)) return 'DLINE';
    }
  }
  if(rangeBand.visible && rangeBand.mode!=='none'){
    if(rangeBand.mode==='double'){
      const x=ux(0), y1=uy(rangeBand.lo), y2=uy(rangeBand.hi);
      const h=test(x,y1,'RLO')||test(x,y2,'RHI'); if(h) return h;
    }else{
      const x=ux(0), y=uy(rangeBand.value); const nearH = test(x,y,'RS'); if(nearH) return nearH; if(nearLine(px,py,'y',rangeBand)) return 'RLINE';
    }
  }
  return null;
}
function onDown(e){
  canvas.setPointerCapture(e.pointerId);
  const px=e.offsetX, py=e.offsetY; dragStart={x:px,y:py};
  const hh=handleHit(px,py);
  if(hh){ tool='drag'; active.which=hh; active.moved=false; return; }
  if(tool==='box'){ boxSel.active=true; boxSel.visible=true; boxSel.x0=px; boxSel.y0=py; boxSel.x1=px; boxSel.y1=py; draw(); }
}
function onMove(e){
  const px=e.offsetX, py=e.offsetY;
  if(tool==='box' && boxSel.active){ boxSel.x1=px; boxSel.y1=py; draw(); return; }
  if(tool!=='drag') return;
  active.moved = Math.hypot(px-dragStart.x, py-dragStart.y) > tapThreshold;

  if(active.which==='DLO'){ domainBand.lo=clamp(roundT(wx(px)), CFG.xmin, CFG.xmax); }
  if(active.which==='DHI'){ domainBand.hi=clamp(roundT(wx(px)), CFG.xmin, CFG.xmax); }
  if(active.which==='RLO'){ rangeBand.lo=clamp(roundT(wy(py)), CFG.ymin, CFG.ymax); }
  if(active.which==='RHI'){ rangeBand.hi=clamp(roundT(wy(py)), CFG.ymin, CFG.ymax); }
  if(active.which==='DS'){ domainBand.value=clamp(roundT(wx(px)), CFG.xmin, CFG.xmax); }
  if(active.which==='RS'){ rangeBand.value =clamp(roundT(wy(py)), CFG.ymin, CFG.ymax); }

  if(mode==='training') syncInputsFromBands();
  draw();
}
function onUp(e){
  canvas.releasePointerCapture(e.pointerId);
  if(tool==='box' && boxSel.active){ boxSel.active=false; tool='idle'; badge.style.display='none'; draw(); return; }
  if(tool==='drag'){
    if(!active.moved){
      const isAlt=e.altKey||e.metaKey||e.ctrlKey;
      if(active.which==='DLO') domainBand.loInc=!domainBand.loInc;
      if(active.which==='DHI') domainBand.hiInc=!domainBand.hiInc;
      if(active.which==='RLO') rangeBand.loInc=!rangeBand.loInc;
      if(active.which==='RHI') rangeBand.hiInc=!rangeBand.hiInc;
      if(active.which==='DS'){ if(isAlt) domainBand.dir*=-1; else domainBand.inc=!domainBand.inc; }
      if(active.which==='RS'){ if(isAlt) rangeBand.dir*=-1; else rangeBand.inc=!rangeBand.inc; }
      if(active.which==='DLINE') domainBand.dir*=-1;
      if(active.which==='RLINE') rangeBand.dir*=-1;
      if(mode==='training') syncInputsFromBands();
    }
    tool='idle'; draw();
  }
}

/* ---------- training sync ---------- */
function bandToIntervalX(b){
  if(b.mode==='double'){ return I.withEnds(Math.min(b.lo,b.hi), Math.max(b.lo,b.hi), b.lo<=b.hi?b.loInc:b.hiInc, b.lo<=b.hi?b.hiInc:b.loInc); }
  else if(b.mode==='single'){ return (b.dir>0) ? I.half(b.value, b.inc, Infinity,true) : I.half(-Infinity,true, b.value, b.inc); }
  else { return I.all(); }
}
function bandToIntervalY(b){
  if(b.mode==='double'){ return I.withEnds(Math.min(b.lo,b.hi), Math.max(b.lo,b.hi), b.lo<=b.hi?b.loInc:b.hiInc, b.lo<=b.hi?b.hiInc:b.loInc); }
  else if(b.mode==='single'){ return (b.dir>0) ? I.half(b.value, b.inc, Infinity,true) : I.half(-Infinity,true, b.value, b.inc); }
  else { return I.all(); }
}
function syncInputsFromBands(){
  const n=UI.notation;
  if(domainBand.visible){ document.getElementById('dom').value = I.fmt(bandToIntervalX(domainBand),'x',n); }
  if(rangeBand.visible ){ document.getElementById('rng').value = I.fmt(bandToIntervalY(rangeBand),'y',n); }
}

/* ---------- CSV coach loader ---------- */
function parseCSV(text){
  const rows=[]; let i=0, field='', rec=[], inQ=false;
  function pushField(){ rec.push(field); field=''; }
  function pushRec(){ if(rec.length){ rows.push(rec); rec=[]; } }
  while(i<text.length){
    const ch=text[i++];
    if(inQ){
      if(ch==='"' && text[i]==='"'){ field+='"'; i++; }
      else if(ch=== '"'){ inQ=false; }
      else field+=ch;
    }else{
      if(ch=== '"'){ inQ=true; }
      else if(ch=== ','){ pushField(); }
      else if(ch=== '\n'){ pushField(); pushRec(); }
      else if(ch=== '\r'){ /* skip */ }
      else field+=ch;
    }
  }
  if(field.length>0 || rec.length) { pushField(); pushRec(); }
  if(!rows.length) return [];
  const header=rows.shift().map(h=>h.trim());
  return rows.filter(r=>r.length===header.length).map(r=>{
    const obj={}; header.forEach((h,idx)=>obj[h]=r[idx]); return obj;
  });
}
const COACH = (()=>{
  const el=document.getElementById('coachMessages');
  const data=parseCSV(el?el.textContent.trim():'');
  const rows=data.map(r=>({
    tip_id:r.tip_id, priority:parseInt(r.priority||'999',10),
    category:r.category, applies_to:(r.applies_to||'both'), mode:(r.mode||'both'),
    condition:r.condition, message:r.message
  }));
  function find(condition, applies, mode){
    const pool=rows.filter(r=> r.condition===condition &&
      (r.applies_to==='both'||r.applies_to===applies) &&
      (r.mode==='both'||r.mode===mode) );
    pool.sort((a,b)=>a.priority-b.priority);
    return pool;
  }
  function fill(template, tokens){
    return template.replace(/\{\{\s*([a-zA-Z0-9_]+)\s*\}\}/g, (_,k)=> (k in tokens)? String(tokens[k]) : `{{${k}}}`);
  }
  return { find, fill };
})();

/* ---------- parse / check + coach (with side labels + colors) ---------- */
function parseField(text){
  if(!text) return null;
  const t=text.trim().replace(/–|−/g,'-');
  if(/all\s+real/i.test(t) || /ℝ/.test(t)) return I.all();
  let m=t.match(/^([\(\[])\s*([^,]+)\s*,\s*([^\]\)]+)\s*([\]\)])$/);
  if(m){ const lo=normNum(m[2]), hi=normNum(m[3]); return I.withEnds(lo,hi, m[1]=='[', m[4]==']'); }
  m=t.match(/^([^xy]+)\s*(≤|<)\s*[xy]\s*(≤|<)\s*([^xy]+)$/i);
  if(m){ return I.withEnds(normNum(m[1]), normNum(m[4]), m[2]=='≤', m[3]=='≤'); }
  m=t.match(/^([xy])\s*(≥|>|≤|<)\s*([^\s]+)$/i);
  if(m){ const varCh=m[1].toLowerCase(); const op=m[2], v=normNum(m[3]); const out=(op=='≥'||op=='>') ? I.half(v, op=='≥', Infinity,true) : I.half(-Infinity,true, v, op=='≤'); out._var=varCh; return out; }
  return null;
}
function normNum(s){ s=s.trim().replace('∞','Infinity'); if(/Infinity/i.test(s)) return s.startsWith('-')?-Infinity:Infinity; return parseFloat(s); }

const st={ attempts:0, correct:0, streak:0 };
document.getElementById('btnCheck').onclick=()=>{
  closeKeyboards();
  if(blank || !currentGraph) return;
  st.attempts++; setText('stAttempts',st.attempts);
  const A_dom=currentGraph.domainAnswer, A_rng=currentGraph.rangeAnswer;
  const U_dom = parseField(document.getElementById('dom').value.trim());
  const U_rng = parseField(document.getElementById('rng').value.trim());
  const dOK = !!U_dom && I.same(A_dom,U_dom);
  const rOK = !!U_rng && I.same(A_rng,U_rng);
  setChip('d', U_dom ? (dOK ? 'Domain correct ✓' : 'Domain not correct yet ×') : 'Enter a valid domain', U_dom?dOK:null);
  setChip('r', U_rng ? (rOK ? 'Range correct ✓'  : 'Range not correct yet ×')  : 'Enter a valid range',  U_rng?rOK:null);

  // Coach: clear once, then append
  const list = document.getElementById('coachList'); list.innerHTML='';
  if(!dOK) runCoachCSV('domain', A_dom, U_dom);
  if(!rOK) runCoachCSV('range',  A_rng, U_rng);
  document.getElementById('coach').style.display = list.children.length ? 'block' : 'none';

  const both=dOK&&rOK; if(both){ st.correct++; st.streak++; } else { st.streak=0; }
  setText('stCorrect',st.correct); setText('stStreak',st.streak);
};

function runCoachCSV(side, A, U){
  const varChar = (side==='domain'?'x':'y');
  const list = document.getElementById('coachList');
  const isHalf = (A.lo===-Infinity || A.hi===Infinity);
  const isAll  = (A.lo===-Infinity && A.hi===Infinity);
  const modeNow = (mode==='training'?'training':'testing');

  const tips=[]; // {id,msg,prio}

  function pushBy(condition, tokens={}){
    const rows = COACH.find(condition, (side==='domain'?'domain':'range'), modeNow);
    rows.forEach(r=>{
      tips.push({ id:r.tip_id, prio:r.priority, msg: COACH.fill(r.message, tokens) });
    });
  }

  // unreadable first if parse failed
  if(!U){ pushBy('parse_failed'); return appendTips(); }

  // variable mismatch?
  if(U._var && U._var!==varChar){
    if(side==='domain') pushBy('used_y_instead_of_x');
    else pushBy('used_x_instead_of_y');
  }

  const U_half = (U.lo===-Infinity || U.hi===Infinity);
  const numsMatchTwo = (!isHalf && !U_half && Math.abs(A.lo - U.lo) < 1e-6 && Math.abs(A.hi - U.hi) < 1e-6);
  const numsMatchOne = (isHalf && U_half && ( (A.lo===-Infinity && Math.abs(A.hi-U.hi)<1e-6) || (A.hi===Infinity && Math.abs(A.lo-U.lo)<1e-6) ));

  // 1) NUMBERS
  if(isHalf){
    if(!numsMatchOne) pushBy('ray_or_full_one_number', {var:varChar});
  } else {
    if(!numsMatchTwo) pushBy('segment_two_numbers');
    if(side==='range' && currentGraph && currentGraph.type==='quad-seg'){
      if(currentGraph.L < currentGraph.h && currentGraph.h < currentGraph.R){
        pushBy('parabola_segment_vertex_inside');
      }
    }
  }

  // 2) DIRECTION (only if numbers are right AND it's one-sided)
  if(isHalf && numsMatchOne){
    const ansRightOrUp = (A.hi===Infinity);
    if(U.hi===Infinity !== ansRightOrUp){
      if(side==='domain') pushBy('inequality_direction_mismatch', {left_or_right: ansRightOrUp?'right':'left'});
      else pushBy('inequality_direction_mismatch', {up_or_down: ansRightOrUp?'up':'down'});
    }
  }

  // 3) ENDPOINTS (open/closed) — only once numbers are right
  if(numsMatchTwo){
    if(A.loInc !== U.loInc){
      pushBy(A.loInc ? 'endpoint_should_be_included' : 'endpoint_should_be_excluded', {var:varChar, a:A.lo});
    }
    if(A.hiInc !== U.hiInc){
      pushBy(A.hiInc ? 'endpoint_should_be_included' : 'endpoint_should_be_excluded', {var:varChar, a:A.hi});
    }
  }
  if(numsMatchOne){
    const a = (A.hi===Infinity? A.lo : A.hi);
    const needInc = (A.hi===Infinity? A.loInc : A.hiInc);
    const hasInc  = (U.hi===Infinity? U.loInc : U.hiInc);
    if(needInc !== hasInc){
      pushBy(needInc ? 'endpoint_should_be_included' : 'endpoint_should_be_excluded', {var:varChar, a:a});
    }
  }

  // 4) FORM
  if(isAll){
    if(!(U.lo===-Infinity && U.hi===Infinity)) pushBy('answer_is_all_reals');
  } else {
    const ansOne = isHalf, usrOne = U_half;
    if(ansOne && !usrOne) pushBy('answer_is_one_sided', {var:varChar});
    if(!ansOne && usrOne) pushBy('answer_is_two_sided', {var:varChar});
  }

  // 5) UNBOUNDED (generic)
  if(isHalf){
    if(side==='domain') pushBy('extends_left_or_right_infinite');
    else pushBy('extends_up_or_down_infinite');
  }

  // 6) ORDER
  if(U.lo > U.hi) pushBy('bounds_reversed', {var:varChar});

  // NEW: label each tip with (Domain)/(Range) + color class
  function appendTips(){
    tips.sort((a,b)=>a.prio-b.prio);
    const dedup = new Set(); let count = 0;
    for (const t of tips){
      if (dedup.has(t.id)) continue;
      dedup.add(t.id);
      const li = document.createElement('li');
      const sideLabel = (side === 'domain') ? '(Domain) ' : '(Range) ';
      li.className = (side === 'domain') ? 'dom' : 'rng';
      li.textContent = sideLabel + t.msg;
      list.appendChild(li);
      if (++count >= 3) break;
    }
  }
  appendTips();
}

/* ---------- answer chips + WHY ---------- */
document.getElementById('btnReveal').title = "Show answer";
function renderAnswerText(){
  const bar=document.getElementById('answerBar'), ad=document.getElementById('ansD'), ar=document.getElementById('ansR'), why=document.getElementById('why');
  if(reveal && currentGraph){
    const D=currentGraph.domainAnswer, R=currentGraph.rangeAnswer;
    ad.textContent='Domain: '+I.fmt(D,'x',UI.notation);
    ar.textContent='Range: '+I.fmt(R,'y',UI.notation);
    why.textContent = explainWhy(currentGraph);
    bar.style.display='block'; why.style.display='block';
  }else{
    bar.style.display='none'; document.getElementById('why').style.display='none';
  }
}
function explainWhy(g){
  switch(g.type){
    case 'linear-full': return 'A full line continues forever in both x and y, so Domain and Range are all real numbers.';
    case 'linear-seg': return 'For a line segment, Domain runs from the left x-end to the right x-end; Range runs between the y-values of the endpoints.';
    case 'linear-ray': return `A ray starts at x = ${g.ax} and goes ${g.right?'right':'left'} forever; Range follows that portion of the line.`;
    case 'quad-full': return `A full parabola has vertex at (${g.h}, ${g.k}). Because it opens ${g.a>0?'up':'down'}, Range is ${g.a>0?'y ≥ '+g.k:'y ≤ '+g.k}; Domain is all real numbers.`;
    case 'quad-seg': return 'For a parabola segment, Domain is [L, R]. The Range is between the lesser and greater of the y-values at L and R (include the vertex if it’s inside).';
    case 'quad-ray': return `This parabola ray starts at the vertex (${g.h}, ${g.k}) and goes ${g.right?'right':'left'}; Range is ${g.a>0?'y ≥ '+g.k:'y ≤ '+g.k}.`;
    case 'zigzag': return 'Zig-zag is made of straight pieces. Domain is from the smallest x to the largest x used; Range is from the smallest y to the largest y reached.';
  }
}

/* ---------- helpers for chips/stat ---------- */
function setChip(which,text,kind){
  const slot = which==='d'? document.getElementById('dChipSlot') : document.getElementById('rChipSlot');
  slot.innerHTML=''; if(text==null) return;
  const div=document.createElement('div'); div.className='chip';
  if(kind===true) div.classList.add('ok'); else if(kind===false) div.classList.add('bad'); else if(kind==='hint') div.classList.add('hint');
  div.textContent=text; slot.appendChild(div);
}
function setText(id,val){ document.getElementById(id).textContent=val; }

/* ---------- boot ---------- */
function boot(){ gateZigzag(); updateExtraButton(); resetToBlank(); newGraph(); }
boot();
