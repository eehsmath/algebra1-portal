{ id:'A.2H', letter:'H', short:'Inequalities', title:'Write Linear Inequalities',
  blurb:'Write linear inequalities in two variables given a table of values, a graph, and a verbal description.',
  gen:genH,
  prompt:function(p){
    var repPick='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">'+
      '<span style="font-size:12px;font-weight:900;letter-spacing:.4px;color:var(--muted)">FROM</span>'+
      '<div class="drSeg" id="hRepSeg" role="tablist" aria-label="Representation">'+
        '<button type="button" data-v="mix">Mixed</button>'+
        '<button type="button" data-v="graph">Graph</button>'+
        '<button type="button" data-v="table">Table</button>'+
        '<button type="button" data-v="verbal">Words</button>'+
      '</div></div>';
    var formPick='<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:12px;opacity:.75">'+
      '<span style="font-size:10.5px;font-weight:900;letter-spacing:.4px;color:var(--muted)">FORM</span>'+
      '<div class="drSeg" id="hFormSeg" role="tablist" aria-label="Answer form" style="transform:scale(.9);transform-origin:left center">'+
        '<button type="button" data-v="mix">Mixed</button>'+
        '<button type="button" data-v="std">Standard</button>'+
        '<button type="button" data-v="si">Slope-intercept</button>'+
      '</div></div>';
    if(p.rep==='verbal') return repPick+formPick+p.text;
    var body=(p.rep==='graph')?graphSVG_H(p):tableHTML_H(p);
    return repPick+formPick+body+'<br><span style="font-size:15px;color:var(--muted)">Write the inequality in <b>'+hFormLabel(p.form)+'</b>.</span>';
  },
  init:function(){
    wireLabSeg('hRepSeg', hRep, function(v){ hRep=v; newProblem(); });
    wireLabSeg('hFormSeg', hMode, function(v){ hMode=v; newProblem(); });
    wireSharedKbd(document.getElementById('answerArea'), 'sharedKbdBtn', 'sharedKbdPop');
  },
  answerHTML:function(p){
    var op='<select class="sel" id="hop"><option value="">?</option><option value="le">\u2264</option><option value="ge">\u2265</option><option value="lt">&lt;</option><option value="gt">&gt;</option></select>';
    var kb=sharedKbdHTML();
    if(p.form==='si') return '<div class="answer"><span>y</span>'+op+inBox('hm')+'<span>x +</span>'+inBox('hb')+'</div>'+kb;
    return '<div class="answer">'+inBox('hA')+'<span>x +</span>'+inBox('hB')+'<span>y</span>'+op+inBox('hC','wide')+'</div>'+kb;
  },
  read:function(p){
    var op=document.getElementById('hop').value;
    if(p.form==='si'){ var m=parseRat(document.getElementById('hm').value), b=parseRat(document.getElementById('hb').value);
      return (m&&b&&op)?{m:m,b:b,op:op}:null; }
    var A=parseRat(document.getElementById('hA').value), B=parseRat(document.getElementById('hB').value), C=parseRat(document.getElementById('hC').value);
    return (A&&B&&C&&op)?{A:A,B:B,C:C,op:op}:null;
  },
  check:function(p,a){
    if(p.rep==='verbal') return p.form==='si'?checkH_si(p,a):checkH(p,a);
    return p.form==='si'?checkH_siLine(p,a):checkH_fromLine(p,a);
  },
  hints:function(p){
    if(p.rep==='verbal'){
      if(p.form==='si') return ['Isolate y \u2014 it should read y (symbol) mx + b.','The per-x rate is m; the starting value is b.',
        '\u201cAt least / more than\u201d → \u2265 or >. \u201cAt most / no more than / under\u201d → \u2264 or <.'];
      return ['Build the total first: (value of one x)\u00b7x + (value of one y)\u00b7y.',
        '\u201cAt least\u201d → \u2265. \u201cAt most / no more than\u201d → \u2264. \u201cMore than\u201d → >. \u201cLess than\u201d → <.'];
    }
    if(p.rep==='graph') return ['A solid line means \u2264 or \u2265; a dashed line means < or >.',
      'Shading above the line means \u2265 or >; shading below means \u2264 or <.',
      'Read the slope and y-intercept straight off the line, just like writing its equation.'];
    return ['Use the table to find the boundary line\u2019s equation, just like writing y = mx + b.',
      'Plug the given point in \u2014 whichever direction makes it a true statement is your inequality symbol.',
      'Solid boundary → \u2264 or \u2265. Dashed boundary → < or >.'];
  },
  steps:function(p){
    if(p.rep==='verbal') return p.form==='si'?stepsH_si(p):stepsH(p);
    if(p.rep==='graph') return p.form==='si'?stepsH_line_si(p):stepsH_line_std(p);
    return p.form==='si'?stepsH_table_si(p):stepsH_table_std(p);
  } },

{ id:'A.2I', letter:'I', short:'Systems', title:'Write Systems of Equations',
  blurb:'Write systems of two linear equations given a table of values, a graph, and a verbal description.',
  gen:genI,
  prompt:function(p){
    var repPick='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">'+
      '<span style="font-size:12px;font-weight:900;letter-spacing:.4px;color:var(--muted)">FROM</span>'+
      '<div class="drSeg" id="iRepSeg" role="tablist" aria-label="Representation">'+
        '<button type="button" data-v="mix">Mixed</button>'+
        '<button type="button" data-v="verbal">Words</button>'+
        '<button type="button" data-v="table">Table</button>'+
        '<button type="button" data-v="graph">Graph</button>'+
      '</div></div>';
    var formPick='<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:12px;opacity:.75">'+
      '<span style="font-size:10.5px;font-weight:900;letter-spacing:.4px;color:var(--muted)">FORM</span>'+
      '<div class="drSeg" id="iFormSeg" role="tablist" aria-label="Answer form" style="transform:scale(.9);transform-origin:left center">'+
        '<button type="button" data-v="mix">Mixed</button>'+
        '<button type="button" data-v="std">Standard</button>'+
        '<button type="button" data-v="si">Slope-intercept</button>'+
      '</div></div>';
    var body = p.rep==='table' ? tableHTML_I(p) : p.rep==='graph' ? graphSVG_I(p) : p.text;
    return repPick+formPick+body;
  },
  init:function(){
    wireLabSeg('iRepSeg', iRep, function(v){ iRep=v; newProblem(); });
    wireLabSeg('iFormSeg', iForm, function(v){ iForm=v; newProblem(); });
    wireSharedKbd(document.getElementById('answerArea'), 'sharedKbdBtn', 'sharedKbdPop');
  },
  answerHTML:function(p){
    function lrow(pre){ return '<div class="sysRow"><span>y =</span>'+inBox(pre+'m')+'<span>x +</span>'+inBox(pre+'b')+'</div>'; }
    function srow(pre){ return '<div class="sysRow">'+inBox(pre+'A')+'<span>x +</span>'+inBox(pre+'B')+'<span>y =</span>'+inBox(pre+'C','wide')+'</div>'; }
    var row1=(p.rowForms[0]==='si')?lrow('i1'):srow('i1'), row2=(p.rowForms[1]==='si')?lrow('i2'):srow('i2');
    var note=(p.rowForms[0]!==p.rowForms[1]) ? '<div class="lbl" style="font-size:13px;color:var(--muted);font-weight:800;margin-top:2px">One equation in standard form, one in slope-intercept \u2014 either equation can go in either box.</div>' : '';
    return '<div class="answer" style="display:block">'+row1+row2+'</div>'+note+sharedKbdHTML();
  },
  read:function(p){
    function g(id){ return parseRat(document.getElementById(id).value); }
    function readRow(pre, form){
      if(form==='si'){ var m=g(pre+'m'), b=g(pre+'b'); return (m&&b)?{m:m,b:b}:null; }
      var A=g(pre+'A'), B=g(pre+'B'), C=g(pre+'C'); return (A&&B&&C)?{A:A,B:B,C:C}:null;
    }
    var a1=readRow('i1',p.rowForms[0]), a2=readRow('i2',p.rowForms[1]);
    return (a1&&a2)?[a1,a2]:null;
  },
  check:function(p,ans){ return checkI_pair(p,ans); },
  hints:function(p){
    var base;
    if(p.rep==='table') base=['Each table is its own line. The change in y for each step in x is the slope.','The y-value when x = 0 is the y-intercept, b.'];
    else if(p.rep==='graph') base=['Read each line separately: slope = rise \u00f7 run, and note where it crosses the y-axis.','Write each line as y = mx + b first, no matter which form you end up needing.'];
    else base=['Equation 1 counts objects: x + y = (total number).',
      'Equation 2 counts value: (value of x)\u00b7x + (value of y)\u00b7y = (total value).'];
    if(p.rowForms[0]!==p.rowForms[1]) base.push('One box wants standard form, the other slope-intercept \u2014 write each independently, in whichever form its box asks for.');
    else if(p.rowForms[0]==='std') base.push('Need standard form? Start from y = mx + b, then move the x-term over: \u2212mx + y = b, and clear fractions.');
    return base;
  },
  steps:function(p){ return (p.rep==='verbal') ? stepsI_verbal(p) : stepsI_lines(p); } }
];

/* =============== app wiring =============== */
var current={se:SES[0], p:null, done:false, recorded:false, hintIdx:0, hintLogged:false};
var session={a:0,c:0};
var $=function(s){return document.querySelector(s);};

function stoneStats(id){
  return (window.Portal && Portal.skill) ? Portal.skill(id) : {progress:0, attempts:0, mastered:false};
}
function renderRail(){
  var host=$('#stones'); host.innerHTML='';
  SES.forEach(function(se){
    var st=stoneStats(se.id);
    var cls='stone'+(se===current.se?' active':'')+(st.mastered?' mastered':st.attempts?' started':'');
    var b=document.createElement('button');
    b.type='button'; b.className=cls;
    b.innerHTML='<span class="dot">'+(st.mastered?'\u2713':se.letter)+'</span>'+
      '<span><span class="nm">'+se.id+' · '+se.short+'</span>'+
      '<span class="mini"><i style="width:'+Math.round(st.progress*100)+'%"></i></span></span>';
    b.addEventListener('click', function(){ current.se=se; newProblem(); });
    host.appendChild(b);
  });
}
function newProblem(){
  var se=current.se;
  current.p=se.gen(); current.done=false; current.recorded=false; current.hintIdx=0; current.hintLogged=false;
  $('#seTitle').textContent=se.title;
  $('#seBlurb').textContent=se.blurb;
  $('#seTag').textContent='TEKS '+se.id;
  $('#prompt').innerHTML=se.prompt(current.p);
  $('#answerArea').innerHTML=se.answerHTML(current.p);
  $('#fbMsg').textContent=''; $('#fbMsg').className='fb';
  $('#hintBox').className='note'; $('#hintBox').innerHTML='';
  $('#stepsBox').className='stepsBox'; $('#stepsBox').innerHTML='';
  $('#checkBtn').disabled=false;
  if(se.init) se.init(current.p);
  renderRail();
  var first=$('#answerArea input'); if(first) first.focus();
}
function onCheck(){
  if(current.done) return;
  var se=current.se, ans=se.read(current.p);
  if(!ans){
    $('#fbMsg').className='fb bad';
    $('#fbMsg').textContent=se.emptyMsg||'Fill in every box — fractions like 3/4 are fine.';
    return;
  }
  var ok=se.check(current.p, ans);
  if(se.allowRecheck){
    /* retryable SE (the graph lab): lock only once correct; the first
       check is what counts toward the portal + session score */
    if(ok) current.done=true;
  } else {
    current.done=true;
    $('#checkBtn').disabled=true;
    if(se.reveal) se.reveal(current.p);
  }
  if(!current.recorded){
    current.recorded=true;
    session.a++; if(ok) session.c++;
    $('#sesScore').textContent=session.c+' / '+session.a;
    if(window.Portal && Portal.record) Portal.record(se.id, ok);
  }
  $('#fbMsg').className='fb '+(ok?'ok':'bad');
  $('#fbMsg').textContent= ok?'Correct \u2713'
    : (se.allowRecheck?'Not quite \u2717 — read the coach tips, adjust, and check again.'
                      :'Not quite \u2717 — open the steps to see the path.');
  renderRail();
}
function logHintUse(){
  if(!current.hintLogged && window.Portal && Portal.hint){ Portal.hint(current.se.id); current.hintLogged=true; }
}
function onHint(){
  var hints=current.se.hints(current.p);
  var h=hints[Math.min(current.hintIdx, hints.length-1)];
  current.hintIdx++;
  var box=$('#hintBox'); box.classList.add('show');
  box.innerHTML += (box.innerHTML?'<br>':'')+'\u2022 '+h;
  logHintUse();
}
function onSteps(){
  var box=$('#stepsBox'); box.classList.add('show');
  box.innerHTML=current.se.steps(current.p);
  logHintUse();
}
$('#checkBtn').addEventListener('click', onCheck);
$('#hintBtn').addEventListener('click', onHint);
$('#stepsBtn').addEventListener('click', onSteps);
$('#nextBtn').addEventListener('click', newProblem);
window.addEventListener('keydown', function(e){
  var tag=(e.target.tagName||'').toLowerCase();
  if(e.key==='Enter' && tag!=='select'){ e.preventDefault(); onCheck(); }
  if((e.key==='n'||e.key==='N') && tag!=='input'){ newProblem(); }
});

/* deep link: teks-a2.html?se=A.2F */
var want=new URLSearchParams(location.search).get('se');
if(want){ var f=SES.filter(function(s){return s.id.toLowerCase()===want.toLowerCase();})[0]; if(f) current.se=f; }
newProblem();
})();
</script>
