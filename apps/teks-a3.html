<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>A.3 Studio — Slope · Rate of Change · Key Features · Transformations · Systems</title>
<style>
  :root{
    --bg:#eef3ff; --panel:#fff; --ui:#dfe6ff; --ink:#0f2340; --muted:#5b6f96;
    --blue:#2f6cff; --teal:#36c2a0; --gold:#f4c431; --danger:#e5484d; --vio:#8e78ff;
    --accent:#2f6cff; --shadow:0 8px 20px rgba(25,40,80,.06);
  }
  *{box-sizing:border-box}
  html,body{min-height:100dvh}
  body{margin:0; background:var(--bg); color:var(--ink); overflow:auto;
    font-family:ui-rounded, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif}
  .wrap{width:min(1240px,100%); margin:14px auto; padding:0 12px}

  /* ---------- header ---------- */
  .hdr{background:var(--panel); border:1px solid var(--ui); border-radius:16px; box-shadow:var(--shadow);
    padding:12px 16px; margin-bottom:12px; display:flex; align-items:center; gap:12px; flex-wrap:wrap}
  .back{font-weight:900; text-decoration:none; color:var(--blue); font-size:14px; padding:8px 12px;
    border:1px solid var(--ui); border-radius:10px; background:#fff}
  .hdr h1{margin:0; font-size:clamp(17px,2.6vw,22px); font-weight:900; flex:1; min-width:200px}
  .hdr .eyebrow{display:block; font-size:11px; letter-spacing:.8px; color:var(--muted); text-transform:uppercase; font-weight:900}
  .pill{display:inline-block; padding:6px 12px; border-radius:999px; border:1px solid var(--ui);
    background:#fff; font-weight:900; font-size:13px}
  .pill b{color:var(--blue)}

  /* ---------- layout ---------- */
  .cols{display:grid; grid-template-columns:250px 1fr; gap:12px; align-items:start}
  @media (max-width:900px){ .cols{grid-template-columns:1fr} }

  /* ---------- SE rail ---------- */
  .rail{background:var(--panel); border:1px solid var(--ui); border-radius:16px; box-shadow:var(--shadow); padding:10px}
  .rail .rh{font-size:11px; letter-spacing:.8px; color:var(--muted); text-transform:uppercase; font-weight:900; padding:4px 8px 8px}
  .stones{display:flex; flex-direction:column; position:relative}
  .stones::before{content:""; position:absolute; left:24px; top:18px; bottom:18px; border-left:3px dotted #d5deff}
  .stone{display:flex; align-items:center; gap:10px; padding:6px 8px; border:0; background:none;
    border-radius:12px; cursor:pointer; text-align:left; font-family:inherit; color:var(--ink); width:100%}
  .stone:hover{background:#f5f8ff}
  .stone.active{background:#eef4ff; outline:2px solid #bcd2ff}
  .stone .dot{width:34px; height:34px; flex:none; border-radius:50%; border:3px solid #d5deff; background:#fff;
    z-index:1; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:13px; color:var(--muted)}
  .stone.started .dot{border-color:var(--accent); color:var(--ink)}
  .stone.mastered .dot{background:var(--accent); border-color:var(--accent); color:#fff}
  .stone .nm{font-weight:900; font-size:13px; line-height:1.2}
  .stone .mini{height:5px; border-radius:999px; background:#edf2ff; margin-top:4px; overflow:hidden; width:110px}
  .stone .mini i{display:block; height:100%; background:var(--accent); border-radius:999px}
  @media (max-width:900px){
    .rail{position:sticky; top:8px; z-index:5}
    .stones{flex-direction:row; overflow-x:auto; gap:6px; padding-bottom:4px}
    .stones::before{display:none}
    .stone{flex:none; flex-direction:column; gap:4px; padding:6px; width:auto; min-width:74px}
    .stone .mini{width:56px}
    .stone .nm{font-size:11px; text-align:center; max-width:90px}
  }

  /* ---------- main card ---------- */
  .main{background:var(--panel); border:1px solid var(--ui); border-radius:16px; box-shadow:var(--shadow); padding:16px}
  .seHead{display:flex; justify-content:space-between; gap:10px; align-items:flex-start; flex-wrap:wrap;
    border-bottom:1px dashed #e5e7eb; padding-bottom:10px; margin-bottom:12px}
  .seHead h2{margin:0; font-size:19px; font-weight:900}
  .seHead .blurb{color:var(--muted); font-weight:700; font-size:13px; margin-top:3px; max-width:640px}
  .seTag{font-size:12px; font-weight:900; color:#133a9a; background:#f1f6ff; border:1px solid var(--ui);
    border-radius:999px; padding:6px 14px; white-space:nowrap}

  .prompt{font-size:clamp(17px,2.4vw,21px); font-weight:800; line-height:1.55; margin:6px 0 14px}
  .prompt .given{background:#f6f9ff; border:1px solid #e7edff; border-radius:12px; padding:10px 14px;
    display:inline-block; margin-top:8px; font-size:clamp(19px,3vw,26px)}

  /* pretty math bits */
  .vfrac{display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle;
    font-size:.72em; line-height:1.05; font-weight:900; margin:0 2px}
  .vfrac span:first-child{border-bottom:2.5px solid currentColor; padding:0 4px}
  .vfrac span:last-child{padding:0 4px}
  table.ttab{border-collapse:collapse; margin-top:8px; font-size:clamp(16px,2.4vw,20px)}
  .ttab th,.ttab td{border:2px solid #d9e2ff; padding:6px 16px; text-align:center; font-weight:900; min-width:54px}
  .ttab th{background:#f1f6ff; color:#133a9a}

  /* coordinate grid */
  .grid{max-width:100%; height:auto; border:1px solid #e7edff; border-radius:12px; background:#fff;
    margin-top:10px; touch-action:none; display:block}

  /* ---------- answer area ---------- */
  .answer{display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:clamp(20px,3.4vw,28px); font-weight:900; margin:10px 0 6px}
  .answer .lbl{font-size:15px; color:var(--muted); width:100%; font-weight:900}
  .lbl{font-size:15px; color:var(--muted); font-weight:900}
  .in{height:56px; width:96px; border:2px solid var(--ui); border-radius:12px; text-align:center;
    font-weight:900; font-size:22px; font-family:inherit; color:var(--ink)}
  .in.wide{width:120px}
  .in:focus-visible, .sel:focus-visible, button:focus-visible{outline:3px solid #59c6ff; outline-offset:2px}
  .sel{height:56px; border:2px solid var(--ui); border-radius:12px; font-weight:900; font-size:20px;
    font-family:inherit; color:var(--ink); background:#fff; padding:0 8px}
  .sysRow{display:flex; align-items:center; gap:8px; margin:6px 0; flex-wrap:wrap}
  .radio{display:flex; gap:16px; flex-wrap:wrap; font-size:16px; margin-top:6px}
  .radio label{display:flex; align-items:center; gap:6px; font-weight:800; cursor:pointer}
  .radio input{accent-color:var(--blue); width:18px; height:18px}

  /* MC chips (A.3E identify) */
  .mc{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px}
  @media (max-width:720px){ .mc{grid-template-columns:1fr} }
  .mc button{border:2px solid var(--ui); background:#fff; border-radius:14px; padding:12px 14px;
    font-family:inherit; font-weight:800; font-size:15.5px; text-align:left; cursor:pointer; color:var(--ink); line-height:1.5}
  .mc button.sel{border-color:var(--blue); background:#f1f6ff}
  .mc button:disabled{cursor:default; opacity:.85}
  .mc button.right{border-color:#7de0a6; background:#eafff2}
  .mc button.wrong{border-color:#ffb3b3; background:#fff3f3}

  /* selector segments */
  .drSeg{display:inline-flex; border:1px solid var(--ui); border-radius:12px; overflow:hidden; flex-wrap:wrap}
  .drSeg button{background:#fff; border:none; padding:7px 10px; font-size:12.5px; font-weight:800;
    cursor:pointer; font-family:inherit; color:var(--ink)}
  .drSeg button.active{background:#f1f6ff; color:#133a9a}

  /* buttons + feedback */
  .btnRow{display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; align-items:center}
  .btn{height:46px; border-radius:12px; border:1px solid var(--ui); background:#fff; font-weight:900;
    padding:0 16px; cursor:pointer; font-family:inherit; font-size:15px; color:var(--ink)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.55; cursor:not-allowed}
  .btn.check{border:0; background:linear-gradient(90deg,var(--blue),var(--teal)); color:#081635; min-width:110px}
  .btn.hint{border:0; background:linear-gradient(90deg,#ffe6a8,#ffcf70); color:#081635}
  .btn.steps{border:0; background:linear-gradient(90deg,#cfe0ff,#9bb9ff); color:#081635}
  .btn.next{background:#f6f9ff}
  .fb{font-weight:900; font-size:17px; min-height:26px; margin-top:8px}
  .fb.ok{color:#0b6b2f} .fb.bad{color:#a33232}
  .note{background:#fff9d6; border:1px solid #ffe38a; color:#7a5a00; border-radius:12px; padding:10px 14px;
    font-weight:800; font-size:14.5px; margin-top:10px; display:none; line-height:1.55}
  .note.show{display:block}
  .stepsBox{background:#f6f9ff; border:1px solid #e7edff; border-radius:12px; padding:12px 16px;
    font-weight:800; font-size:15.5px; margin-top:10px; display:none; line-height:1.8}
  .stepsBox.show{display:block}
  .stepsBox .st{display:block; margin:2px 0}
  .stepsBox .final{color:#133a9a}
  .kbdnote{color:var(--muted); font-size:12px; font-weight:800; margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <a class="back" href="../index.html">← Portal</a>
    <h1><span class="eyebrow">Section 1 · Linear Functions</span>TEKS A.3 · Slope · Rate of Change · Key Features · Transformations · Systems</h1>
    <span class="pill">This visit <b id="sesScore">0 / 0</b></span>
  </div>

  <div class="cols">
    <div class="rail">
      <div class="rh">Student Expectations</div>
      <div class="stones" id="stones"></div>
    </div>

    <div class="main">
      <div class="seHead">
        <div>
          <h2 id="seTitle"></h2>
          <div class="blurb" id="seBlurb"></div>
        </div>
        <span class="seTag" id="seTag"></span>
      </div>

      <div class="prompt" id="prompt"></div>
      <div id="answerArea"></div>

      <div class="btnRow">
        <button class="btn check" id="checkBtn">Check</button>
        <button class="btn hint" id="hintBtn">Hint</button>
        <button class="btn steps" id="stepsBtn">Show steps</button>
        <button class="btn next" id="nextBtn">New problem</button>
      </div>
      <div class="fb" id="fb" aria-live="polite"></div>
      <div class="note" id="hintBox"></div>
      <div class="stepsBox" id="stepsBox"></div>
      <div class="kbdnote">Fractions are welcome in any box — type 3/4 or −3/4. Enter = check · N = new problem.</div>
    </div>
  </div>
</div>

<script src="../portal.js"></script>
<script>
(function(){
'use strict';

/* ====================== PURE: math + helpers (shared with A.2) ====================== */

/* ---- randoms ---- */
function ri(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function rc(arr){ return arr[ri(0,arr.length-1)]; }
function rnz(a,b){ var x=0; while(x===0) x=ri(a,b); return x; }
function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=ri(0,i); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

/* ---- rationals ---- */
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ var t=a%b; a=b; b=t; } return a||1; }
function R(n,d){ d=(d===undefined)?1:d; if(d<0){n=-n;d=-d;} var g=gcd(n,d); return {n:n/g, d:d/g}; }
function radd(a,b){ return R(a.n*b.d + b.n*a.d, a.d*b.d); }
function rsub(a,b){ return R(a.n*b.d - b.n*a.d, a.d*b.d); }
function rmul(a,b){ return R(a.n*b.n, a.d*b.d); }
function rdiv(a,b){ return R(a.n*b.d, a.d*b.n); }
function rneg(a){ return R(-a.n, a.d); }
function req(a,b){ return a.n*b.d === b.n*a.d; }
function rzero(a){ return a.n===0; }
function rint(x){ return R(x,1); }
function rval(a){ return a.n/a.d; }
function parseRat(s){
  if(s===null || s===undefined) return null;
  s = String(s).trim().replace(/\u2212/g,'-').replace(/\s+/g,'');
  if(!s || !/\d/.test(s)) return null;
  var m = s.match(/^(-?\d+)\/(-?\d+)$/);
  if(m){ var d=parseInt(m[2],10); if(!d) return null; return R(parseInt(m[1],10), d); }
  if(/^-?\d+$/.test(s)) return R(parseInt(s,10),1);
  m = s.match(/^(-)?(\d*)\.(\d+)$/);
  if(m){
    var neg=!!m[1], ip=m[2]||'0', fp=m[3];
    var den=Math.pow(10,fp.length), num=parseInt(ip,10)*den + parseInt(fp,10);
    return R(neg?-num:num, den);
  }
  return null;
}

/* ---- display helpers (HTML strings) ---- */
var MIN='\u2212';
function fmtInt(x){ return x<0 ? MIN+Math.abs(x) : String(x); }
function ratHTML(r){
  if(r.d===1) return fmtInt(r.n);
  var s = r.n<0 ? MIN : '';
  return s+'<span class="vfrac"><span>'+Math.abs(r.n)+'</span><span>'+r.d+'</span></span>';
}
function ratText(r){ return r.d===1 ? String(r.n) : r.n+'/'+r.d; }
/* slope-intercept display: y = mx + b (m,b rationals) */
function siHTML(m,b){
  var out='y = ';
  if(req(m,rint(1))) out+='x';
  else if(req(m,rint(-1))) out+=MIN+'x';
  else if(rzero(m)) out+='';
  else out+=ratHTML(m)+'x';
  if(rzero(m)) return 'y = '+ratHTML(b);
  if(!rzero(b)) out += (b.n>0?' + ':' '+MIN+' ') + ratHTML(R(Math.abs(b.n),b.d));
  return out;
}
function ptStr(x,y){ return '('+fmtInt(x)+', '+fmtInt(y)+')'; }

/* standard form Ax + By = C with integer coefficients (m,b rationals) */
function stdOf(m,b){
  var A=m.n*b.d, B=-m.d*b.d, C=-b.n*m.d;
  if(A<0){A=-A;B=-B;C=-C;}
  if(A===0 && B<0){B=-B;C=-C;}
  var g=gcd(gcd(A,B),Math.abs(C)||1); A/=g; B/=g; C/=g;
  var by = (B<0?MIN+' '+(-B):'+ '+B)+'y';
  return A+'x '+by+' = '+fmtInt(C);
}

/* nice slopes for generation */
var FRACS = [[1,2],[-1,2],[1,3],[-1,3],[2,3],[-2,3],[3,2],[-3,2],[1,4],[-1,4],[3,4],[-3,4]];
function niceSlope(allowInt){
  if(allowInt!==false && Math.random()<0.55) return R(rnz(-4,4),1);
  var f=rc(FRACS); return R(f[0],f[1]);
}
function latticeX(m){ return m.d * rnz(-3,3); }

/* ---- inequality helpers ---- */
var SYM={lt:'<', le:'\u2264', gt:'>', ge:'\u2265'};
function satIneq(op,lhs,rhs){
  if(op==='lt') return lhs<rhs;
  if(op==='le') return lhs<=rhs;
  if(op==='gt') return lhs>rhs;
  return lhs>=rhs;
}
function isSolid(op){ return op==='le'||op==='ge'; }
function isAbove(op){ return op==='gt'||op==='ge'; }
function rhsStr(m,b){
  var s;
  if(m===1) s='x'; else if(m===-1) s=MIN+'x'; else if(m===0) return fmtInt(b); else s=fmtInt(m)+'x';
  if(b>0) s+=' + '+b; else if(b<0) s+=' '+MIN+' '+Math.abs(b);
  return s;
}
function ineqStr(m,b,op){ return 'y '+SYM[op]+' '+rhsStr(m,b); }

/* ====================== PURE: coordinate grid drawing ====================== */
/* Centered grid on [-Rg,Rg]. lines: {m,k,color,dash}; vlines:{x,color,dash};
   points:{x,y,color,label,open}; labels:{text,color}. */
function plot(o){
  o=o||{};
  var Rg=o.Rg||6, S=Math.round(288/(2*Rg)), W=2*Rg*S, H=2*Rg*S, i;
  function X(x){ return (x+Rg)*S; }
  function Y(y){ return (Rg-y)*S; }
  function clip(m,k){
    var xL=-Rg,yL=m*xL+k,xR=Rg,yR=m*xR+k;
    if(yL>Rg){xL=(Rg-k)/m;yL=Rg;} else if(yL<-Rg){xL=(-Rg-k)/m;yL=-Rg;}
    if(yR>Rg){xR=(Rg-k)/m;yR=Rg;} else if(yR<-Rg){xR=(-Rg-k)/m;yR=-Rg;}
    return [xL,yL,xR,yR];
  }
  var s='<svg viewBox="0 0 '+W+' '+H+'" width="300" height="300" class="grid" xmlns="http://www.w3.org/2000/svg">';
  for(i=-Rg;i<=Rg;i++){
    s+='<line x1="'+X(i)+'" y1="0" x2="'+X(i)+'" y2="'+H+'" stroke="#e9eefb" stroke-width="1"/>';
    s+='<line x1="0" y1="'+Y(i)+'" x2="'+W+'" y2="'+Y(i)+'" stroke="#e9eefb" stroke-width="1"/>';
  }
  s+='<line x1="'+X(0)+'" y1="0" x2="'+X(0)+'" y2="'+H+'" stroke="#9db4e8" stroke-width="2"/>';
  s+='<line x1="0" y1="'+Y(0)+'" x2="'+W+'" y2="'+Y(0)+'" stroke="#9db4e8" stroke-width="2"/>';
  for(i=-Rg;i<=Rg;i+=2){ if(i===0) continue;
    s+='<text x="'+X(i)+'" y="'+(Y(0)+14)+'" font-size="11" font-weight="700" fill="#5b6f96" text-anchor="middle">'+i+'</text>';
    s+='<text x="'+(X(0)-6)+'" y="'+(Y(i)+4)+'" font-size="11" font-weight="700" fill="#5b6f96" text-anchor="end">'+i+'</text>';
  }
  (o.lines||[]).forEach(function(L){
    var c=clip(L.m,L.k);
    s+='<line x1="'+X(c[0])+'" y1="'+Y(c[1])+'" x2="'+X(c[2])+'" y2="'+Y(c[3])+'" stroke="'+(L.color||'#2f6cff')+'" stroke-width="3.5" stroke-linecap="round"'+(L.dash?' stroke-dasharray="8 6"':'')+'/>';
  });
  (o.vlines||[]).forEach(function(V){
    s+='<line x1="'+X(V.x)+'" y1="0" x2="'+X(V.x)+'" y2="'+H+'" stroke="'+(V.color||'#2f6cff')+'" stroke-width="3.5"'+(V.dash?' stroke-dasharray="8 6"':'')+'/>';
  });
  (o.points||[]).forEach(function(P){
    s+='<circle cx="'+X(P.x)+'" cy="'+Y(P.y)+'" r="5.5" fill="'+(P.open?'#fff':(P.color||'#e5484d'))+'" stroke="'+(P.color||'#e5484d')+'" stroke-width="3"/>';
    if(P.label) s+='<text x="'+(X(P.x)+9)+'" y="'+(Y(P.y)-8)+'" font-size="12" font-weight="900" fill="'+(P.color||'#e5484d')+'">'+P.label+'</text>';
  });
  (o.labels||[]).forEach(function(t,idx){
    s+='<text x="'+(W-8)+'" y="'+(16+idx*16)+'" font-size="12" font-weight="900" fill="'+t.color+'" text-anchor="end">'+t.text+'</text>';
  });
  return s+'</svg>';
}

/* First-quadrant graph with scaled, labeled axes — for real-world A.3G. */
function plotQ1(o){
  var W=320,H=300, pad=40, x0=pad, y0=H-pad;
  var xmax=o.xmax, ymax=o.ymax;
  function X(x){ return x0 + (x/xmax)*(W-pad-10); }
  function Y(y){ return y0 - (y/ymax)*(H-pad-12); }
  var xs=o.xstep||Math.max(1,Math.round(xmax/6));
  var ys=o.ystep||Math.max(1,Math.round(ymax/6));
  var s='<svg viewBox="0 0 '+W+' '+H+'" width="320" height="300" class="grid" xmlns="http://www.w3.org/2000/svg">';
  var i;
  for(i=0;i<=xmax+0.001;i+=xs){ s+='<line x1="'+X(i)+'" y1="'+Y(0)+'" x2="'+X(i)+'" y2="'+Y(ymax)+'" stroke="#eef2fb" stroke-width="1"/>';
    s+='<text x="'+X(i)+'" y="'+(y0+15)+'" font-size="10" font-weight="700" fill="#5b6f96" text-anchor="middle">'+i+'</text>'; }
  for(i=0;i<=ymax+0.001;i+=ys){ s+='<line x1="'+X(0)+'" y1="'+Y(i)+'" x2="'+X(xmax)+'" y2="'+Y(i)+'" stroke="#eef2fb" stroke-width="1"/>';
    s+='<text x="'+(x0-6)+'" y="'+(Y(i)+4)+'" font-size="10" font-weight="700" fill="#5b6f96" text-anchor="end">'+i+'</text>'; }
  s+='<line x1="'+X(0)+'" y1="'+Y(0)+'" x2="'+X(xmax)+'" y2="'+Y(0)+'" stroke="#9db4e8" stroke-width="2"/>';
  s+='<line x1="'+X(0)+'" y1="'+Y(0)+'" x2="'+X(0)+'" y2="'+Y(ymax)+'" stroke="#9db4e8" stroke-width="2"/>';
  (o.lines||[]).forEach(function(L){
    var yA=L.m*0+L.k, yB=L.m*xmax+L.k;
    s+='<line x1="'+X(0)+'" y1="'+Y(yA)+'" x2="'+X(xmax)+'" y2="'+Y(yB)+'" stroke="'+L.color+'" stroke-width="3.5" stroke-linecap="round"/>';
  });
  if(o.xlabel) s+='<text x="'+X(xmax)+'" y="'+(y0+28)+'" font-size="11" font-weight="900" fill="#5b6f96" text-anchor="end">'+o.xlabel+'</text>';
  if(o.ylabel) s+='<text x="'+(x0+2)+'" y="16" font-size="11" font-weight="900" fill="#5b6f96">'+o.ylabel+'</text>';
  (o.labels||[]).forEach(function(t,idx){
    s+='<text x="'+(W-8)+'" y="'+(16+idx*16)+'" font-size="12" font-weight="900" fill="'+t.color+'" text-anchor="end">'+t.text+'</text>';
  });
  return s+'</svg>';
}

/* ---------- A.3A · Slope of a line (multiple representations) ---------- */
var aMode='mix';
function genA(){
  var mode = aMode==='mix' ? rc(['pts','table','graph','equation']) : aMode;
  if(mode==='pts'){
    var m=niceSlope(true); if(rzero(m)) m=R(rnz(-4,4),1);
    var b=rint(ri(-6,6));
    var x1=latticeX(m), x2=x1; while(x2===x1) x2=latticeX(m);
    return {se:'A.3A', mode:mode, m:m,
      x1:x1, y1:radd(rmul(m,rint(x1)),b).n, x2:x2, y2:radd(rmul(m,rint(x2)),b).n};
  }
  if(mode==='table'){
    var m2=niceSlope(true); if(rzero(m2)) m2=R(rnz(-3,3),1);
    var b2=rint(ri(-6,6)), x0=m2.d*ri(-2,1), step=m2.d*rc([1,1,2]), xs=[],ys=[],i;
    for(i=0;i<4;i++){ var x=x0+i*step; xs.push(x); ys.push(radd(rmul(m2,rint(x)),b2).n); }
    return {se:'A.3A', mode:mode, m:m2, xs:xs, ys:ys};
  }
  if(mode==='graph'){
    var roll=Math.random();
    if(roll<0.15) return {se:'A.3A', mode:mode, kind:'horiz', m:R(0), b:rnz(-5,5)};
    if(roll<0.30) return {se:'A.3A', mode:mode, kind:'vert', undef:true, x:rnz(-5,5)};
    var mg=niceSlope(true); if(rzero(mg)) mg=R(rnz(-3,3),1);
    return {se:'A.3A', mode:mode, kind:'line', m:mg, b:rint(rnz(-4,4))};
  }
  /* equation */
  var roll2=Math.random(), form=rc(['si','std','ps']);
  if(roll2<0.14) return {se:'A.3A', mode:'equation', kind:'vert', undef:true, x:rnz(-6,6)};
  if(roll2<0.28) return {se:'A.3A', mode:'equation', kind:'horiz', m:R(0), b:rnz(-6,6)};
  var me=niceSlope(true); if(rzero(me)) me=R(rnz(-3,3),1);
  var be=rint(rnz(-6,6)), pe=null;
  if(form==='ps'){ var px=latticeX(me); pe={x1:px, y1:radd(rmul(me,rint(px)),be).n}; }
  return {se:'A.3A', mode:'equation', kind:'line', m:me, b:be, form:form, pe:pe};
}
function eqStrA(p){
  if(p.kind==='vert') return 'x = '+fmtInt(p.x);
  if(p.kind==='horiz') return 'y = '+fmtInt(p.b);
  if(p.form==='si') return siHTML(p.m,p.b);
  if(p.form==='std') return stdOf(p.m,p.b);
  return 'y '+MIN+' '+fmtInt(p.pe.y1)+' = '+ratHTML(p.m)+'(x '+MIN+' '+fmtInt(p.pe.x1)+')';
}
function promptA(p){
  var seghtml=segWrap('FROM','aSeg',aMode,[['mix','Mixed'],['pts','Two points'],['table','Table'],['graph','Graph'],['equation','Equation']]);
  var body;
  if(p.mode==='pts'){
    body='Find the <b>slope</b> of the line through <span class="given">'+ptStr(p.x1,p.y1)+'</span> and <span class="given">'+ptStr(p.x2,p.y2)+'</span>.';
  } else if(p.mode==='table'){
    var h='The table shows a linear function. Find its <b>slope</b>.<table class="ttab"><tr><th>x</th>';
    p.xs.forEach(function(x){h+='<td>'+fmtInt(x)+'</td>';}); h+='</tr><tr><th>y</th>';
    p.ys.forEach(function(y){h+='<td>'+fmtInt(y)+'</td>';}); body=h+'</tr></table>';
  } else if(p.mode==='graph'){
    var g = p.kind==='vert' ? plot({vlines:[{x:p.x}]})
          : plot({lines:[{m:(p.kind==='horiz'?0:rval(p.m)), k:(p.kind==='horiz'?p.b:p.b.n)}]});
    body='Find the <b>slope</b> of the graphed line.<br>'+g;
  } else {
    body='Find the <b>slope</b> of the line: <span class="given">'+eqStrA(p)+'</span>';
  }
  return seghtml+body;
}
var slopeBoxHTML='<div class="answer"><span>slope m =</span><input class="in wide" id="aSlope" inputmode="text" autocomplete="off" /></div>'+
  '<div class="lbl">Type a number or fraction (e.g. 3, −2, 3/4, 0). For a vertical line, type <b>undefined</b>.</div>';

  if(p.mode==='pts')

      '<span class="st">2. = ('+fmtInt(p.y2)+' \u2212 '+fmtInt(p.y1)+') \u00f7 ('+fmtInt(p.x2)+' \u2212 '+fmtInt(p.x1)+')</span>'+
      '<span class="st final">3. m = '+ratHTML(p.m)+'</span>';
  if(p.mode==='table')
    return '<span class="st">1. Pick any two columns and divide the change in y by the change in x.</span>'+
      '<span class="st">2. = ('+fmtInt(p.ys[1])+' \u2212 '+fmtInt(p.ys[0])+') \u00f7 ('+fmtInt(p.xs[1])+' \u2212 '+fmtInt(p.xs[0])+')</span>'+
      '<span class="st final">3. m = '+ratHTML(p.m)+'</span>';
  if(p.kind==='vert')
    return '<span class="st">1. A vertical line x = '+fmtInt(p.x)+' has no run (\u0394x = 0).</span>'+
      '<span class="st final">2. Dividing by zero is undefined \u2192 the slope is <b>undefined</b>.</span>';
  if(p.kind==='horiz')
    return '<span class="st">1. A horizontal line y = '+fmtInt(p.b)+' never rises (\u0394y = 0).</span>'+

    return '<span class="st">1. Count rise (up/down) over run (right) between two lattice points.</span>'+
      '<span class="st final">2. m = '+ratHTML(p.m)+'</span>';
  /* equation line */
  if(p.form==='si') return '<span class="st">In y = mx + b, the coefficient of x is the slope.</span><span class="st final">m = '+ratHTML(p.m)+'</span>';
  if(p.form==='std') return '<span class="st">1. For Ax + By = C, solve for y (or use m = \u2212A/B).</span><span class="st final">2. m = '+ratHTML(p.m)+'</span>';
  return '<span class="st">In point-slope y \u2212 y\u2081 = m(x \u2212 x\u2081), m sits right in front of the parentheses.</span><span class="st final">m = '+ratHTML(p.m)+'</span>';
}

/* ---------- A.3B · Rate of change in context ---------- */
var bMode='mix';
var BCTX=[
  {noun:'Water in a tank', unit:'gallons', per:'minute', xw:'minutes', sign:-1},
  {noun:'Money in a savings account', unit:'dollars', per:'week', xw:'weeks', sign:1},
  {noun:'A candle\u2019s height', unit:'cm', per:'hour', xw:'hours', sign:-1},

  {noun:'Distance from home', unit:'miles', per:'hour', xw:'hours', sign:1}
];
function genB(){
  var mode = bMode==='mix' ? rc(['words','table','graph']) : bMode;
  var ctx=rc(BCTX), mag=ri(2,9), r=ctx.sign*mag;
  var x1=ri(0,2), x2=x1+ri(2,5);
  var s = ctx.sign<0 ? mag*x2 + ri(2,10) : ri(0,8);
  var v1=s+r*x1, v2=s+r*x2;

}

/* ---------- A.3E · Transformations of the parent f(x) = x ---------- */
var eMode='mix';
function transVal(type){
  if(type==='af'){ var a=rc([R(2),R(3),R(4),R(1,2),R(1,3),R(3,2),R(-1),R(-2)]); return a; }
  if(type==='fbx'){ var b=rc([R(2),R(3),R(4),R(1,2),R(3,2)]); return b; }
  if(type==='plusd') return rint(rnz(-5,5));
  return rint(rnz(-4,4)); /* minusc */
}
function notation(type,val){
  if(type==='af') return ratText(val)+'\u00b7f(x)';
  if(type==='fbx') return 'f('+ratText(val)+'x)';
  if(type==='plusd') return 'f(x) '+(val.n>0?'+ '+val.n:MIN+' '+Math.abs(val.n));
  return 'f(x '+(val.n>0?MIN+' '+val.n:'+ '+Math.abs(val.n))+')';
}
function transAns(type,val){
  if(type==='af') return {m:val, b:R(0)};
  if(type==='fbx') return {m:val, b:R(0)};
  if(type==='plusd') return {m:R(1), b:val};
  return {m:R(1), b:rneg(val)};      /* f(x-c) = x - c */
}
/* Amount-free effect description (direction/type) used by the identify mode
   and its steps; the exact shift amount is tested in the write-equation mode. */
function effectStr(type,val){
  var v=rval(val);
  if(type==='plusd') return v>0?'Shifts up':'Shifts down';
  if(type==='minusc') return v>0?'Shifts right':'Shifts left';
  /* af or fbx: steepness / reflection */
  if(v<0){
    if(Math.abs(v)===1) return 'Reflects across the x-axis';
    return Math.abs(v)>1 ? 'Reflects across the x-axis and gets steeper' : 'Reflects across the x-axis and gets less steep';
  }
  return v>1 ? 'Gets steeper (vertical stretch)' : 'Gets less steep (vertical compression)';
}
var EFF_POOL=['Shifts up','Shifts down','Shifts left','Shifts right',
  'Gets steeper (vertical stretch)','Gets less steep (vertical compression)','Reflects across the x-axis'];
function genE(){
  var mode = eMode==='mix' ? rc(['write','identify']) : eMode;
  var type=rc(['af','plusd','minusc','fbx']);
  var val=transVal(type);
  if(mode==='write'){
    return {se:'A.3E', mode:mode, type:type, val:val, ans:transAns(type,val)};
  }
  var correct=effectStr(type,val);
  var pool=EFF_POOL.filter(function(s){ return s!==correct; });
  shuffle(pool);
  var opts=shuffle([correct].concat(pool.slice(0,3)));
  return {se:'A.3E', mode:mode, type:type, val:val, options:opts, correctIdx:opts.indexOf(correct)};
}
function promptE(p){
  var seghtml=segWrap('MODE','eSeg',eMode,[['mix','Mixed'],['write','Write equation'],['identify','Identify effect']]);
  if(p.mode==='write'){
    return seghtml+'The parent function is <span class="given">f(x) = x</span>. Write <span class="given">g(x) = '+notation(p.type,p.val)+'</span> in slope-intercept form.';
  }
  return seghtml+'The parent function is <span class="given">f(x) = x</span>. It is replaced by <span class="given">'+notation(p.type,p.val)+'</span>. Which best describes the effect on the graph?';
}
var eSel=null;
function answerE(p){
  if(p.mode==='write'){
    return '<div class="answer"><span>g(x) =</span>'+inBox('eM')+'<span>x +</span>'+inBox('eB')+'</div>';
  }
  var h='<div class="mc" id="eMC">';
  p.options.forEach(function(o,i){ h+='<button type="button" data-i="'+i+'">'+o+'</button>'; });
  return h+'</div>';
}
function initE(p){
  if(p.mode!=='identify') return;
  eSel=null;
  var mc=document.getElementById('eMC'); if(!mc) return;
  Array.prototype.forEach.call(mc.querySelectorAll('button'),function(btn){
    btn.addEventListener('click',function(){
      if(current.done) return;
      Array.prototype.forEach.call(mc.querySelectorAll('button'),function(b){b.classList.remove('sel');});
      btn.classList.add('sel'); eSel=parseInt(btn.getAttribute('data-i'),10);
    });
  });
}
function readE(p){
  if(p.mode==='write'){
    var m=parseRat(document.getElementById('eM').value), b=parseRat(document.getElementById('eB').value);
    return (m&&b)?{m:m,b:b}:null;
  }
  return eSel==null?null:{idx:eSel};
}
function checkE(p,a){
  if(p.mode==='write') return req(a.m,p.ans.m) && req(a.b,p.ans.b);
  return a.idx===p.correctIdx;
}
function revealE(p){
  if(p.mode!=='identify') return;
  var mc=document.getElementById('eMC'); if(!mc) return;
  Array.prototype.forEach.call(mc.querySelectorAll('button'),function(btn){
    var i=parseInt(btn.getAttribute('data-i'),10); btn.disabled=true;
    if(i===p.correctIdx) btn.classList.add('right');
    else if(i===eSel) btn.classList.add('wrong');
  });
}
function stepsE(p){
  if(p.mode==='write'){
    var lead;
    if(p.type==='af') lead='Multiply the whole function by '+ratText(p.val)+': g(x) = '+ratText(p.val)+'\u00b7x.';
    else if(p.type==='fbx') lead='Replace x with '+ratText(p.val)+'x: g(x) = '+ratText(p.val)+'x.';
    else if(p.type==='plusd') lead='Add '+p.val.n+' to the output: g(x) = x '+(p.val.n>0?'+ '+p.val.n:MIN+' '+Math.abs(p.val.n))+'.';
    else lead='Replace x with (x '+(p.val.n>0?MIN+' '+p.val.n:'+ '+Math.abs(p.val.n))+'): g(x) = x '+(p.val.n>0?MIN+' '+p.val.n:'+ '+Math.abs(p.val.n))+'.';
    return '<span class="st">1. '+lead+'</span><span class="st final">2. '+siHTML(p.ans.m,p.ans.b)+'</span>';
  }
  var why;
  if(p.type==='plusd') why='Adding d outside the function moves every point up (d &gt; 0) or down (d &lt; 0).';
  else if(p.type==='minusc') why='Subtracting c inside, f(x \u2212 c), slides the graph right (c &gt; 0) or left (c &lt; 0).';
  else if(p.type==='af') why='Multiplying the output by a scales it vertically: |a| &gt; 1 steeper, |a| &lt; 1 flatter, a &lt; 0 flips it.';
  else why='Multiplying x by b, f(bx), scales horizontally: for f(x) = x it makes the line steeper (b &gt; 1) or flatter (0 &lt; b &lt; 1).';
  return '<span class="st">'+why+'</span><span class="st final">Effect: '+effectStr(p.type,p.val)+'.</span>';
}

/* ---------- A.3F · Graph systems of two linear equations (solve) ---------- */
var fMode='mix';
function genF(){
  var kind = fMode==='mix' ? (function(){var r=Math.random(); return r<0.72?'one':(r<0.86?'none':'inf');})() : fMode;
  if(kind==='none'){
    var m=rnz(-2,2), k1=rnz(-5,5), k2=k1; while(k2===k1) k2=rnz(-5,5);
    return {se:'A.3F', kind:'none', L:[{m:m,k:k1},{m:m,k:k2}]};
  }
  if(kind==='inf'){
    var mi=rnz(-2,2), ki=rnz(-4,4);
    return {se:'A.3F', kind:'inf', L:[{m:mi,k:ki},{m:mi,k:ki}]};
  }
  var sx,sy,m1,m2,k1b,k2b,guard=0;
  do{ sx=rnz(-3,3); sy=rnz(-3,3); m1=rnz(-2,2); m2=m1; while(m2===m1) m2=rnz(-2,2);
      k1b=sy-m1*sx; k2b=sy-m2*sx; guard++;
  } while((Math.abs(k1b)>6||Math.abs(k2b)>6) && guard<60);
  return {se:'A.3F', kind:'one', sx:sx, sy:sy, L:[{m:m1,k:k1b},{m:m2,k:k2b}]};
}
function promptF(p){
  var seghtml=segWrap('CASE','fSeg',fMode,[['mix','Mixed'],['one','One'],['none','None'],['inf','Same line']]);
  var eqs='<div class="given">'+siHTML(rint(p.L[0].m),rint(p.L[0].k))+'</div> <div class="given">'+siHTML(rint(p.L[1].m),rint(p.L[1].k))+'</div>';
  var g=plot({lines:[
    {m:p.L[0].m,k:p.L[0].k,color:'#2f6cff'},
    {m:p.L[1].m,k:p.L[1].k,color:'#e5484d', dash:(p.kind==='inf')}
  ], labels:[{text:'line 1',color:'#2f6cff'},{text:'line 2',color:'#e5484d'}]});
  return seghtml+'Graph the system and give its solution.'+eqs+g;
}
function answerF(){
  return '<div class="answer" style="display:block">'+
    '<div class="sysRow"><span>Solution:</span>'+
      '<select class="sel" id="fType"><option value="">?</option>'+
      '<option value="one">exactly one point</option>'+
      '<option value="none">no solution</option>'+
      '<option value="inf">infinitely many</option></select></div>'+
    '<div class="sysRow" id="fPt"><span>Point (</span>'+inBox('fx')+'<span>, </span>'+inBox('fy')+'<span>)</span></div>'+
    '</div>';
}
function readF(){
  var t=document.getElementById('fType').value;
  if(!t) return null;
  if(t==='one'){ var x=parseRat(document.getElementById('fx').value), y=parseRat(document.getElementById('fy').value);
    return (x&&y)?{type:t,x:x,y:y}:null; }
  return {type:t};
}
function checkF(p,a){
  if(a.type!==p.kind) return false;
  if(p.kind==='one') return req(a.x,rint(p.sx)) && req(a.y,rint(p.sy));
  return true;
}
function stepsF(p){
  if(p.kind==='none')
    return '<span class="st">1. Both lines have slope '+fmtInt(p.L[0].m)+' but different y-intercepts.</span>'+
      '<span class="st final">2. Parallel lines never cross \u2192 <b>no solution</b>.</span>';
  if(p.kind==='inf')
    return '<span class="st">1. Both equations simplify to the same line.</span>'+
      '<span class="st final">2. Every point works \u2192 <b>infinitely many solutions</b>.</span>';
  return '<span class="st">1. The solution is where the graphs cross.</span>'+
    '<span class="st">2. Set them equal: '+fmtInt(p.L[0].m)+'x + '+fmtInt(p.L[0].k)+' = '+fmtInt(p.L[1].m)+'x + '+fmtInt(p.L[1].k)+'.</span>'+
    '<span class="st final">3. Solution: '+ptStr(p.sx,p.sy)+'.</span>';
}

/* ---------- A.3G · Estimate system solution graphically (real-world) ---------- */
function genG(){
  var A=rc([['Gym A','Gym B','months','month','$'],
            ['Plan A','Plan B','months','month','$'],
            ['Company 1','Company 2','hours','hour','$']]);
  var xstar=ri(3,7), r1=ri(4,9), r2=r1; while(r2===r1) r2=ri(4,9);
  var f1=(r2-r1>0? (r2-r1):(r1-r2))*xstar + ri(6,24);
  var f2=f1-(r2-r1)*xstar;                 /* guarantees crossing at xstar */
  if(f2<0){ f1+=-f2+ri(2,8); f2=f1-(r2-r1)*xstar; }
  var ystar=f1+r1*xstar;
  return {se:'A.3G', labels:A, x:xstar, y:ystar, f1:f1, r1:r1, f2:f2, r2:r2};
}
function promptG(p){
  var A=p.labels;
  var body=A[0]+' charges a $'+p.f1+' fee plus $'+p.r1+' per '+A[3]+'. '+
           A[1]+' charges a $'+p.f2+' fee plus $'+p.r2+' per '+A[3]+'.';
  var xmax=p.x+3, ymax=Math.ceil((p.y+8)/5)*5;
  var g=plotQ1({xmax:xmax, ymax:ymax,
    lines:[{m:p.r1,k:p.f1,color:'#2f6cff'},{m:p.r2,k:p.f2,color:'#e5484d'}],
    xlabel:A[2], ylabel:'cost ($)',
    labels:[{text:A[0],color:'#2f6cff'},{text:A[1],color:'#e5484d'}]});
  return body+'<br><span style="font-size:15px;color:var(--muted)">Estimate from the graph: after how many '+A[2]+' do they cost the same, and what is that cost?</span>'+g;
}
function answerG(p){
  return '<div class="answer" style="display:block">'+
    '<div class="sysRow"><span>'+p.labels[2]+':</span>'+inBox('gx')+'</div>'+
    '<div class="sysRow"><span>equal cost: $</span>'+inBox('gy','wide')+'</div>'+
    '</div>';
}
function readG(){
  var x=parseRat(document.getElementById('gx').value), y=parseRat(document.getElementById('gy').value);
  return (x&&y)?{x:x,y:y}:null;
}
function checkG(p,a){ return req(a.x,rint(p.x)) && req(a.y,rint(p.y)); }
function stepsG(p){
  return '<span class="st">1. Costs are equal where the two lines cross.</span>'+
    '<span class="st">2. '+p.f1+' + '+p.r1+'x = '+p.f2+' + '+p.r2+'x \u2192 x = '+p.x+' '+p.labels[2]+'.</span>'+
    '<span class="st final">3. Cost then: '+p.f1+' + '+p.r1+'('+p.x+') = $'+p.y+'.</span>';
}

/* ---------- A.3H · Graph the solution set of a system of inequalities ---------- */
function genH(){
  var m1=rnz(-2,2), b1=rnz(-4,4), op1=rc(['lt','le','gt','ge']);
  var m2=rnz(-2,2), b2=rnz(-4,4), op2=rc(['lt','le','gt','ge']);
  var px=rnz(-5,5), py=rnz(-5,5);
  var s1=satIneq(op1,py,m1*px+b1), s2=satIneq(op2,py,m2*px+b2);
  return {se:'A.3H', I:[{m:m1,b:b1,op:op1},{m:m2,b:b2,op:op2}], px:px, py:py, s1:s1, s2:s2, sol:s1&&s2};
}
function promptH(p){
  var eqs='<div class="given">'+ineqStr(p.I[0].m,p.I[0].b,p.I[0].op)+'</div> <div class="given">'+ineqStr(p.I[1].m,p.I[1].b,p.I[1].op)+'</div>';
  var g=plot({lines:[
    {m:p.I[0].m,k:p.I[0].b,color:'#9aa9c9',dash:true},
    {m:p.I[1].m,k:p.I[1].b,color:'#c0c8de',dash:true}
  ], points:[{x:p.px,y:p.py,color:'#e5484d'}]});
  return 'Graph the solution set of this system. The dot is the test point '+ptStr(p.px,p.py)+'.'+eqs+g;
}
function answerH(){
  function sd(id){ return '<select class="sel" id="'+id+'"><option value="">?</option><option value="solid">solid</option><option value="dashed">dashed</option></select>'; }
  return '<div class="answer" style="display:block">'+
    '<div class="sysRow"><span>Boundary of inequality 1 is</span>'+sd('hB1')+'</div>'+
    '<div class="sysRow"><span>Boundary of inequality 2 is</span>'+sd('hB2')+'</div>'+
    '<div class="radio"><span style="font-weight:900">Is the test point in the solution set of the system?</span>'+
      '<label><input type="radio" name="hSol" value="yes"> yes</label>'+
      '<label><input type="radio" name="hSol" value="no"> no</label></div>'+
    '</div>';
}
function readH(){
  var b1=document.getElementById('hB1').value, b2=document.getElementById('hB2').value;
  var r=document.querySelector('input[name="hSol"]:checked');
  return (b1&&b2&&r)?{b1:b1,b2:b2,sol:r.value==='yes'}:null;
}
function checkH(p,a){
  return a.b1===(isSolid(p.I[0].op)?'solid':'dashed') &&
         a.b2===(isSolid(p.I[1].op)?'solid':'dashed') &&
         a.sol===p.sol;
}
function stepsH(p){
  var r1=p.I[0].m*p.px+p.I[0].b, r2=p.I[1].m*p.px+p.I[1].b;
  return '<span class="st">1. Each boundary: \u2264/\u2265 \u2192 solid, &lt;/&gt; \u2192 dashed.</span>'+
    '<span class="st">2. Test '+ptStr(p.px,p.py)+' in each. Ineq 1: '+fmtInt(p.py)+' '+SYM[p.I[0].op]+' '+fmtInt(r1)+'? '+(p.s1?'Yes':'No')+'.</span>'+
    '<span class="st">3. Ineq 2: '+fmtInt(p.py)+' '+SYM[p.I[1].op]+' '+fmtInt(r2)+'? '+(p.s2?'Yes':'No')+'.</span>'+
    '<span class="st final">4. A system solution must satisfy <b>both</b> \u2192 the point '+(p.sol?'is':'is not')+' in the overlap.</span>';
}

/* =============== SE module definitions (UI layer) =============== */

/* =============== app wiring (mirrors A.2) =============== */
var current={se:SES[0], p:null, done:false, recorded:false, hintIdx:0, hintLogged:false};
var session={a:0,c:0};
var $=function(s){return document.querySelector(s);};

function stoneStats(id){
  return (window.Portal && Portal.skill) ? Portal.skill(id) : {progress:0, attempts:0, mastered:false};
}
function renderRail(){
  var host=$('#stones'); host.innerHTML='';
  SES.forEach(function(se){
    var st=stoneStats(se.id);
    var cls='stone'+(se===current.se?' active':'')+(st.mastered?' mastered':st.attempts?' started':'');
    var b=document.createElement('button');
    b.type='button'; b.className=cls;
    b.innerHTML='<span class="dot">'+(st.mastered?'\u2713':se.letter)+'</span>'+
      '<span><span class="nm">'+se.id+' \u00b7 '+se.short+'</span>'+
      '<span class="mini"><i style="width:'+Math.round(st.progress*100)+'%"></i></span></span>';
    b.addEventListener('click', function(){ current.se=se; newProblem(); });
    host.appendChild(b);
  });
}
function newProblem(){
  var se=current.se;
  current.p=se.gen(); current.done=false; current.recorded=false; current.hintIdx=0; current.hintLogged=false;
  $('#seTitle').textContent=se.title;
  $('#seBlurb').textContent=se.blurb;
  $('#seTag').textContent='TEKS '+se.id;
  $('#prompt').innerHTML=se.prompt(current.p);
  $('#answerArea').innerHTML=se.answerHTML(current.p);
  $('#fb').textContent=''; $('#fb').className='fb';
  $('#hintBox').className='note'; $('#hintBox').innerHTML='';
  $('#stepsBox').className='stepsBox'; $('#stepsBox').innerHTML='';
  $('#checkBtn').disabled=false;
  if(se.init) se.init(current.p);
  renderRail();
  var first=$('#answerArea input'); if(first) first.focus();
}
function onCheck(){
  if(current.done) return;
  var se=current.se, ans=se.read(current.p);
  if(!ans){
    $('#fb').className='fb bad';
    $('#fb').textContent=se.emptyMsg||'Fill in every box \u2014 fractions like 3/4 are fine.';
    return;
  }
  var ok=se.check(current.p, ans);
  current.done=true;
  $('#checkBtn').disabled=true;
  if(se.reveal) se.reveal(current.p);
  if(!current.recorded){
    current.recorded=true;
    session.a++; if(ok) session.c++;
    $('#sesScore').textContent=session.c+' / '+session.a;
    if(window.Portal && Portal.record) Portal.record(se.id, ok);
  }
  $('#fb').className='fb '+(ok?'ok':'bad');
  $('#fb').textContent= ok?'Correct \u2713' : 'Not quite \u2717 \u2014 open the steps to see the path.';
  renderRail();
}
function onHint(){
  var hints=current.se.hints(current.p);
  var h=hints[Math.min(current.hintIdx, hints.length-1)];
  current.hintIdx++;
  var box=$('#hintBox'); box.classList.add('show');
  box.innerHTML += (box.innerHTML?'<br>':'')+'\u2022 '+h;
  if(!current.hintLogged && window.Portal && Portal.hint){ Portal.hint(current.se.id); current.hintLogged=true; }
}
function onSteps(){
  var box=$('#stepsBox'); box.classList.add('show');
  box.innerHTML=current.se.steps(current.p);
  if(!current.hintLogged && window.Portal && Portal.hint){ Portal.hint(current.se.id); current.hintLogged=true; }
}
$('#checkBtn').addEventListener('click', onCheck);
$('#hintBtn').addEventListener('click', onHint);
$('#stepsBtn').addEventListener('click', onSteps);
$('#nextBtn').addEventListener('click', newProblem);
window.addEventListener('keydown', function(e){
  var tag=(e.target.tagName||'').toLowerCase();
  if(e.key==='Enter' && tag!=='select'){ e.preventDefault(); onCheck(); }
  if((e.key==='n'||e.key==='N') && tag!=='input'){ newProblem(); }
});

if(want){ var f=SES.filter(function(s){return s.id.toLowerCase()===want.toLowerCase();})[0]; if(f) current.se=f; }
newProblem();
})();
