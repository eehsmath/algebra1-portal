<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>A.4 Studio — Scatterplots · Correlation · Association vs Causation · Line of Best Fit</title>
<style>
  :root{
    --bg:#eef3ff; --panel:#fff; --ui:#dfe6ff; --ink:#0f2340; --muted:#5b6f96;
    --blue:#2f6cff; --teal:#36c2a0; --gold:#f4c431; --danger:#e5484d; --vio:#8e78ff;
    --accent:#2f6cff; --shadow:0 8px 20px rgba(25,40,80,.06);
  }
  *{box-sizing:border-box}
  html,body{min-height:100dvh}
  body{margin:0; background:var(--bg); color:var(--ink); overflow:auto;
    font-family:ui-rounded, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif}
  .wrap{width:min(1240px,100%); margin:14px auto; padding:0 12px}

  /* ---------- header ---------- */
  .hdr{background:var(--panel); border:1px solid var(--ui); border-radius:16px; box-shadow:var(--shadow);
    padding:12px 16px; margin-bottom:12px; display:flex; align-items:center; gap:12px; flex-wrap:wrap}
  .back{font-weight:900; text-decoration:none; color:var(--blue); font-size:14px; padding:8px 12px;
    border:1px solid var(--ui); border-radius:10px; background:#fff}
  .hdr h1{margin:0; font-size:clamp(17px,2.6vw,22px); font-weight:900; flex:1; min-width:200px}
  .hdr .eyebrow{display:block; font-size:11px; letter-spacing:.8px; color:var(--muted); text-transform:uppercase; font-weight:900}
  .pill{display:inline-block; padding:6px 12px; border-radius:999px; border:1px solid var(--ui);
    background:#fff; font-weight:900; font-size:13px}
  .pill b{color:var(--blue)}

  /* ---------- layout ---------- */
  .cols{display:grid; grid-template-columns:250px 1fr; gap:12px; align-items:start}
  @media (max-width:900px){ .cols{grid-template-columns:1fr} }

  /* ---------- SE rail ---------- */
  .rail{background:var(--panel); border:1px solid var(--ui); border-radius:16px; box-shadow:var(--shadow); padding:10px}
  .rail .rh{font-size:11px; letter-spacing:.8px; color:var(--muted); text-transform:uppercase; font-weight:900; padding:4px 8px 8px}
  .stones{display:flex; flex-direction:column; position:relative}
  .stones::before{content:""; position:absolute; left:24px; top:18px; bottom:18px; border-left:3px dotted #d5deff}
  .stone{display:flex; align-items:center; gap:10px; padding:6px 8px; border:0; background:none;
    border-radius:12px; cursor:pointer; text-align:left; font-family:inherit; color:var(--ink); width:100%}
  .stone:hover{background:#f5f8ff}
  .stone.active{background:#eef4ff; outline:2px solid #bcd2ff}
  .stone .dot{width:34px; height:34px; flex:none; border-radius:50%; border:3px solid #d5deff; background:#fff;
    z-index:1; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:13px; color:var(--muted)}
  .stone.started .dot{border-color:var(--accent); color:var(--ink)}
  .stone.mastered .dot{background:var(--accent); border-color:var(--accent); color:#fff}
  .stone .nm{font-weight:900; font-size:13px; line-height:1.2}
  .stone .mini{height:5px; border-radius:999px; background:#edf2ff; margin-top:4px; overflow:hidden; width:110px}
  .stone .mini i{display:block; height:100%; background:var(--accent); border-radius:999px}
  @media (max-width:900px){
    .rail{position:sticky; top:8px; z-index:5}
    .stones{flex-direction:row; overflow-x:auto; gap:6px; padding-bottom:4px}
    .stones::before{display:none}
    .stone{flex:none; flex-direction:column; gap:4px; padding:6px; width:auto; min-width:74px}
    .stone .mini{width:56px}
    .stone .nm{font-size:11px; text-align:center; max-width:90px}
  }

  /* ---------- main card ---------- */
  .main{background:var(--panel); border:1px solid var(--ui); border-radius:16px; box-shadow:var(--shadow); padding:16px}
  .seHead{display:flex; justify-content:space-between; gap:10px; align-items:flex-start; flex-wrap:wrap;
    border-bottom:1px dashed #e5e7eb; padding-bottom:10px; margin-bottom:12px}
  .seHead h2{margin:0; font-size:19px; font-weight:900}
  .seHead .blurb{color:var(--muted); font-weight:700; font-size:13px; margin-top:3px; max-width:640px}
  .seTag{font-size:12px; font-weight:900; color:#133a9a; background:#f1f6ff; border:1px solid var(--ui);
    border-radius:999px; padding:6px 14px; white-space:nowrap}

  .prompt{font-size:clamp(17px,2.4vw,21px); font-weight:800; line-height:1.55; margin:6px 0 14px}
  .prompt .given{background:#f6f9ff; border:1px solid #e7edff; border-radius:12px; padding:10px 14px;
    display:inline-block; margin-top:8px; font-size:clamp(19px,3vw,26px)}
  .prompt .scen{background:#f6f9ff; border:1px solid #e7edff; border-radius:12px; padding:12px 16px;
    display:block; margin-top:8px; font-size:clamp(15px,2.2vw,18px); font-weight:800; line-height:1.6}

  /* pretty math bits */
  .vfrac{display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle;
    font-size:.72em; line-height:1.05; font-weight:900; margin:0 2px}
  .vfrac span:first-child{border-bottom:2.5px solid currentColor; padding:0 4px}
  .vfrac span:last-child{padding:0 4px}
  table.ttab{border-collapse:collapse; margin-top:8px; font-size:clamp(15px,2.2vw,19px)}
  .ttab th,.ttab td{border:2px solid #d9e2ff; padding:6px 14px; text-align:center; font-weight:900; min-width:44px}
  .ttab th{background:#f1f6ff; color:#133a9a}

  /* coordinate grid */
  .grid{max-width:100%; height:auto; border:1px solid #e7edff; border-radius:12px; background:#fff;
    margin-top:10px; display:block}

  /* ---------- answer area ---------- */
  .answer{display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:clamp(20px,3.4vw,28px); font-weight:900; margin:10px 0 6px}
  .answer .lbl{font-size:15px; color:var(--muted); width:100%; font-weight:900}
  .lbl{font-size:15px; color:var(--muted); font-weight:900}
  .in{height:56px; width:96px; border:2px solid var(--ui); border-radius:12px; text-align:center;
    font-weight:900; font-size:22px; font-family:inherit; color:var(--ink)}
  .in.wide{width:120px}
  .in:focus-visible, .sel:focus-visible, button:focus-visible{outline:3px solid #59c6ff; outline-offset:2px}
  .sel{height:52px; border:2px solid var(--ui); border-radius:12px; font-weight:900; font-size:17px;
    font-family:inherit; color:var(--ink); background:#fff; padding:0 10px}
  .selRow{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:8px 0}
  .selRow .cap{font-size:13px; font-weight:900; color:var(--muted); min-width:74px}

  /* MC chips */
  .mc{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px}
  @media (max-width:720px){ .mc{grid-template-columns:1fr} }
  .mc button{border:2px solid var(--ui); background:#fff; border-radius:14px; padding:12px 14px;
    font-family:inherit; font-weight:800; font-size:15.5px; text-align:left; cursor:pointer; color:var(--ink); line-height:1.5}
  .mc button.sel{border-color:var(--blue); background:#f1f6ff}
  .mc button:disabled{cursor:default; opacity:.85}
  .mc button.right{border-color:#7de0a6; background:#eafff2}
  .mc button.wrong{border-color:#ffb3b3; background:#fff3f3}

  /* selector segments */
  .drSeg{display:inline-flex; border:1px solid var(--ui); border-radius:12px; overflow:hidden; flex-wrap:wrap}
  .drSeg button{background:#fff; border:none; padding:7px 10px; font-size:12.5px; font-weight:800;
    cursor:pointer; font-family:inherit; color:var(--ink)}
  .drSeg button.active{background:#f1f6ff; color:#133a9a}

  /* buttons + feedback */
  .btnRow{display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; align-items:center}
  .btn{height:46px; border-radius:12px; border:1px solid var(--ui); background:#fff; font-weight:900;
    padding:0 16px; cursor:pointer; font-family:inherit; font-size:15px; color:var(--ink)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.55; cursor:not-allowed}
  .btn.check{border:0; background:linear-gradient(90deg,var(--blue),var(--teal)); color:#081635; min-width:110px}
  .btn.hint{border:0; background:linear-gradient(90deg,#ffe6a8,#ffcf70); color:#081635}
  .btn.steps{border:0; background:linear-gradient(90deg,#cfe0ff,#9bb9ff); color:#081635}
  .btn.next{background:#f6f9ff}
  .fb{font-weight:900; font-size:17px; min-height:26px; margin-top:8px}
  .fb.ok{color:#0b6b2f} .fb.bad{color:#a33232}
  .note{background:#fff9d6; border:1px solid #ffe38a; color:#7a5a00; border-radius:12px; padding:10px 14px;
    font-weight:800; font-size:14.5px; margin-top:10px; display:none; line-height:1.55}
  .note.show{display:block}
  .stepsBox{background:#f6f9ff; border:1px solid #e7edff; border-radius:12px; padding:12px 16px;
    font-weight:800; font-size:15.5px; margin-top:10px; display:none; line-height:1.8}
  .stepsBox.show{display:block}
  .stepsBox .st{display:block; margin:2px 0}
  .stepsBox .final{color:#133a9a}
  .kbdnote{color:var(--muted); font-size:12px; font-weight:800; margin-top:10px}
</style>

<div class="wrap">
  <div class="hdr">
    <a class="back" href="../index.html">← Portal</a>
    <h1><span class="eyebrow">Section 1 · Linear Functions</span>TEKS A.4 · Scatterplots · Correlation · Association vs Causation · Line of Best Fit</h1>
    <span class="pill">This visit <b id="sesScore">0 / 0</b></span>
  </div>

  <div class="cols">
    <div class="rail">
      <div class="rh">Student Expectations</div>
      <div class="stones" id="stones"></div>
    </div>

    <div class="main">
      <div class="seHead">
        <div>
          <h2 id="seTitle"></h2>
          <div class="blurb" id="seBlurb"></div>
        </div>
        <span class="seTag" id="seTag"></span>
      </div>

      <div class="prompt" id="prompt"></div>
      <div id="answerArea"></div>

      <div class="btnRow">
        <button class="btn check" id="checkBtn">Check</button>
        <button class="btn hint" id="hintBtn">Hint</button>
        <button class="btn steps" id="stepsBtn">Show steps</button>
        <button class="btn next" id="nextBtn">New problem</button>
      </div>

    </div>

</div>

<script src="../portal.js"></script>
<script>
(function(){
'use strict';

/* ====================== PURE: math + helpers (shared with A.2 / A.3) ====================== */

/* ---- randoms ---- */
function ri(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function rc(arr){ return arr[ri(0,arr.length-1)]; }
function rnz(a,b){ var x=0; while(x===0) x=ri(a,b); return x; }
function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=ri(0,i); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

/* ---- rationals ---- */
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ var t=a%b; a=b; b=t; } return a||1; }
function R(n,d){ d=(d===undefined)?1:d; if(d<0){n=-n;d=-d;} var g=gcd(n,d); return {n:n/g, d:d/g}; }
function req(a,b){ return a.n*b.d === b.n*a.d; }
function parseRat(s){
  if(s===null || s===undefined) return null;
  s = String(s).trim().replace(/\u2212/g,'-').replace(/\$/g,'').replace(/,/g,'').replace(/\s+/g,'');
  if(!s || !/\d/.test(s)) return null;
  var m = s.match(/^(-?\d+)\/(-?\d+)$/);
  if(m){ var d=parseInt(m[2],10); if(!d) return null; return R(parseInt(m[1],10), d); }
  if(/^-?\d+$/.test(s)) return R(parseInt(s,10),1);
  m = s.match(/^(-)?(\d*)\.(\d+)$/);
  if(m){
    var neg=!!m[1], ip=m[2]||'0', fp=m[3];
    var den=Math.pow(10,fp.length), num=parseInt(ip,10)*den + parseInt(fp,10);
    return R(neg?-num:num, den);
  }
  return null;
}

/* ---- display helpers ---- */
var MIN='\u2212';
function fmtInt(x){ return x<0 ? MIN+Math.abs(x) : String(x); }
/* r value shown to 2 decimals with a proper minus glyph */
function rStr(v){ return (v<0?MIN:'')+Math.abs(v).toFixed(2); }
/* slope-intercept string (integers) */
function siStr(m,b){
  var s='y = ';
  s += (m===1?'x':m===-1?MIN+'x':fmtInt(m)+'x');
  if(b>0) s+=' + '+b; else if(b<0) s+=' '+MIN+' '+Math.abs(b);
  return s;
}

/* small helper: input box */
function inBox(id, wide){ return '<input class="in'+(wide?' wide':'')+'" id="'+id+'" inputmode="text" autocomplete="off" />'; }
function seg(id,opts){
  var h='<div class="drSeg" id="'+id+'" role="tablist">';
  opts.forEach(function(o){ h+='<button type="button" data-v="'+o[0]+'">'+o[1]+'</button>'; });
  return h+'</div>';
}
function wireSeg(id,cur,cb){
  var box=document.getElementById(id); if(!box) return;
  Array.prototype.forEach.call(box.querySelectorAll('button'),function(btn){
    if(btn.getAttribute('data-v')===cur) btn.classList.add('active');
    btn.addEventListener('click',function(){
      Array.prototype.forEach.call(box.querySelectorAll('button'),function(b){b.classList.remove('active');});
      btn.classList.add('active'); cb(btn.getAttribute('data-v'));
    });
  });
}
function segWrap(label,id,opts){
  return '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">'+
    '<span style="font-size:12px;font-weight:900;letter-spacing:.4px;color:var(--muted)">'+label+'</span>'+
    seg(id,opts)+'</div>';
}

/* dropdown */
function selBox(id, opts){
  var h='<select class="sel" id="'+id+'"><option value="">—</option>';
  opts.forEach(function(o){ h+='<option value="'+o[0]+'">'+o[1]+'</option>'; });
  return h+'</select>';
}

/* ====================== PURE: statistics + scatter drawing ====================== */

function pearson(xs,ys){
  var n=xs.length, sx=0,sy=0,sxx=0,syy=0,sxy=0,i;
  for(i=0;i<n;i++){ sx+=xs[i]; sy+=ys[i]; sxx+=xs[i]*xs[i]; syy+=ys[i]*ys[i]; sxy+=xs[i]*ys[i]; }
  var num=n*sxy - sx*sy;
  var den=Math.sqrt((n*sxx-sx*sx)*(n*syy-sy*sy));
  return den===0 ? 0 : num/den;
}
/* teaching thresholds (also shown in the steps):
     strong |r| >= 0.8 · moderate 0.5 <= |r| < 0.8 · weak 0 < |r| < 0.5 · none r ~ 0 */
function strengthOf(r){ var a=Math.abs(r); return a>=0.8?'strong':a>=0.5?'moderate':a>=0.15?'weak':'none'; }
function directionOf(r){ return Math.abs(r)<0.15 ? 'none' : (r>0?'positive':'negative'); }

/* First-quadrant scatter with scaled, labeled axes; optional best-fit line. */
function scatter(o){
  var W=340,H=300, padL=44, padR=14, padT=14, padB=38;
  var xmax=o.xmax, ymax=o.ymax, plotW=W-padL-padR, plotH=H-padT-padB, i;
  function X(x){ return padL + (x/xmax)*plotW; }
  function Y(y){ return (padT+plotH) - (y/ymax)*plotH; }
  var xs=o.xstep||Math.max(1,Math.round(xmax/6));
  var ys=o.ystep||Math.max(1,Math.round(ymax/6));
  var s='<svg viewBox="0 0 '+W+' '+H+'" width="340" height="300" class="grid" xmlns="http://www.w3.org/2000/svg">';
  for(i=0;i<=xmax+1e-6;i+=xs){
    s+='<line x1="'+X(i)+'" y1="'+Y(0)+'" x2="'+X(i)+'" y2="'+Y(ymax)+'" stroke="#eef2fb" stroke-width="1"/>';
    s+='<text x="'+X(i)+'" y="'+(padT+plotH+15)+'" font-size="10" font-weight="700" fill="#5b6f96" text-anchor="middle">'+i+'</text>';
  }
  for(i=0;i<=ymax+1e-6;i+=ys){
    s+='<line x1="'+X(0)+'" y1="'+Y(i)+'" x2="'+X(xmax)+'" y2="'+Y(i)+'" stroke="#eef2fb" stroke-width="1"/>';
    s+='<text x="'+(padL-6)+'" y="'+(Y(i)+4)+'" font-size="10" font-weight="700" fill="#5b6f96" text-anchor="end">'+i+'</text>';
  }
  s+='<line x1="'+X(0)+'" y1="'+Y(0)+'" x2="'+X(xmax)+'" y2="'+Y(0)+'" stroke="#9db4e8" stroke-width="2"/>';
  s+='<line x1="'+X(0)+'" y1="'+Y(0)+'" x2="'+X(0)+'" y2="'+Y(ymax)+'" stroke="#9db4e8" stroke-width="2"/>';
  if(o.line){
    var m=o.line.m, k=o.line.k, xA=0, yA=k, xB=xmax, yB=m*xmax+k;
    if(yA>ymax){ xA=(ymax-k)/m; yA=ymax; } else if(yA<0){ xA=(0-k)/m; yA=0; }
    if(yB>ymax){ xB=(ymax-k)/m; yB=ymax; } else if(yB<0){ xB=(0-k)/m; yB=0; }
    s+='<line x1="'+X(xA)+'" y1="'+Y(yA)+'" x2="'+X(xB)+'" y2="'+Y(yB)+'" stroke="#2f6cff" stroke-width="3.5" stroke-linecap="round"/>';
  }
  (o.points||[]).forEach(function(P){
    s+='<circle cx="'+X(P.x)+'" cy="'+Y(P.y)+'" r="4.5" fill="#36c2a0" stroke="#0c7d63" stroke-width="1.5"/>';
  });
  if(o.xlabel) s+='<text x="'+(padL+plotW)+'" y="'+(padT+plotH+30)+'" font-size="10.5" font-weight="900" fill="#5b6f96" text-anchor="end">'+o.xlabel+'</text>';
  if(o.ylabel) s+='<text x="'+(padL-2)+'" y="11" font-size="10.5" font-weight="900" fill="#5b6f96">'+o.ylabel+'</text>';
  return s+'</svg>';
}

/* build a cloud of points around y = m x + b inside [0,xmax] x [0,ymax] */
function cloud(m,b,xmax,ymax,amp,n){
  var pts=[], i;
  for(i=0;i<n;i++){
    var x=+( (xmax*(i+0.5)/n) + ri(-1,1)*0.35 ).toFixed(1);
    if(x<0.4) x=0.4; if(x>xmax-0.2) x=xmax-0.2;
    var y=Math.round(m*x+b + ri(-amp,amp));
    if(y<0) y=0; if(y>ymax) y=ymax;
    pts.push({x:x,y:y});
  }
  return pts;
}

/* ====================== A.4A · Correlation coefficient (r) ====================== */
var aMode='mix';
var A_CTX=[
  {x:'hours of study', y:'exam score',           xl:'study (hr)',  yl:'score' },
  {x:'daily temperature', y:'hot-cocoa sales',   xl:'temp (\u00b0F)', yl:'cups' },
  {x:'car age (years)', y:'resale value',        xl:'age (yr)',    yl:'value' },
  {x:'weekly practice hours', y:'free-throw %',  xl:'practice (hr)', yl:'FT %' },
  {x:'phone screen time', y:'hours of sleep',    xl:'screen (hr)', yl:'sleep' }
];

function genRandomScatter(){
  var m0=rc([-3,-2,-1,0,1,2,3]);
  var b0=ri(10,20), amp=ri(1,13), xmax=14, ymax=40;
  var xs=[], ys=[], used={}, i;
  for(i=0;i<8;i++){ var x=ri(2,14); while(used[x]) x=ri(2,14); used[x]=1; xs.push(x); }
  xs.sort(function(a,b){return a-b;});
  for(i=0;i<xs.length;i++){ var y=Math.round(m0*xs[i]+b0+ri(-amp,amp)); if(y<1)y=1; if(y>ymax)y=ymax; ys.push(y); }
  return {xs:xs, ys:ys, r:pearson(xs,ys), xmax:15, ymax:40};
}
/* generate data whose r sits safely INSIDE a requested strength band, with a chosen sign */
function genBandScatter(sign, band){
  var target = band==='strong'?[0.85,0.99] : band==='moderate'?[0.58,0.72] : [0.20,0.40];
  var ampRange = band==='strong'?[1,3] : band==='moderate'?[4,8] : [9,16];
  for(var tries=0; tries<600; tries++){
    var m0=sign*rc([2,3]);
    var b0=ri(10,20), amp=ri(ampRange[0],ampRange[1]);
    var xs=[], ys=[], used={}, i;
    for(i=0;i<8;i++){ var x=ri(2,14); while(used[x]) x=ri(2,14); used[x]=1; xs.push(x); }
    xs.sort(function(a,b){return a-b;});
    for(i=0;i<xs.length;i++){ var y=Math.round(m0*xs[i]+b0+ri(-amp,amp)); if(y<1)y=1; if(y>44)y=44; ys.push(y); }
    var r=pearson(xs,ys), a=Math.abs(r);
    if(a>=target[0] && a<=target[1] && Math.sign(r)===sign) return {xs:xs, ys:ys, r:r, xmax:15, ymax:44};
  }
  /* fallback: near-perfect line, guaranteed strong */
  var fx=[2,4,6,8,10,12,14], fy=fx.map(function(x){ return Math.max(1,Math.min(44, sign*2*x+15+ri(-1,1))); });
  return {xs:fx, ys:fy, r:pearson(fx,fy), xmax:15, ymax:44};
}

function genA(){
  var mode = aMode==='mix' ? rc(['match','describe','interpret']) : aMode;
  var ctx=rc(A_CTX);
  if(mode==='interpret'){
    var val=rc([0.95,0.88,0.82,0.62,0.55,0.48,0.30,0.24,0.35,0.05,-0.92,-0.85,-0.80,-0.60,-0.52,-0.28,-0.33,-0.06]);
    return {se:'A.4A', mode:'interpret', ctx:ctx, r:val,
      dir:directionOf(val), str:strengthOf(val)};
  }
  if(mode==='describe'){
    var sign=rc([1,-1]), band=rc(['strong','moderate','weak']);
    var d=genBandScatter(sign, band);
    return {se:'A.4A', mode:'describe', ctx:ctx, data:d, r:d.r,
      dir:directionOf(d.r), str:strengthOf(d.r)};
  }
  /* match: pick the r that best fits the scatter */
  var s=genRandomScatter();
  var rr=+s.r.toFixed(2);
  var pool=[0.95,0.85,0.72,0.55,0.40,0.20,0.05,-0.05,-0.20,-0.40,-0.55,-0.72,-0.85,-0.95];
  var opts=[rr];
  shuffle(pool);
  for(var i=0;i<pool.length && opts.length<4;i++){
    var v=pool[i], ok=true;
    for(var j=0;j<opts.length;j++){ if(Math.abs(v-opts[j])<0.22){ ok=false; break; } }
    if(ok) opts.push(v);
  }
  while(opts.length<4){ var f=+(rc([1,-1])*(ri(5,95)/100)).toFixed(2); var good=true;
    for(var k=0;k<opts.length;k++){ if(Math.abs(f-opts[k])<0.22){good=false;break;} } if(good) opts.push(f); }
  opts=shuffle(opts);
  var correctIdx=0, best=9;
  opts.forEach(function(v,idx){ var d2=Math.abs(v-s.r); if(d2<best){best=d2; correctIdx=idx;} });
  return {se:'A.4A', mode:'match', ctx:ctx, data:s, r:s.r, options:opts, correctIdx:correctIdx};
}

var bMode='mix';

var B_BANK=[
  {t:'assoc', s:'Across a summer, cities with higher ice-cream sales also record more drownings.',
    lurk:'Hot weather', lurks:['Hot weather','Eating ice cream','Swimming skill','Ice-cream brand'] },
  {t:'assoc', s:'Among elementary students, those with larger shoe sizes tend to read at higher levels.',
    lurk:'A child\u2019s age', lurks:['A child\u2019s age','Shoe brand','Foot shape','Book length'] },
  {t:'assoc', s:'Neighborhoods with more fire trucks at a blaze report more fire damage.',
    lurk:'The size of the fire', lurks:['The size of the fire','The truck color','Number of firefighters\u2019 breaks','Water pressure'] },
  {t:'assoc', s:'Months with higher sunglasses sales also have higher sunburn rates.',
    lurk:'Amount of sunshine', lurks:['Amount of sunshine','Sunglasses tint','Store discounts','Skin tone'] },
  {t:'assoc', s:'Students who sleep with the light on are more likely to need glasses later.',
    lurk:'Inherited (parent) eyesight', lurks:['Inherited (parent) eyesight','Light bulb wattage','Bedtime stories','Room size'] },
  {t:'cause', s:'In a controlled trial, plants given more fertilizer grew measurably taller than identical plants given none.',
    why:'Everything else was held constant, so the fertilizer is the direct cause.' },
  {t:'cause', s:'Pressing the gas pedal farther makes the car accelerate faster.',
    why:'The pedal directly controls the engine\u2019s power \u2014 a mechanical cause and effect.' },
  {t:'cause', s:'Raising the thermostat setting causes the room temperature to rise.',
    why:'The thermostat directly drives the heater, so it is a true causal link.' },
  {t:'cause', s:'The longer you leave a phone charging, the higher its battery percentage (until full).',

function genB(){
  var mode = bMode==='mix' ? rc(['classify','lurking']) : bMode;

var C_CTX=[
  {xShort:'hours studied', yShort:'exam score', xUnit:'hour of study', yUnit:'points',
   m:7, b:52, xmax:8, ymax:112, xstep:1, ystep:20, xl:'study (hr)', yl:'score'},
  {xShort:'weeks of growth', yShort:'plant height', xUnit:'week', yUnit:'cm',
   m:4, b:6, xmax:12, ymax:60, xstep:2, ystep:10, xl:'weeks', yl:'height'},
  {xShort:'weeks of saving', yShort:'money saved', xUnit:'week', yUnit:'dollars',
   m:15, b:20, xmax:12, ymax:220, xstep:2, ystep:40, xl:'weeks', yl:'$ saved'},
  {xShort:'age of the car', yShort:'resale value', xUnit:'year of age', yUnit:'thousand dollars',
   m:-2, b:24, xmax:10, ymax:26, xstep:2, ystep:5, xl:'age (yr)', yl:'$1000s'},

   m:-3, b:96, xmax:8, ymax:100, xstep:1, ystep:20, xl:'hours', yl:'\u00b0F'},
  {xShort:'minutes draining', yShort:'water in the tank', xUnit:'minute', yUnit:'gallons',
   m:-6, b:80, xmax:12, ymax:88, xstep:2, ystep:20, xl:'minutes', yl:'gallons'}
];
function genC(){
  var mode = cMode==='mix' ? rc(['predict','solve','slope','intercept']) : cMode;
  var ctx=rc(C_CTX);
  var pts=cloud(ctx.m, ctx.b, ctx.xmax, ctx.ymax, Math.max(2,Math.round(Math.abs(ctx.m)*0.7)), 7);
  if(mode==='predict'){
    var x0=ri(1, ctx.xmax-1);
    return {se:'A.4C', mode:'predict', ctx:ctx, pts:pts, x0:x0, ans:ctx.m*x0+ctx.b};
  }
  if(mode==='solve'){
    var xr=ri(1, ctx.xmax-1), y0=ctx.m*xr+ctx.b;   /* choose y so x comes out whole */
    return {se:'A.4C', mode:'solve', ctx:ctx, pts:pts, y0:y0, ans:xr};
  }
  if(mode==='slope'){
    var dir = ctx.m>0?'increase':'decrease';
    var correct='For each additional '+ctx.xUnit+', the '+ctx.yShort+' tends to '+dir+' by about '+Math.abs(ctx.m)+' '+ctx.yUnit+'.';
    var opts=[correct,
      'The '+ctx.yShort+' starts at about '+Math.abs(ctx.m)+' '+ctx.yUnit+'.',
      'For each additional '+ctx.xUnit+', the '+ctx.yShort+' tends to '+(dir==='increase'?'decrease':'increase')+' by about '+Math.abs(ctx.m)+' '+ctx.yUnit+'.',
      'There is no association between '+ctx.xShort+' and '+ctx.yShort+'.'];
    opts=shuffle(opts.slice());
    return {se:'A.4C', mode:'slope', ctx:ctx, pts:pts, options:opts, correctIdx:opts.indexOf(correct)};
  }
  /* intercept */
  var correctI='When '+ctx.xShort+' = 0, the model predicts a '+ctx.yShort+' of about '+ctx.b+' '+ctx.yUnit+'.';
  var optsI=[correctI,
    'When '+ctx.xShort+' = 0, the model predicts a '+ctx.yShort+' of about '+Math.abs(ctx.m)+' '+ctx.yUnit+'.',
    'The '+ctx.yShort+' changes by about '+ctx.b+' '+ctx.yUnit+' for each '+ctx.xUnit+'.',
    'The '+ctx.yShort+' is always '+ctx.b+' '+ctx.yUnit+', no matter the '+ctx.xShort+'.'];
  optsI=shuffle(optsI.slice());
  return {se:'A.4C', mode:'intercept', ctx:ctx, pts:pts, options:optsI, correctIdx:optsI.indexOf(correctI)};
}

  blurb:'Compare and contrast association and causation in real-world problems.',
  gen:genB, prompt:promptB, answerHTML:answerB, read:readB, check:checkB, reveal:revealB,
  init:function(p){ wireSeg('bSeg', bMode, function(v){ bMode=v; newProblem(); }); initB(p); },
  emptyMsg:'Tap the choice that best fits the situation.',
  hints:hintsB, steps:stepsB },

{ id:'A.4C', letter:'C', short:'Fit & Predict', title:'Line of Best Fit \u00b7 Predictions',
  blurb:'Write, with and without technology, linear functions that provide a reasonable fit to data to estimate solutions and make predictions for real-world problems.',
  gen:genC, prompt:promptC, answerHTML:answerC, read:readC, check:checkC, reveal:revealC,
  init:function(p){ wireSeg('cSeg', cMode, function(v){ cMode=v; newProblem(); }); initC(p); },
  emptyMsg:'Enter your prediction \u2014 or tap the interpretation that fits.',
  hints:hintsC, steps:stepsC }
];

/* =============== app wiring (mirrors A.2 / A.3) =============== */
var current={se:SES[0], p:null, done:false, recorded:false, hintIdx:0, hintLogged:false};
var session={a:0,c:0};
var $=function(s){return document.querySelector(s);};

function stoneStats(id){
  return (window.Portal && Portal.skill) ? Portal.skill(id) : {progress:0, attempts:0, mastered:false};
}
function renderRail(){
  var host=$('#stones'); host.innerHTML='';
  SES.forEach(function(se){
    var st=stoneStats(se.id);
    var cls='stone'+(se===current.se?' active':'')+(st.mastered?' mastered':st.attempts?' started':'');
    var b=document.createElement('button');
    b.type='button'; b.className=cls;
    b.innerHTML='<span class="dot">'+(st.mastered?'\u2713':se.letter)+'</span>'+
      '<span><span class="nm">'+se.id+' \u00b7 '+se.short+'</span>'+
      '<span class="mini"><i style="width:'+Math.round(st.progress*100)+'%"></i></span></span>';
    b.addEventListener('click', function(){ current.se=se; newProblem(); });
    host.appendChild(b);
  });
}
function newProblem(){
  var se=current.se;
  current.p=se.gen(); current.done=false; current.recorded=false; current.hintIdx=0; current.hintLogged=false;
  $('#seTitle').textContent=se.title;
  $('#seBlurb').textContent=se.blurb;
  $('#seTag').textContent='TEKS '+se.id;
  $('#prompt').innerHTML=se.prompt(current.p);
  $('#answerArea').innerHTML=se.answerHTML(current.p);
  $('#fb').textContent=''; $('#fb').className='fb';
  $('#hintBox').className='note'; $('#hintBox').innerHTML='';
  $('#stepsBox').className='stepsBox'; $('#stepsBox').innerHTML='';
  $('#checkBtn').disabled=false;
  if(se.init) se.init(current.p);
  renderRail();
  var first=$('#answerArea input'); if(first) first.focus();
}
function onCheck(){
  if(current.done) return;
  var se=current.se, ans=se.read(current.p);
  if(!ans){
    $('#fb').className='fb bad';
    $('#fb').textContent=se.emptyMsg||'Fill in every box first.';
    return;
  }
  var ok=se.check(current.p, ans);
  current.done=true;
  $('#checkBtn').disabled=true;
  if(se.reveal) se.reveal(current.p);
  if(!current.recorded){
    current.recorded=true;
    session.a++; if(ok) session.c++;
    $('#sesScore').textContent=session.c+' / '+session.a;
    if(window.Portal && Portal.record) Portal.record(se.id, ok);
  }
  $('#fb').className='fb '+(ok?'ok':'bad');
  $('#fb').textContent= ok?'Correct \u2713' : 'Not quite \u2717 \u2014 open the steps to see the path.';
  renderRail();
}
function onHint(){
  var hints=current.se.hints(current.p);
  var h=hints[Math.min(current.hintIdx, hints.length-1)];
  current.hintIdx++;
  var box=$('#hintBox'); box.classList.add('show');
  box.innerHTML += (box.innerHTML?'<br>':'')+'\u2022 '+h;
  if(!current.hintLogged && window.Portal && Portal.hint){ Portal.hint(current.se.id); current.hintLogged=true; }
}
function onSteps(){
  var box=$('#stepsBox'); box.classList.add('show');
  box.innerHTML=current.se.steps(current.p);
  if(!current.hintLogged && window.Portal && Portal.hint){ Portal.hint(current.se.id); current.hintLogged=true; }
}
$('#checkBtn').addEventListener('click', onCheck);
$('#hintBtn').addEventListener('click', onHint);
$('#stepsBtn').addEventListener('click', onSteps);
$('#nextBtn').addEventListener('click', newProblem);
window.addEventListener('keydown', function(e){
  var tag=(e.target.tagName||'').toLowerCase();
  if(e.key==='Enter' && tag!=='select'){ e.preventDefault(); onCheck(); }
  if((e.key==='n'||e.key==='N') && tag!=='input' && tag!=='select'){ newProblem(); }
});

/* deep link: teks-a4.html?se=A.4B */
var want=new URLSearchParams(location.search).get('se');
if(want){ var f=SES.filter(function(s){return s.id.toLowerCase()===want.toLowerCase();})[0]; if(f) current.se=f; }
newProblem();
})();
</script>
</body>
</html>
