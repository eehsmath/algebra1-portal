<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>A.6 Studio — Writing &amp; Representing Quadratics</title>
<style>
  :root{
    --bg:#eef3ff; --panel:#fff; --ui:#dfe6ff; --ink:#0f2340; --muted:#5b6f96;
    --blue:#2f6cff; --teal:#36c2a0; --gold:#f4c431; --danger:#e5484d; --vio:#8e78ff;
    --accent:#8e78ff; --shadow:0 8px 20px rgba(25,40,80,.06);   /* A.6 = quadratic section */
  }
  *{box-sizing:border-box}
  html,body{min-height:100dvh}
  body{margin:0; background:var(--bg); color:var(--ink); overflow:auto;
    font-family:ui-rounded, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif}
  .wrap{width:min(1240px,100%); margin:14px auto; padding:0 12px}
  .hdr{background:var(--panel); border:1px solid var(--ui); border-radius:16px; box-shadow:var(--shadow);
    padding:12px 16px; margin-bottom:12px; display:flex; align-items:center; gap:12px; flex-wrap:wrap}
  .back{font-weight:900; text-decoration:none; color:var(--blue); font-size:14px; padding:8px 12px;
    border:1px solid var(--ui); border-radius:10px; background:#fff}
  .hdr h1{margin:0; font-size:clamp(17px,2.6vw,22px); font-weight:900; flex:1; min-width:200px}
  .hdr .eyebrow{display:block; font-size:11px; letter-spacing:.8px; color:var(--muted); text-transform:uppercase; font-weight:900}
  .pill{display:inline-block; padding:6px 12px; border-radius:999px; border:1px solid var(--ui);
    background:#fff; font-weight:900; font-size:13px}
  .pill b{color:var(--vio)}
  .cols{display:grid; grid-template-columns:250px 1fr; gap:12px; align-items:start}
  @media (max-width:900px){ .cols{grid-template-columns:1fr} }
  .rail{background:var(--panel); border:1px solid var(--ui); border-radius:16px; box-shadow:var(--shadow); padding:10px}
  .rail .rh{font-size:11px; letter-spacing:.8px; color:var(--muted); text-transform:uppercase; font-weight:900; padding:4px 8px 8px}
  .stones{display:flex; flex-direction:column; position:relative}
  .stones::before{content:""; position:absolute; left:24px; top:18px; bottom:18px; border-left:3px dotted #d5deff}
  .stone{display:flex; align-items:center; gap:10px; padding:6px 8px; border:0; background:none;
    border-radius:12px; cursor:pointer; text-align:left; font-family:inherit; color:var(--ink); width:100%}
  .stone:hover{background:#f5f8ff}
  .stone.active{background:#f2eeff; outline:2px solid #d3c9ff}
  .stone .dot{width:34px; height:34px; flex:none; border-radius:50%; border:3px solid #d5deff; background:#fff;
    z-index:1; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:13px; color:var(--muted)}
  .stone.started .dot{border-color:var(--accent); color:var(--ink)}
  .stone.mastered .dot{background:var(--accent); border-color:var(--accent); color:#fff}
  .stone .nm{font-weight:900; font-size:13px; line-height:1.2}
  .stone .mini{height:5px; border-radius:999px; background:#edf2ff; margin-top:4px; overflow:hidden; width:110px}
  .stone .mini i{display:block; height:100%; background:var(--accent); border-radius:999px}
  @media (max-width:900px){
    .rail{position:sticky; top:8px; z-index:5}
    .stones{flex-direction:row; overflow-x:auto; gap:6px; padding-bottom:4px}
    .stones::before{display:none}
    .stone{flex:none; flex-direction:column; gap:4px; padding:6px; width:auto; min-width:74px}
    .stone .mini{width:56px}
    .stone .nm{font-size:11px; text-align:center; max-width:90px}
  }
  .main{background:var(--panel); border:1px solid var(--ui); border-radius:16px; box-shadow:var(--shadow); padding:16px}
  .seHead{display:flex; justify-content:space-between; gap:10px; align-items:flex-start; flex-wrap:wrap;
    border-bottom:1px dashed #e5e7eb; padding-bottom:10px; margin-bottom:12px}
  .seHead h2{margin:0; font-size:19px; font-weight:900}
  .seHead .blurb{color:var(--muted); font-weight:700; font-size:13px; margin-top:3px; max-width:640px}
  .seTag{font-size:12px; font-weight:900; color:#4a2fae; background:#f4f1ff; border:1px solid var(--ui);
    border-radius:999px; padding:6px 14px; white-space:nowrap}
  .prompt{font-size:clamp(17px,2.4vw,21px); font-weight:800; line-height:1.55; margin:6px 0 14px}
  .prompt .given{background:#f7f5ff; border:1px solid #e7e2ff; border-radius:12px; padding:8px 12px;
    display:inline-block; margin-top:4px; font-size:clamp(18px,2.6vw,23px)}
  .vfrac{display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle;
    font-size:.72em; line-height:1.05; font-weight:900; margin:0 2px}
  .vfrac span:first-child{border-bottom:2.5px solid currentColor; padding:0 4px}
  .vfrac span:last-child{padding:0 4px}
  sup{font-size:.7em}
  table.ttab{border-collapse:collapse; margin-top:8px; font-size:clamp(16px,2.4vw,20px)}
  .ttab th,.ttab td{border:2px solid #d9e2ff; padding:6px 16px; text-align:center; font-weight:900; min-width:54px}
  .ttab th{background:#f1f6ff; color:#133a9a}
  .answer{display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:clamp(20px,3.4vw,28px); font-weight:900; margin:10px 0 6px}
  .answer .lbl{font-size:15px; color:var(--muted); width:100%; font-weight:900}
  .in{height:56px; width:96px; border:2px solid var(--ui); border-radius:12px; text-align:center;
    font-weight:900; font-size:22px; font-family:inherit; color:var(--ink)}
  .in.wide{width:120px}
  .in:focus-visible, .sel:focus-visible, button:focus-visible{outline:3px solid #59c6ff; outline-offset:2px}
  .sel{height:56px; border:2px solid var(--ui); border-radius:12px; font-weight:900; font-size:20px;
    font-family:inherit; color:var(--ink); background:#fff; padding:0 8px}
  .sysRow{display:flex; align-items:center; gap:8px; margin:6px 0}
  .radio{display:flex; gap:16px; flex-wrap:wrap; font-size:16px; margin-top:6px}
  .radio label{display:flex; align-items:center; gap:6px; font-weight:800; cursor:pointer}
  .radio input{accent-color:var(--vio); width:18px; height:18px}
  .mc{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px}
  @media (max-width:720px){ .mc{grid-template-columns:1fr} }
  .mc button{border:2px solid var(--ui); background:#fff; border-radius:14px; padding:12px 14px;
    font-family:inherit; font-weight:800; font-size:15.5px; text-align:left; cursor:pointer; color:var(--ink); line-height:1.5}
  .mc button.sel{border-color:var(--vio); background:#f4f1ff}
  .mc button:disabled{cursor:default; opacity:.85}
  .mc button.right{border-color:#7de0a6; background:#eafff2}
  .mc button.wrong{border-color:#ffb3b3; background:#fff3f3}
  .btnRow{display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; align-items:center}
  .btn{height:46px; border-radius:12px; border:1px solid var(--ui); background:#fff; font-weight:900;
    padding:0 16px; cursor:pointer; font-family:inherit; font-size:15px; color:var(--ink)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.55; cursor:not-allowed}
  .btn.check{border:0; background:linear-gradient(90deg,var(--vio),var(--blue)); color:#fff; min-width:110px}
  .btn.hint{border:0; background:linear-gradient(90deg,#ffe6a8,#ffcf70); color:#081635}
  .btn.steps{border:0; background:linear-gradient(90deg,#e3dcff,#c3b6ff); color:#081635}
  .btn.next{background:#f7f5ff}
  .fb{font-weight:900; font-size:17px; min-height:26px; margin-top:8px}
  .fb.ok{color:#0b6b2f} .fb.bad{color:#a33232}
  .note{background:#fff9d6; border:1px solid #ffe38a; color:#7a5a00; border-radius:12px; padding:10px 14px;
    font-weight:800; font-size:14.5px; margin-top:10px; display:none; line-height:1.55}
  .note.show{display:block}
  .stepsBox{background:#f7f5ff; border:1px solid #e7e2ff; border-radius:12px; padding:12px 16px;
    font-weight:800; font-size:15.5px; margin-top:10px; display:none; line-height:1.8}
  .stepsBox.show{display:block}
  .stepsBox .st{display:block; margin:2px 0}
  .stepsBox .final{color:#4a2fae}
  .kbdnote{color:var(--muted); font-size:12px; font-weight:800; margin-top:10px}
  .drSeg{display:inline-flex; border:1px solid var(--ui); border-radius:12px; overflow:hidden; flex-wrap:wrap}
  .drSeg button{background:#fff; border:none; padding:7px 10px; font-size:12.5px; font-weight:800;
    cursor:pointer; font-family:inherit; color:var(--ink)}
  .drSeg button.active{background:#f4f1ff; color:#4a2fae}
  .grid{max-width:100%;height:auto;border:1px solid #e7edff;border-radius:12px;background:#fff;margin-top:10px}

  /* ---------- A.6A · Domain & Range Lab (ported from A.2A / domain-range.html; quadratic generators) ---------- */
  .drWrap{display:grid; grid-template-columns:minmax(280px,480px) 1fr; gap:14px; align-items:start}
  @media (max-width:860px){ .drWrap{grid-template-columns:1fr} }
  .drCanvasBox{position:relative; max-width:480px}
  #drCanvas{width:100%; aspect-ratio:1; display:block; border-radius:12px; border:1px solid #e7edff;
    background:#fff; touch-action:none}
  .drSide{display:flex; flex-direction:column; gap:10px; min-width:0}
  .drCtl{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .drField{position:relative}
  .drVerbal{font-size:15px; font-weight:800; color:var(--muted); min-height:20px; margin:2px 2px 6px; line-height:1.3}
  .drVerbal.ready{color:#4a2fae}
  .drStatus{display:flex; align-items:center; gap:8px; margin:0 0 6px; min-height:24px; flex-wrap:wrap}
  .drChipSlot{margin-left:auto; display:flex; gap:8px; flex-wrap:wrap}
  .drChip{padding:8px 13px; border-radius:999px; font-weight:900; font-size:14px; border:1px solid var(--ui);
    background:#fff; box-shadow:0 6px 16px rgba(0,0,0,.06)}
  .drChip.ok{color:#0b6b2f; background:#eafff2; border-color:#bfeacc}
  .drChip.bad{color:#a33232; background:#fff3f3; border-color:#ffd4d4}
  .drIO{display:flex; align-items:center; gap:6px}
  .drInWrap{position:relative; flex:1; min-width:0}
  .drBig{width:100%; min-height:52px; padding:10px 12px 10px 54px; border:2px solid var(--ui); border-radius:12px;
    background:#fff; font-size:clamp(18px,2.6vw,24px); font-weight:800; font-family:inherit; color:var(--ink);
    letter-spacing:.4px; word-spacing:.6ch; font-variant-numeric:tabular-nums lining-nums; outline:none}
  .drBig::placeholder{color:#9aa9c9}
  .drBig:focus{border-color:#c3b6ff; box-shadow:0 0 0 3px rgba(142,120,255,.22)}
  .drKbdBtn{position:absolute; left:6px; top:50%; transform:translateY(-50%); width:36px; height:36px;
    border:1px solid var(--ui); border-radius:10px; background:#fff; display:grid; place-items:center; cursor:pointer; z-index:5}
  .drKbdBtn svg{width:18px; height:18px}
  .drBandBtn{width:52px; height:52px; flex:none; border:1px solid var(--ui); border-radius:12px; background:#fff;
    display:grid; place-items:center; cursor:pointer; font-size:26px; line-height:1; transition:.15s all}
  .drBandBtn.active{background:#f4f1ff; border-color:#c3b6ff; box-shadow:0 0 0 3px rgba(142,120,255,.22) inset}
  .drBandBtn:disabled{opacity:.35; cursor:default}
  .drKbdPop{display:none; position:fixed; z-index:1500; background:#fff; border:1px solid var(--ui);
    border-radius:12px; box-shadow:0 12px 28px rgba(0,0,0,.12); padding:10px}
  .drKbdGrid{display:grid; grid-template-columns:repeat(10,minmax(0,1fr)); gap:7px}
  .drKey{padding:7px 2px; text-align:center; border:1px solid var(--ui); border-radius:10px; background:#fff;
    font-weight:900; cursor:pointer; user-select:none; font-family:inherit; font-size:13px}
  .drKey.wide{grid-column:1 / -1; margin-top:2px; padding:8px 2px; font-size:15px; background:#f7f5ff}
  .drCoach{display:none; border:1px solid #ffd4d4; background:#fff7f7; color:#7b3232; padding:10px;
    border-radius:12px; font-weight:700; font-size:13.5px; line-height:1.35}
  .drCoach h4{margin:0 0 6px; font-size:12px; letter-spacing:.3px}
  .drCoach ul{margin:0; padding-left:18px}
  .drCoach li{margin:3px 0}
  .drCoach li.dom{color:#0e3d98; border-left:4px solid #2f6cff; padding-left:8px}
  .drCoach li.rng{color:#0c6d54; border-left:4px solid #36c2a0; padding-left:8px}
  .drAnsChip{display:inline-block; margin:2px 8px 2px 0; padding:8px 12px; border-radius:999px;
    background:#fff7cc; border:1px solid #ffe28a; color:#7a5a00; font-weight:900; font-size:14.5px}
  .miniKbdBtn{display:inline-flex; align-items:center; gap:7px; height:40px; padding:0 14px; border:1px solid var(--ui);
    border-radius:12px; background:#fff; font-weight:900; font-size:13.5px; color:var(--ink); cursor:pointer;
    font-family:inherit; margin-top:10px}
  .miniKbdBtn svg{width:17px; height:17px}
  .miniKbdBtn.active{background:#f4f1ff; border-color:#c3b6ff}
</style>
</head>

  <div class="hdr">

  </div>

          <h2 id="seTitle"></h2>

      </div>
      <div class="prompt" id="prompt"></div>
      <div id="answerArea"></div>
      <div class="btnRow">
        <button class="btn check" id="checkBtn">Check</button>
        <button class="btn hint" id="hintBtn">Hint</button>
        <button class="btn steps" id="stepsBtn">Show steps</button>
        <button class="btn next" id="nextBtn">New problem</button>

    </div>

</div>

<!-- CSV-driven coach messages for the A.6A Domain & Range Lab (ported from A.2A / domain-range.html,
     plus one added row for the parabola-segment vertex-inside-range edge case). No mode column —
     A.6A doesn't have a training/testing split; dragging a handle in still logs as a hint use
     instead (see logHintUse() in the controller). Inequality notation only — no interval mentions. -->
<script id="coachMessages" type="text/csv">
tip_id,priority,category,applies_to,condition,message
numbers_segment,1,numbers,both,segment_two_numbers,Numbers: Check the endpoint values.
numbers_one_sided,1,numbers,both,ray_or_full_one_number,Number: Check the boundary point values. (the starting point of the function)
numbers_parabola_segment_range,1,numbers,range,parabola_segment_vertex_inside,Numbers: Check the max/min value — the vertex may be the actual endpoint.
direction_domain,2,direction,domain,inequality_direction_mismatch,Direction: Shade to the {{left_or_right}}. Use ≥/≤ for that direction. (Tap the band line to change)
direction_range,2,direction,range,inequality_direction_mismatch,Direction: Shade {{up_or_down}}. Use ≥/≤ for that direction. (Tap the band line to change)
endpoint_included,3,endpoints,both,endpoint_should_be_included,Endpoints: The endpoint at {{var}} = {{a}} is included — use ≤ or ≥.
endpoint_excluded,3,endpoints,both,endpoint_should_be_excluded,Endpoints: The endpoint at {{var}} = {{a}} is not included — use < or >.
form_one_sided,4,form,both,answer_is_one_sided,Form: This one is one-sided (ray). Use a single inequality like {{var}} ≥ a or {{var}} ≤ a.
form_two_sided,4,form,both,answer_is_two_sided,Form: This one is two-sided (segment). Use two bounds like a ≤ {{var}} ≤ b.
form_all_reals_true,4,form,both,answer_is_all_reals,Form: Here it’s all real numbers (no endpoints to find).
unbounded_domain,5,unbounded,domain,extends_left_or_right_infinite,Unbounded: The graph extends left/right without bound.
unbounded_range,5,unbounded,range,extends_up_or_down_infinite,Unbounded: The graph extends up/down without bound.
variable_mismatch_domain,6,variable,domain,used_y_instead_of_x,Variable: Use x for Domain.
variable_mismatch_range,6,variable,range,used_x_instead_of_y,Variable: Use y for Range.
order_bounds,6,order,both,bounds_reversed,Order: Put the smaller number first: a ≤ {{var}} ≤ b.
unreadable,6,readability,both,parse_failed,"I can’t read that yet. Try x ≤ 3 or −2 ≤ x ≤ 5."
</script>
<script src="../portal.js"></script>
<script>
(function(){
'use strict';

/* =====================================================================
   PURE MATH LIBRARY (from Build Guide, Section 3)
   ===================================================================== */
function ri(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function rc(arr){ return arr[ri(0,arr.length-1)]; }
function rnz(a,b){ var x=0; while(x===0) x=ri(a,b); return x; }
function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=ri(0,i); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ var t=a%b; a=b; b=t; } return a||1; }
function R(n,d){ d=(d===undefined)?1:d; if(d<0){n=-n;d=-d;} var g=gcd(n,d); return {n:n/g, d:d/g}; }
function radd(a,b){ return R(a.n*b.d + b.n*a.d, a.d*b.d); }
function rsub(a,b){ return R(a.n*b.d - b.n*a.d, a.d*b.d); }
function rmul(a,b){ return R(a.n*b.n, a.d*b.d); }
function rdiv(a,b){ return R(a.n*b.d, a.d*b.n); }
function rneg(a){ return R(-a.n, a.d); }
function req(a,b){ return a.n*b.d === b.n*a.d; }
function rzero(a){ return a.n===0; }
function rint(x){ return R(x,1); }

function parseRat(s){
  if(s===null || s===undefined) return null;
  s = String(s).trim().replace(/\u2212/g,'-').replace(/\s+/g,'');
  if(!s || !/\d/.test(s)) return null;
  var m = s.match(/^(-?\d+)\/(-?\d+)$/);
  if(m){ var d=parseInt(m[2],10); if(!d) return null; return R(parseInt(m[1],10), d); }
  if(/^-?\d+$/.test(s)) return R(parseInt(s,10),1);
  m = s.match(/^(-)?(\d*)\.(\d+)$/);
  if(m){ var neg=!!m[1], ip=m[2]||'0', fp=m[3];
    var den=Math.pow(10,fp.length), num=parseInt(ip,10)*den + parseInt(fp,10);
    return R(neg?-num:num, den); }
  return null;
}

var MIN='\u2212';
function fmtInt(x){ return x<0 ? MIN+Math.abs(x) : String(x); }
function ratHTML(r){
  if(r.d===1) return fmtInt(r.n);
  var s = r.n<0 ? MIN : '';
  return s+'<span class="vfrac"><span>'+Math.abs(r.n)+'</span><span>'+r.d+'</span></span>';
}
function ratText(r){ return r.d===1 ? String(r.n) : r.n+'/'+r.d; }
/* signed term helper for step text: returns " + 5" or " \u2212 3" */
function sgn(x){ return x<0 ? ' '+MIN+' '+Math.abs(x) : ' + '+x; }

/* =====================================================================
   UI HELPERS (from Build Guide, Section 4)
   ===================================================================== */
function inBox(id, wide){ return '<input class="in'+(wide?' wide':'')+'" id="'+id+'" inputmode="text" autocomplete="off" />'; }
function seg(id,cur,opts){
  var h='<div class="drSeg" id="'+id+'" role="tablist">';
  opts.forEach(function(o){ h+='<button type="button" data-v="'+o[0]+'">'+o[1]+'</button>'; });
  return h+'</div>';
}
function segWrap(label,id,cur,opts){
  return '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">'+
    '<span style="font-size:12px;font-weight:900;letter-spacing:.4px;color:var(--muted)">'+label+'</span>'+
    seg(id,cur,opts)+'</div>';
}
function wireSeg(id,cur,cb){
  var box=document.getElementById(id); if(!box) return;
  Array.prototype.forEach.call(box.querySelectorAll('button'),function(btn){
    if(btn.getAttribute('data-v')===cur) btn.classList.add('active');
    btn.addEventListener('click',function(){
      Array.prototype.forEach.call(box.querySelectorAll('button'),function(b){b.classList.remove('active');});
      btn.classList.add('active'); cb(btn.getAttribute('data-v'));
    });
  });
}

/* =====================================================================
   A.6A LAB ENGINE — ported from A.2A's Domain & Range Lab (teks-a2.html),
   which was itself ported from the standalone domain-range.html. Same
   canvas / draggable-band / CSV-coach machinery as A.2A, unchanged where
   it isn't shape-specific. What's swapped in: the generator, the
   domain/range interval math, and drawGraph's per-type branches — all
   taken from domain-range.html's genQuadratic()/graphDomain()/
   graphRange()/drawGraph() quad-* cases (that legacy app already had
   parabola support; A.2A's port never carried it over because A.2 only
   needed lines). Zig-zag is deliberately NOT offered here — it's a
   piecewise-*linear* shape and doesn't belong in a quadratics section;
   see the tweaking-guide addendum for this call.
   ===================================================================== */
var LAB={ level:'mix' };
var CFG={ xmin:-10, xmax:10, ymin:-10, ymax:10, tick:1, grid:true };
var EPS=1e-6, handleRadiusPx=8, hitRadiusPx=26, tapThreshold=6, lineHitPx=16;

var canvas=null, c=null, curG=null, reveal=false, gridYLabelX=null, labRO=null;
var domainBand={mode:'double', visible:false, lo:-2, hi:3, loInc:true, hiInc:true, value:0, dir:1, inc:true};
var rangeBand ={mode:'double', visible:false, lo:-1, hi:4, loInc:true, hiInc:true, value:0, dir:1, inc:true};
var tool='idle', dragStart={x:0,y:0}, activeDrag={which:null, moved:false};

function roundT(v){ return Math.round(v/CFG.tick)*CFG.tick; }
function clampN(v,a,b){ return Math.max(a,Math.min(b,v)); }
function ux(x){ return (x-CFG.xmin)/(CFG.xmax-CFG.xmin)*canvas.clientWidth; }
function uy(y){ var H=canvas.clientHeight; return H-(y-CFG.ymin)/(CFG.ymax-CFG.ymin)*H; }
function wx(px){ return CFG.xmin + px/canvas.clientWidth*(CFG.xmax-CFG.xmin); }
function wy(py){ var H=canvas.clientHeight; return CFG.ymin + (H-py)/H*(CFG.ymax-CFG.ymin); }

/* ---------- generator (answerable, integers) — ported from domain-range.html's genQuadratic() ---------- */
function genQuad(level){
  var a=rc([-2,-1,1,2]), h=ri(-4,4), k=ri(-2,3);
  if(level==='full') return {type:'quad-full', a:a, h:h, k:k};
  function dMax(){
    return a>0 ? Math.floor(Math.sqrt(Math.max(0,(CFG.ymax-2-k)/a)))
               : Math.floor(Math.sqrt(Math.max(0,(k-(CFG.ymin+2))/(-a))));
  }
  var dmax=Math.max(2,Math.min(6,dMax())); if(dmax%2===1) dmax--;
  if(dmax<2){ a=a>0?1:-1; dmax=2; }
  var opts=[2,4,6].filter(function(v){ return v<=dmax; });
  var d=rc(opts), L=h-d, R=h+d;
  if(level==='segment'){
    var pats=[{cL:true,cR:false},{cL:false,cR:true},{cL:true,cR:true},{cL:false,cR:false}];
    var pk=Math.random(), idx=(pk<0.30)?0:(pk<0.60)?1:(pk<0.80)?2:3;
    return {type:'quad-seg', a:a, h:h, k:k, L:L, R:R, cL:pats[idx].cL, cR:pats[idx].cR};
  }
  var right=Math.random()<0.5, closed=Math.random()<0.5;
  return {type:'quad-ray', a:a, h:h, k:k, right:right, closed:closed};
}
function answerable(g){
  function inside(x,y){ return x>CFG.xmin+0.8 && x<CFG.xmax-0.8 && y>CFG.ymin+0.8 && y<CFG.ymax-0.8; }
  switch(g.type){
    case 'quad-full': return inside(g.h,g.k);
    case 'quad-seg' : return inside(g.L, g.a*(g.L-g.h)*(g.L-g.h)+g.k) && inside(g.R, g.a*(g.R-g.h)*(g.R-g.h)+g.k);
    case 'quad-ray' : return inside(g.h,g.k);
    default: return false;
  }
}
function newLabGraph(){
  var lvl=LAB.level;
  var kind=(lvl==='mix')? rc(['segment','ray','full']) : lvl;
  var g=null, tries=0;
  do{ g=genQuad(kind); tries++; } while(!answerable(g)&&tries<60);
  if(!answerable(g)) g={type:'quad-seg', a:1, h:0, k:-2, L:-4, R:4, cL:true, cR:false};
  g.domainAnswer=graphDomainOf(g);
  g.rangeAnswer=graphRangeOf(g);
  return g;
}

/* ---------- intervals (identical to A.2A's I helper, minus the interval-
   notation branch — this app only practices inequality notation now) ---------- */
var I={
  all:function(){ return {lo:-Infinity, hi:Infinity, loInc:true, hiInc:true}; },
  withEnds:function(lo,hi,loInc,hiInc){ if(hi<lo){ var t=lo;lo=hi;hi=t; var s=loInc;loInc=hiInc;hiInc=s; } return {lo:lo,hi:hi,loInc:loInc,hiInc:hiInc}; },
  half:function(a,aInc,b,bInc){ return {lo:a, hi:b, loInc:aInc, hiInc:bInc}; },
  eq:function(a,b){ return Math.abs(a-b)<1e-6; },
  same:function(A,B){
    var loInf=(A.lo===-Infinity&&B.lo===-Infinity), hiInf=(A.hi===Infinity&&B.hi===Infinity);
    return (loInf||this.eq(A.lo,B.lo)) && (hiInf||this.eq(A.hi,B.hi)) &&
           (loInf|| !!A.loInc===!!B.loInc) && (hiInf|| !!A.hiInc===!!B.hiInc);
  },
  fmt:function(A,axis){
    function n(v){ return v===Infinity?'\u221e':(v===-Infinity?'\u2212\u221e':roundT(v)); }
    var varCh=(axis==='x'?'x':'y'), out='';
    if(A.lo===-Infinity&&A.hi===Infinity) out='all real numbers';
    else if(A.lo===-Infinity) out=varCh+' '+(A.hiInc?'\u2264':'<')+' '+n(A.hi);
    else if(A.hi===Infinity)  out=varCh+' '+(A.loInc?'\u2265':'>')+' '+n(A.lo);
    else out=n(A.lo)+' '+(A.loInc?'\u2264':'<')+' '+varCh+' '+(A.hiInc?'\u2264':'<')+' '+n(A.hi);
    return out;
  }
};


/* ---------- correct answers — ported from domain-range.html's graphDomain()/graphRange() (quad cases only) ---------- */
function graphDomainOf(g){
  switch(g.type){
    case 'quad-full': return I.all();
    case 'quad-seg' : return I.withEnds(Math.min(g.L,g.R), Math.max(g.L,g.R), !!g.cL, !!g.cR);
    case 'quad-ray' : return g.right? I.half(g.h,!!g.closed,Infinity,true) : I.half(-Infinity,true,g.h,!!g.closed);
  }
}
function graphRangeOf(g){
  switch(g.type){
    case 'quad-full': return (g.a>0)? I.half(g.k,true,Infinity,true) : I.half(-Infinity,true,g.k,true);
    case 'quad-seg': {
      var yL=g.a*(g.L-g.h)*(g.L-g.h)+g.k, yR=g.a*(g.R-g.h)*(g.R-g.h)+g.k;
      var lo=Math.min(yL,yR), hi=Math.max(yL,yR), loInc, hiInc;
      if(yL<yR){ loInc=!!g.cL; hiInc=!!g.cR; }
      else if(yR<yL){ loInc=!!g.cR; hiInc=!!g.cL; }
      else { loInc=hiInc=!!(g.cL||g.cR); }
      /* the vertex sits strictly between L and R: it's a hidden third point
         that can quietly become the true min/max, overriding whichever
         endpoint the naive yL/yR comparison above picked */
      if(g.L<g.h && g.h<g.R){
        var yV=g.k;
        if(g.a>0){ if(Math.abs(yV-lo)<1e-6) loInc=true; else if(yV<lo-1e-6){ lo=yV; loInc=true; } }
        else { if(Math.abs(yV-hi)<1e-6) hiInc=true; else if(yV>hi+1e-6){ hi=yV; hiInc=true; } }
      }
      return I.withEnds(lo,hi,loInc,hiInc);
    }
    case 'quad-ray': return (g.a>0)? I.half(g.k,!!g.closed,Infinity,true) : I.half(-Infinity,true,g.k,!!g.closed);
  }
}
function explainWhy(g){
  switch(g.type){
    case 'quad-full': return 'A full parabola has vertex ('+fmtInt(g.h)+', '+fmtInt(g.k)+'). It stretches left and right forever, so Domain is all real numbers; it only opens '+(g.a>0?'up':'down')+' from the vertex, so Range is y '+(g.a>0?'\u2265':'\u2264')+' '+fmtInt(g.k)+'.';
    case 'quad-seg' : return 'For a parabola segment, Domain runs from the left x-end to the right x-end. Range runs between the y-values at those ends \u2014 unless the vertex sits between them, in which case the vertex itself is the actual min or max.';
    case 'quad-ray' : return 'This parabola ray starts at the vertex ('+fmtInt(g.h)+', '+fmtInt(g.k)+') and runs '+(g.right?'right':'left')+' forever; Range is y '+(g.a>0?'\u2265':'\u2264')+' '+fmtInt(g.k)+', same as the vertex.';
  }
}

/* ---------- band shapes (quad-full still needs a range band, even with no domain band \u2014
   the parabola's domain is always all reals, but its range is a one-sided ray) ---------- */
function applyBandShape(){
  if(!curG) return;
  if(curG.type==='quad-full'){ domainBand.mode='none'; rangeBand.mode='single'; }
  else if(curG.type==='quad-ray'){ domainBand.mode='single'; rangeBand.mode='single'; }
  else { domainBand.mode='double'; rangeBand.mode='double'; } /* quad-seg */
}
function bandDefaults(){
  if(domainBand.mode==='double'){ domainBand.lo=-2; domainBand.hi=3; domainBand.loInc=true; domainBand.hiInc=true; }
  if(domainBand.mode==='single'){ domainBand.value=0; domainBand.dir=1; domainBand.inc=true; }
  if(rangeBand.mode==='double'){ rangeBand.lo=-1; rangeBand.hi=4; rangeBand.loInc=true; rangeBand.hiInc=true; }
  if(rangeBand.mode==='single'){ rangeBand.value=0; rangeBand.dir=1; rangeBand.inc=true; }
  domainBand.visible=false; rangeBand.visible=false;
}
function bandToInterval(b){
  if(b.mode==='double'){ return I.withEnds(Math.min(b.lo,b.hi), Math.max(b.lo,b.hi), b.lo<=b.hi?b.loInc:b.hiInc, b.lo<=b.hi?b.hiInc:b.loInc); }
  if(b.mode==='single'){ return (b.dir>0)? I.half(b.value,b.inc,Infinity,true) : I.half(-Infinity,true,b.value,b.inc); }
  return I.all();
}
function syncInputsFromBands(){
  var d=document.getElementById('drDom'), r=document.getElementById('drRng');
  if(!d||!r) return;
  if(domainBand.visible){ d.value=I.fmt(bandToInterval(domainBand),'x'); d.dispatchEvent(new Event('input',{bubbles:true})); }
  if(rangeBand.visible){  r.value=I.fmt(bandToInterval(rangeBand ),'y'); r.dispatchEvent(new Event('input',{bubbles:true})); }
}

/* ---------- plain-language translation of whatever the student typed (ported from A.2A) ---------- */
function verbalize(A,axis){
  if(!A) return null;
  var v=axis;
  if(A.lo===-Infinity&&A.hi===Infinity) return v+' can be any real number.';
  if(A.hi===Infinity) return v+' is '+(A.loInc?'at least ':'greater than ')+fmtInt(roundT(A.lo))+'.';
  if(A.lo===-Infinity) return v+' is '+(A.hiInc?'at most ':'less than ')+fmtInt(roundT(A.hi))+'.';
  var loPhrase=(A.loInc?'at least ':'greater than ')+fmtInt(roundT(A.lo));
  var hiPhrase=(A.hiInc?'at most ':'less than ')+fmtInt(roundT(A.hi));
  return v+' is '+loPhrase+' and '+hiPhrase+'.';
}
function updateVerbal(inputId,verbalId,axis){
  var input=document.getElementById(inputId), out=document.getElementById(verbalId);
  if(!input||!out) return;
  var msg=verbalize(parseField(input.value.trim()),axis);
  if(msg){ out.textContent=msg; out.classList.add('ready'); }
  else{ out.textContent='Type or drag '+(axis==='x'?'\u2194\ufe0f':'\u2195\ufe0f')+' to see what it means'; out.classList.remove('ready'); }
}

/* ---------- canvas sizing + draw (identical machinery to A.2A) ---------- */
function ensureCanvasSize(){
  if(!canvas) return false;
  var dpr=Math.max(1,Math.floor(window.devicePixelRatio||1));
  var cssSize=Math.min(canvas.parentElement.clientWidth,480);
  if(cssSize<=0) return false;
  var target=Math.floor(cssSize*dpr);
  if(canvas.width!==target){
    canvas.style.width=cssSize+'px'; canvas.style.height=cssSize+'px';
    canvas.width=target; canvas.height=target;
    c.setTransform(1,0,0,1,0,0); c.scale(dpr,dpr);
  }
  return true;
}
function withCanvasReady(fn,tries){
  tries=tries||0;
  if(ensureCanvasSize()&&canvas.clientWidth>0){ fn(); return; }
  if(tries<12){ requestAnimationFrame(function(){ withCanvasReady(fn,tries+1); }); } else { fn(); }
}
function draw(){
  if(!canvas||!c) return;
  c.save(); c.resetTransform(); c.clearRect(0,0,canvas.width,canvas.height); c.restore();
  drawGrid();
  if(curG) drawGraph(curG,'#8e78ff');
  if(reveal&&curG){
    drawBand(curG.domainAnswer,'x','#f4c431',true);
    drawBand(curG.rangeAnswer ,'y','#f4c431',true);
  }
  if(domainBand.visible&&domainBand.mode!=='none') drawBand(domainBand,'x','#ff5577');
  if(rangeBand.visible &&rangeBand.mode!=='none')  drawBand(rangeBand ,'y','#ff5577');
  drawAnchorLabels();
}
function drawGrid(){
  var W=canvas.clientWidth, H=canvas.clientHeight;
  if(CFG.grid){
    c.save(); c.strokeStyle='#e9eefb'; c.lineWidth=1;
    for(var x=CFG.xmin;x<=CFG.xmax+EPS;x+=CFG.tick){ var px=ux(x); c.beginPath(); c.moveTo(px,0); c.lineTo(px,H); c.stroke(); }
    for(var y=CFG.ymin;y<=CFG.ymax+EPS;y+=CFG.tick){ var py=uy(y); c.beginPath(); c.moveTo(0,py); c.lineTo(W,py); c.stroke(); }
    c.restore();
  }
  c.save();
  var ax=ux(0), ay=uy(0);
  c.strokeStyle='#0b52ff'; c.lineWidth=2;
  c.beginPath(); c.moveTo(ax,0); c.lineTo(ax,H); c.stroke();
  c.beginPath(); c.moveTo(0,ay); c.lineTo(W,ay); c.stroke();
  c.fillStyle='rgba(15,35,64,.95)'; c.font='900 16px ui-rounded, system-ui';
  c.shadowColor='rgba(255,255,255,.9)'; c.shadowBlur=6;
  c.textAlign='center'; c.textBaseline='top';
  var yLabel=(ay>H-26)? ay-22 : ay+6;
  for(var xx=Math.ceil(CFG.xmin/2)*2; xx<=CFG.xmax; xx+=2){ if(Math.abs(xx)<EPS) continue; c.fillText(xx, ux(xx), Math.max(2,Math.min(H-20,yLabel))); }
  var leftSide=ax>26; c.textAlign=leftSide?'right':'left'; c.textBaseline='middle';
  var xTickCol=Math.max(8,Math.min(W-8, ax+(leftSide?-8:8)));
  for(var yy=Math.ceil(CFG.ymin/2)*2; yy<=CFG.ymax; yy+=2){ if(Math.abs(yy)<EPS) continue; c.fillText(yy, xTickCol, uy(yy)); }
  c.font='900 18px ui-rounded, system-ui';
  c.textAlign=leftSide?'left':'right'; c.textBaseline='top';
  gridYLabelX=Math.max(12,Math.min(W-12, ax+26*(leftSide?1:-1)));
  c.fillText('(y)', gridYLabelX, 10);
  c.textAlign='left'; c.textBaseline='bottom';
  c.fillText('(x)', Math.max(0,W-30), Math.max(16,Math.min(H-6,ay-6)));
  c.restore();
}
function drawGraph(g,color){
  c.save(); c.strokeStyle=color; c.lineWidth=4; c.lineJoin='round'; c.lineCap='round';
  switch(g.type){
    case 'quad-full': {
      var step=(CFG.xmax-CFG.xmin)/200; c.beginPath();
      for(var x=CFG.xmin; x<=CFG.xmax; x+=step){ var y=g.a*(x-g.h)*(x-g.h)+g.k, px=ux(x), py=uy(y); (x===CFG.xmin?c.moveTo(px,py):c.lineTo(px,py)); }
      c.stroke();
      break;
    }
    case 'quad-seg': {
      var step2=(g.R-g.L)/160; c.beginPath();
      for(var x2=g.L; x2<=g.R+EPS; x2+=step2){ var y2=g.a*(x2-g.h)*(x2-g.h)+g.k, px2=ux(x2), py2=uy(y2); (x2===g.L?c.moveTo(px2,py2):c.lineTo(px2,py2)); }
      c.stroke();
      drawEnd(ux(g.L),uy(g.a*(g.L-g.h)*(g.L-g.h)+g.k),g.cL);
      drawEnd(ux(g.R),uy(g.a*(g.R-g.h)*(g.R-g.h)+g.k),g.cR);
      break;
    }
    case 'quad-ray': {
      var step3=(CFG.xmax-CFG.xmin)/200, xStart=g.h, xEnd=g.right?CFG.xmax:CFG.xmin;
      c.beginPath();
      for(var x3=xStart; g.right? x3<=xEnd : x3>=xEnd; x3+= g.right? step3 : -step3){ var y3=g.a*(x3-g.h)*(x3-g.h)+g.k, px3=ux(x3), py3=uy(y3); (x3===xStart?c.moveTo(px3,py3):c.lineTo(px3,py3)); }
      c.stroke();
      drawEnd(ux(g.h),uy(g.k),g.closed);
      drawArrowTowards(ux(xEnd),uy(g.a*(xEnd-g.h)*(xEnd-g.h)+g.k), g.right?1:-1);
      break;
    }
  }
  c.restore();
}
function drawEnd(x,y,closed){
  var r=handleRadiusPx;
  c.save();
  c.beginPath(); c.arc(x,y,r+2,0,Math.PI*2); c.strokeStyle='rgba(255,255,255,0.95)'; c.lineWidth=4; c.stroke();
  if(closed){
    c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.fillStyle='#ff5566'; c.fill();
    c.beginPath(); c.arc(x,y,r-1,0,Math.PI*2); c.strokeStyle='rgba(255,255,255,0.9)'; c.lineWidth=2; c.stroke();
  } else {
    c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.strokeStyle='#ff5566'; c.lineWidth=4; c.stroke();
  }
  c.restore();
}
function drawArrowTowards(x,y,dir){
  c.save(); c.fillStyle='#1a60ff'; c.beginPath(); var s=10;
  if(dir>0){ c.moveTo(x,y); c.lineTo(x-s,y-s); c.lineTo(x-s,y+s); }
  else{ c.moveTo(x,y); c.lineTo(x+s,y-s); c.lineTo(x+s,y+s); }
  c.closePath(); c.fill(); c.restore();
}
function drawBand(b,axis,color,asAnswer){
  c.save(); c.setLineDash([8,6]); c.lineWidth=2; c.strokeStyle=color;
  if(b.mode==='double'||asAnswer===true){
    if(!asAnswer){
      c.globalAlpha=0.18; c.fillStyle=color;
      if(axis==='x'){ var x1f=ux(b.lo), x2f=ux(b.hi); c.fillRect(Math.min(x1f,x2f),0,Math.abs(x2f-x1f),canvas.clientHeight); }
      else{ var y1f=uy(b.lo), y2f=uy(b.hi); c.fillRect(0,Math.min(y1f,y2f),canvas.clientWidth,Math.abs(y2f-y1f)); }
      c.globalAlpha=1;
    }
    if(axis==='x'){
      var x1=ux((b.mode==='double')?b.lo:b.value), x2=ux((b.mode==='double')?b.hi:b.value);
      c.beginPath(); c.moveTo(x1,0); c.lineTo(x1,canvas.clientHeight); c.moveTo(x2,0); c.lineTo(x2,canvas.clientHeight); c.stroke();
      if(b.mode==='double'){ drawEnd(x1,uy(0),b.loInc); drawEnd(x2,uy(0),b.hiInc); }
    } else {
      var y1=uy((b.mode==='double')?b.lo:b.value), y2=uy((b.mode==='double')?b.hi:b.value);
      c.beginPath(); c.moveTo(0,y1); c.lineTo(canvas.clientWidth,y1); c.moveTo(0,y2); c.lineTo(canvas.clientWidth,y2); c.stroke();
      if(b.mode==='double'){ drawEnd(ux(0),y1,b.loInc); drawEnd(ux(0),y2,b.hiInc); }
    }
  }
  if(b.mode==='single'&&!asAnswer){
    if(axis==='x'){
      var x=ux(b.value);
      c.globalAlpha=0.18; c.fillStyle=color;
      var fillW=(b.dir>0? canvas.clientWidth-x : x);
      c.fillRect(b.dir>0?x:0, 0, Math.max(0,fillW), canvas.clientHeight);
      c.globalAlpha=1;
      c.beginPath(); c.moveTo(x,0); c.lineTo(x,canvas.clientHeight); c.stroke();
      drawEnd(x,uy(0),b.inc);
    } else {
      var y=uy(b.value);
      c.globalAlpha=0.18; c.fillStyle=color;
      c.fillRect(0, b.dir>0?0:y, canvas.clientWidth, b.dir>0? y : (canvas.clientHeight-y));
      c.globalAlpha=1;
      c.beginPath(); c.moveTo(0,y); c.lineTo(canvas.clientWidth,y); c.stroke();
      drawEnd(ux(0),y,b.inc);
    }
  }
  c.restore();
}
function drawZenNum(text,x,y,align){
  c.save(); c.font='800 30px ui-rounded, system-ui'; c.textAlign=align||'center'; c.textBaseline='middle';
  c.shadowColor='rgba(255,255,255,.9)'; c.shadowBlur=9; c.fillStyle='rgba(15,35,64,.95)';
  c.fillText(String(text),x,y); c.restore();
}
function drawAnchorLabels(){
  var baseTop=24, rightX=canvas.clientWidth-24;
  if(domainBand.visible&&domainBand.mode!=='none'){
    if(domainBand.mode==='double'){
      var xLo=Math.max(24,Math.min(canvas.clientWidth-24,ux(domainBand.lo)));
      var xHi=Math.max(24,Math.min(canvas.clientWidth-24,ux(domainBand.hi)));
      var avoid=(gridYLabelX==null)?-9999:gridYLabelX;
      drawZenNum(roundT(domainBand.lo), xLo, (Math.abs(xLo-avoid)<26)?baseTop+18:baseTop, 'center');
      drawZenNum(roundT(domainBand.hi), xHi, (Math.abs(xHi-avoid)<26)?baseTop+18:baseTop, 'center');
    } else {
      var x=Math.max(24,Math.min(canvas.clientWidth-24,ux(domainBand.value)));
      var avoid2=(gridYLabelX==null)?-9999:gridYLabelX;
      drawZenNum(roundT(domainBand.value), x, (Math.abs(x-avoid2)<26)?baseTop+18:baseTop, 'center');
    }
  }
  if(rangeBand.visible&&rangeBand.mode!=='none'){
    if(rangeBand.mode==='double'){
      drawZenNum(roundT(rangeBand.lo), rightX, Math.max(22,Math.min(canvas.clientHeight-22,uy(rangeBand.lo))), 'right');
      drawZenNum(roundT(rangeBand.hi), rightX, Math.max(22,Math.min(canvas.clientHeight-22,uy(rangeBand.hi))), 'right');
    } else {
      drawZenNum(roundT(rangeBand.value), rightX, Math.max(22,Math.min(canvas.clientHeight-22,uy(rangeBand.value))), 'right');
    }
  }
}

/* ---------- pointer interactions (drag handles / tap to toggle) ---------- */
function handleHit(px,py){
  function test(x,y,which){ return Math.hypot(px-x,py-y)<=hitRadiusPx?which:null; }
  if(domainBand.visible&&domainBand.mode!=='none'){
    if(domainBand.mode==='double'){
      var y0=uy(0), h=test(ux(domainBand.lo),y0,'DLO')||test(ux(domainBand.hi),y0,'DHI');
      if(h) return h;
    } else {
      var hS=test(ux(domainBand.value),uy(0),'DS'); if(hS) return hS;
      if(Math.abs(px-ux(domainBand.value))<=lineHitPx) return 'DLINE';
    }
  }
  if(rangeBand.visible&&rangeBand.mode!=='none'){
    if(rangeBand.mode==='double'){
      var x0=ux(0), h2=test(x0,uy(rangeBand.lo),'RLO')||test(x0,uy(rangeBand.hi),'RHI');
      if(h2) return h2;
    } else {
      var h3=test(ux(0),uy(rangeBand.value),'RS'); if(h3) return h3;
      if(Math.abs(py-uy(rangeBand.value))<=lineHitPx) return 'RLINE';
    }
  }
  return null;
}
function labDown(e){
  canvas.setPointerCapture(e.pointerId);
  var px=e.offsetX, py=e.offsetY;
  dragStart={x:px,y:py};
  var hh=handleHit(px,py);
  if(hh){ tool='drag'; activeDrag.which=hh; activeDrag.moved=false; }
}
function labMove(e){
  if(tool!=='drag') return;
  var px=e.offsetX, py=e.offsetY;
  activeDrag.moved=Math.hypot(px-dragStart.x,py-dragStart.y)>tapThreshold;
  if(activeDrag.which==='DLO') domainBand.lo=clampN(roundT(wx(px)),CFG.xmin,CFG.xmax);
  if(activeDrag.which==='DHI') domainBand.hi=clampN(roundT(wx(px)),CFG.xmin,CFG.xmax);
  if(activeDrag.which==='RLO') rangeBand.lo=clampN(roundT(wy(py)),CFG.ymin,CFG.ymax);
  if(activeDrag.which==='RHI') rangeBand.hi=clampN(roundT(wy(py)),CFG.ymin,CFG.ymax);
  if(activeDrag.which==='DS')  domainBand.value=clampN(roundT(wx(px)),CFG.xmin,CFG.xmax);
  if(activeDrag.which==='RS')  rangeBand.value=clampN(roundT(wy(py)),CFG.ymin,CFG.ymax);
  syncInputsFromBands();
  draw();
}
function labUp(e){
  canvas.releasePointerCapture(e.pointerId);
  if(tool!=='drag') return;
  if(!activeDrag.moved){
    var isAlt=e.altKey||e.metaKey||e.ctrlKey;
    if(activeDrag.which==='DLO') domainBand.loInc=!domainBand.loInc;
    if(activeDrag.which==='DHI') domainBand.hiInc=!domainBand.hiInc;
    if(activeDrag.which==='RLO') rangeBand.loInc=!rangeBand.loInc;
    if(activeDrag.which==='RHI') rangeBand.hiInc=!rangeBand.hiInc;
    if(activeDrag.which==='DS'){ if(isAlt) domainBand.dir*=-1; else domainBand.inc=!domainBand.inc; }
    if(activeDrag.which==='RS'){ if(isAlt) rangeBand.dir*=-1; else rangeBand.inc=!rangeBand.inc; }
    if(activeDrag.which==='DLINE') domainBand.dir*=-1;
    if(activeDrag.which==='RLINE') rangeBand.dir*=-1;
    syncInputsFromBands();
  }
  tool='idle'; draw();
}

/* ---------- CSV coach ---------- */
function parseLabCSV(text){
  var rows=[], i=0, field='', rec=[], inQ=false;
  function pushField(){ rec.push(field); field=''; }
  function pushRec(){ if(rec.length){ rows.push(rec); rec=[]; } }
  while(i<text.length){
    var ch=text[i++];
    if(inQ){
      if(ch==='"'&&text[i]==='"'){ field+='"'; i++; }
      else if(ch==='"'){ inQ=false; }
      else field+=ch;
    } else {
      if(ch==='"'){ inQ=true; }
      else if(ch===','){ pushField(); }
      else if(ch==='\n'){ pushField(); pushRec(); }
      else if(ch==='\r'){ /* skip */ }
      else field+=ch;
    }
  }
  if(field.length>0||rec.length){ pushField(); pushRec(); }
  if(!rows.length) return [];
  var header=rows.shift().map(function(h){ return h.trim(); });
  return rows.filter(function(r){ return r.length===header.length; }).map(function(r){
    var obj={}; header.forEach(function(h,idx){ obj[h]=r[idx]; }); return obj;
  });
}
var COACH=(function(){
  var el=document.getElementById('coachMessages');
  var data=parseLabCSV(el?el.textContent.trim():'');
  var rows=data.map(function(r){
    return { tip_id:r.tip_id, priority:parseInt(r.priority||'999',10),
      applies_to:(r.applies_to||'both'),
      condition:r.condition, message:r.message };
  });
  function find(condition,applies){
    var pool=rows.filter(function(r){
      return r.condition===condition &&
        (r.applies_to==='both'||r.applies_to===applies);
    });
    pool.sort(function(a,b){ return a.priority-b.priority; });
    return pool;
  }
  function fill(template,tokens){
    return template.replace(/\{\{\s*([a-zA-Z0-9_]+)\s*\}\}/g,function(_,k){
      return (k in tokens)?String(tokens[k]):'{{'+k+'}}';
    });
  }
  return { find:find, fill:fill };
})();
function runCoach(side,A,U,list){
  var varChar=(side==='domain'?'x':'y');
  var isHalf=(A.lo===-Infinity||A.hi===Infinity);
  var isAll=(A.lo===-Infinity&&A.hi===Infinity);
  var tips=[];
  function pushBy(condition,tokens){
    COACH.find(condition,side).forEach(function(r){
      tips.push({ id:r.tip_id, prio:r.priority, msg:COACH.fill(r.message,tokens||{}) });
    });
  }
  function appendTips(){
    tips.sort(function(a,b){ return a.prio-b.prio; });
    var dedup={}, count=0;
    for(var i=0;i<tips.length;i++){
      var t=tips[i]; if(dedup[t.id]) continue; dedup[t.id]=1;
      var li=document.createElement('li');
      li.className=(side==='domain')?'dom':'rng';
      li.textContent=(side==='domain'?'(Domain) ':'(Range) ')+t.msg;
      list.appendChild(li);
      if(++count>=3) break;
    }
  }
  if(!U){ pushBy('parse_failed'); appendTips(); return; }
  if(U._var&&U._var!==varChar){
    pushBy(side==='domain'?'used_y_instead_of_x':'used_x_instead_of_y');
  }
  var U_half=(U.lo===-Infinity||U.hi===Infinity);
  var U_all=(U.lo===-Infinity&&U.hi===Infinity);
  var numsMatchTwo=(!isHalf&&!U_half&&Math.abs(A.lo-U.lo)<1e-6&&Math.abs(A.hi-U.hi)<1e-6);
  /* one-sided: compare the finite boundary of each, whichever side it sits on,
     so a right number with a flipped direction still earns the Direction tip */
  var aFin=(A.hi===Infinity)?A.lo:A.hi, uFin=(U.hi===Infinity)?U.lo:U.hi;
  var numsMatchOne=(isHalf&&!isAll&&U_half&&!U_all&&isFinite(uFin)&&Math.abs(aFin-uFin)<1e-6);
  if(isHalf&&!isAll){ if(!numsMatchOne) pushBy('ray_or_full_one_number',{var:varChar}); }
  else if(!isAll){
    if(!numsMatchTwo) pushBy('segment_two_numbers');
    /* parabola segment only: the vertex is a hidden third value that can
       silently become the true min/max \u2014 nudge the student to check it */
    if(side==='range' && curG && curG.type==='quad-seg' && curG.L<curG.h && curG.h<curG.R){
      pushBy('parabola_segment_vertex_inside');
    }
  }
  if(isHalf&&numsMatchOne){
    var ansRightOrUp=(A.hi===Infinity);
    if((U.hi===Infinity)!==ansRightOrUp){
      if(side==='domain') pushBy('inequality_direction_mismatch',{left_or_right:ansRightOrUp?'right':'left'});
      else pushBy('inequality_direction_mismatch',{up_or_down:ansRightOrUp?'up':'down'});
    }
  }
  if(numsMatchTwo){
    if(!!A.loInc!==!!U.loInc) pushBy(A.loInc?'endpoint_should_be_included':'endpoint_should_be_excluded',{var:varChar,a:A.lo});
    if(!!A.hiInc!==!!U.hiInc) pushBy(A.hiInc?'endpoint_should_be_included':'endpoint_should_be_excluded',{var:varChar,a:A.hi});
  }
  if(numsMatchOne){
    var aVal=(A.hi===Infinity?A.lo:A.hi);
    var needInc=(A.hi===Infinity?A.loInc:A.hiInc);
    var hasInc=(U.hi===Infinity?U.loInc:U.hiInc);
    if(!!needInc!==!!hasInc) pushBy(needInc?'endpoint_should_be_included':'endpoint_should_be_excluded',{var:varChar,a:aVal});
  }
  if(isAll){ if(!(U.lo===-Infinity&&U.hi===Infinity)) pushBy('answer_is_all_reals'); }
  else{
    if(isHalf&&!U_half) pushBy('answer_is_one_sided',{var:varChar});
    if(!isHalf&&U_half) pushBy('answer_is_two_sided',{var:varChar});
  }
  if(isHalf&&!isAll) pushBy(side==='domain'?'extends_left_or_right_infinite':'extends_up_or_down_infinite');
  if(U.lo>U.hi) pushBy('bounds_reversed',{var:varChar});
  appendTips();
}

/* ---------- parse the student's typed notation ---------- */
function parseField(text){
  if(!text) return null;
  var t=text.trim().replace(/\u2013|\u2212/g,'-');
  if(/all\s+real/i.test(t)||/\u211d/.test(t)) return I.all();
  var m=t.match(/^([^xy]+?)\s*(\u2264|<)\s*([xy])\s*(\u2264|<)\s*([^xy]+)$/i);
  if(m){ var out2=I.withEnds(normNum(m[1]),normNum(m[5]),m[2]==='\u2264',m[4]==='\u2264'); out2._var=m[3].toLowerCase(); return out2; }
  m=t.match(/^([xy])\s*(\u2265|>|\u2264|<)\s*(\S+)$/i);
  if(m){
    var varCh=m[1].toLowerCase(), op=m[2], v=normNum(m[3]);
    var out=(op==='\u2265'||op==='>')? I.half(v,op==='\u2265',Infinity,true) : I.half(-Infinity,true,v,op==='\u2264');
    out._var=varCh; return out;
  }
  return null;
}
function normNum(s){
  s=String(s).trim().replace('\u221e','Infinity');
  if(/Infinity/i.test(s)) return s.charAt(0)==='-'?-Infinity:Infinity;
  return parseFloat(s);
}

/* =====================================================================
   GRAPH HELPER — signed-grid parabola (adapted from plot(), Section 6A)
   ===================================================================== */
function plotParab(o){
  o=o||{};
  var Rg=o.Rg||6, S=Math.round(288/(2*Rg)), W=2*Rg*S, H=2*Rg*S, i;
  function X(x){ return (x+Rg)*S; }
  function Y(y){ return (Rg-y)*S; }
  var s='<svg viewBox="0 0 '+W+' '+H+'" width="300" height="300" class="grid" xmlns="http://www.w3.org/2000/svg">';
  for(i=-Rg;i<=Rg;i++){
    s+='<line x1="'+X(i)+'" y1="0" x2="'+X(i)+'" y2="'+H+'" stroke="#e9eefb" stroke-width="1"/>';
    s+='<line x1="0" y1="'+Y(i)+'" x2="'+W+'" y2="'+Y(i)+'" stroke="#e9eefb" stroke-width="1"/>';
  }
  s+='<line x1="'+X(0)+'" y1="0" x2="'+X(0)+'" y2="'+H+'" stroke="#9db4e8" stroke-width="2"/>';
  s+='<line x1="0" y1="'+Y(0)+'" x2="'+W+'" y2="'+Y(0)+'" stroke="#9db4e8" stroke-width="2"/>';
  for(i=-Rg;i<=Rg;i+=2){ if(i===0) continue;
    s+='<text x="'+X(i)+'" y="'+(Y(0)+14)+'" font-size="11" font-weight="700" fill="#5b6f96" text-anchor="middle">'+i+'</text>';
    s+='<text x="'+(X(0)-6)+'" y="'+(Y(i)+4)+'" font-size="11" font-weight="700" fill="#5b6f96" text-anchor="end">'+i+'</text>';
  }
  /* sample the parabola y = a(x-h)^2 + k, breaking the polyline where it exits the grid */
  var a=o.a, h=o.h, k=o.k, segs=[], cur=[], x, y;
  for(x=-Rg; x<=Rg+1e-9; x+=0.1){
    y=a*(x-h)*(x-h)+k;
    if(y<=Rg+0.6 && y>=-Rg-0.6){ cur.push(X(x)+','+Y(Math.max(-Rg-0.6,Math.min(Rg+0.6,y)))); }
    else { if(cur.length){ segs.push(cur.join(' ')); cur=[]; } }
  }
  if(cur.length) segs.push(cur.join(' '));
  segs.forEach(function(pl){ s+='<polyline points="'+pl+'" fill="none" stroke="'+(o.color||'#8e78ff')+'" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>'; });
  (o.points||[]).forEach(function(P){
    s+='<circle cx="'+X(P.x)+'" cy="'+Y(P.y)+'" r="5.5" fill="'+(P.open?'#fff':(P.color||'#e5484d'))+'" stroke="'+(P.color||'#e5484d')+'" stroke-width="3"/>';
    if(P.label) s+='<text x="'+(X(P.x)+9)+'" y="'+(Y(P.y)-8)+'" font-size="12" font-weight="900" fill="'+(P.color||'#e5484d')+'">'+P.label+'</text>';
  });
  (o.labels||[]).forEach(function(t,idx){
    s+='<text x="'+(W-8)+'" y="'+(16+idx*16)+'" font-size="12" font-weight="900" fill="'+t.color+'" text-anchor="end">'+t.text+'</text>';
  });
  return s+'</svg>';
}

/* =====================================================================
   QUADRATIC DISPLAY HELPERS (pretty-print forms; integer coeffs)
   ===================================================================== */
function xMinusH(h){
  if(h===0) return 'x';
  return h>0 ? ('x '+MIN+' '+h) : ('x + '+Math.abs(h));
}
function leadStr(a){ return a===1?'':(a===-1?MIN:fmtInt(a)); }
function vertexFormHTML(a,h,k){
  var s='f(x) = '+leadStr(a)+'('+xMinusH(h)+')<sup>2</sup>';
  if(k>0) s+=' + '+k; else if(k<0) s+=' '+MIN+' '+Math.abs(k);
  return s;
}
function standardFormHTML(a,b,c){
  var s='f(x) = '+leadStr(a)+'x<sup>2</sup>';
  if(b!==0) s += (b>0?' + ':' '+MIN+' ') + (Math.abs(b)===1?'':Math.abs(b)) + 'x';
  if(c!==0) s += (c>0?' + ':' '+MIN+' ') + Math.abs(c);
  return s;
}
function factoredFormHTML(a,r1,r2){
  return 'f(x) = '+leadStr(a)+'('+xMinusH(r1)+')('+xMinusH(r2)+')';
}

function L(t){ return '<div style="font-size:14px;font-weight:900;color:var(--muted);margin:10px 0 4px">'+t+'</div>'; }
function val(id){ var el=document.getElementById(id); return el?el.value:''; }

/* ---------- A.6B : Write vertex form / convert to standard form ---------- */
var a6bMode='mix';
function genA6B(){
  var kind = a6bMode==='mix' ? rc(['write','expand']) : a6bMode;
  var a = rc([1,-1,2,-2,3,-3]);
  var k = ri(-5,5);
  if(kind==='write'){
    var h = ri(-4,4);
    var d = rnz(-3,3);
    var px = h + d, py = a*d*d + k;
    return {kind:kind, a:a, h:h, k:k, px:px, py:py};
  } else {
    var h2 = rnz(-4,4);                     /* nonzero h keeps the expansion tidy */
    var b = -2*a*h2, c = a*h2*h2 + k;
    return {kind:kind, a:a, h:h2, k:k, b:b, c:c};
  }
}
function promptA6B(p){
  var body;
  if(p.kind==='write'){
    body='A parabola has vertex <span class="given">('+fmtInt(p.h)+', '+fmtInt(p.k)+')</span> and passes through the point '+
      '<span class="given">('+fmtInt(p.px)+', '+fmtInt(p.py)+')</span>.<br>'+
      'Write its equation in <b>vertex form</b> &nbsp;f(x) = a(x '+MIN+' h)<sup>2</sup> + k.';
  } else {
    body='Rewrite the function below in <b>standard form</b> &nbsp;f(x) = ax<sup>2</sup> + bx + c.'+
      '<div class="given">'+vertexFormHTML(p.a,p.h,p.k)+'</div>';
  }
  return segWrap('TASK','a6bSeg',a6bMode,[['mix','Mixed'],['write','Write vertex form'],['expand','Convert to standard']])+body;
}
function answerA6B(p){
  if(p.kind==='write'){
    return '<div class="answer"><span>f(x) =</span>'+inBox('a6b_a')+
      '<span>( x '+MIN+'</span>'+inBox('a6b_h')+'<span>)<sup>2</sup> +</span>'+inBox('a6b_k')+'</div>'+
      '<div class="lbl" style="font-size:13px;color:var(--muted);font-weight:800;margin-top:4px">Entries may be negative \u2014 just type the minus sign, e.g. '+MIN+'4.</div>'+
      sharedKbdHTML();
  }
  return '<div class="answer"><span>f(x) =</span>'+inBox('a6b_ea')+
    '<span>x<sup>2</sup> +</span>'+inBox('a6b_eb')+'<span>x +</span>'+inBox('a6b_ec')+'</div>'+
    '<div class="lbl" style="font-size:13px;color:var(--muted);font-weight:800;margin-top:4px">Entries may be negative \u2014 just type the minus sign, e.g. '+MIN+'4.</div>'+
    sharedKbdHTML();
}
function readA6B(p){
  if(p.kind==='write'){
    var a=parseRat(val('a6b_a')), h=parseRat(val('a6b_h')), k=parseRat(val('a6b_k'));
    return (a&&h&&k)?{a:a,h:h,k:k}:null;
  }
  var ea=parseRat(val('a6b_ea')), eb=parseRat(val('a6b_eb')), ec=parseRat(val('a6b_ec'));
  return (ea&&eb&&ec)?{a:ea,b:eb,c:ec}:null;
}
function checkA6B(p,ans){
  if(p.kind==='write'){
    return req(ans.a,rint(p.a)) && req(ans.h,rint(p.h)) && req(ans.k,rint(p.k));
  }
  return req(ans.a,rint(p.a)) && req(ans.b,rint(p.b)) && req(ans.c,rint(p.c));
}
function stepsA6B(p){
  if(p.kind==='write'){
    var d=p.px-p.h;
    var s='<span class="st">1. The vertex ('+fmtInt(p.h)+', '+fmtInt(p.k)+') gives h = '+fmtInt(p.h)+' and k = '+fmtInt(p.k)+'.</span>';
    s+='<span class="st">2. Substitute the point ('+fmtInt(p.px)+', '+fmtInt(p.py)+'):  '+fmtInt(p.py)+' = a('+fmtInt(p.px)+' '+MIN+' '+fmtInt(p.h)+')<sup>2</sup> + '+fmtInt(p.k)+'.</span>';
    s+='<span class="st">3. Simplify: '+fmtInt(p.py)+' = a('+fmtInt(d)+')<sup>2</sup> + '+fmtInt(p.k)+' = '+(d*d)+'a + '+fmtInt(p.k)+', so a = '+fmtInt(p.a)+'.</span>';
    s+='<span class="st final">'+vertexFormHTML(p.a,p.h,p.k)+'</span>';
    return s;
  }
  var m2h=-2*p.h, hh=p.h*p.h;
  var s2='<span class="st">1. Expand the square: ('+xMinusH(p.h)+')<sup>2</sup> = x<sup>2</sup>'+sgn(m2h)+'x + '+hh+'.</span>';
  s2+='<span class="st">2. Multiply every term by a = '+fmtInt(p.a)+':  x<sup>2</sup> term \u2192 '+leadStr(p.a)+'x<sup>2</sup>,  x term \u2192 '+fmtInt(p.b)+'x,  constant \u2192 '+fmtInt(p.a*hh)+'.</span>';
  s2+='<span class="st">3. Add k = '+fmtInt(p.k)+' to the constant: '+fmtInt(p.a*hh)+sgn(p.k)+' = '+fmtInt(p.c)+'.</span>';
  s2+='<span class="st final">'+standardFormHTML(p.a,p.b,p.c)+'</span>';
  return s2;
}
function hintsA6B(p){
  if(p.kind==='write'){
    return ['The vertex (h, k) drops straight into f(x) = a(x '+MIN+' h)<sup>2</sup> + k.',
            'Substitute the extra point for x and f(x), then solve for a.',
            'a = (y '+MIN+' k) / (x '+MIN+' h)<sup>2</sup>.'];
  }
  return ['Start by expanding (x '+MIN+' h)<sup>2</sup> = x<sup>2</sup> '+MIN+' 2hx + h<sup>2</sup>.',
          'Distribute a to every term, then add k to the constant.',
          'b = '+MIN+'2ah  and  c = ah<sup>2</sup> + k.'];
}

/* ---------- A.6C : Write a quadratic from its solutions / graph ---------- */
var a6cMode='mix';
function genA6C(){
  var form = a6cMode==='mix' ? rc(['factored','standard']) : a6cMode;
  var rep = rc(['solutions','graph']);
  var a, r1, r2;
  if(rep==='graph'){
    a = rc([1,-1]);
    do { r1=ri(-4,4); r2=ri(-4,4); } while(r1===r2 || Math.abs(r1-r2)>4 || Math.abs(r1+r2)>4);
  } else {
    a = rc([1,1,1,-1,2]);
    do { r1=ri(-5,5); r2=ri(-5,5); } while(r1===r2);
  }
  if(r1>r2){ var t=r1; r1=r2; r2=t; }
  var b=-a*(r1+r2), c=a*r1*r2;
  return {form:form, rep:rep, a:a, r1:r1, r2:r2, b:b, c:c};
}
function promptA6C(p){
  var body;
  if(p.rep==='graph'){
    body='The graph below shows a quadratic function with its x-intercepts marked. '+
      'Its leading coefficient has size 1 &mdash; use the way it opens to decide the sign of a. Write the function.'+
      plotParab({Rg:6, a:p.a, h:(p.r1+p.r2)/2, k:-p.a*Math.pow((p.r1-p.r2)/2,2), color:'#8e78ff',
        points:[{x:p.r1,y:0,label:'('+fmtInt(p.r1)+', 0)'},{x:p.r2,y:0,label:'('+fmtInt(p.r2)+', 0)'}]});
  } else {
    body='Write a quadratic function whose solutions (zeros) are '+
      '<span class="given">x = '+fmtInt(p.r1)+'</span> and <span class="given">x = '+fmtInt(p.r2)+'</span>, '+
      'with leading coefficient <span class="given">a = '+fmtInt(p.a)+'</span>.';
  }
  return segWrap('WRITE AS','a6cSeg',a6cMode,[['mix','Mixed'],['factored','Factored form'],['standard','Standard form']])+body;
}
function answerA6C(p){
  if(p.form==='factored'){
    return '<div class="answer"><span>f(x) =</span>'+inBox('a6c_a')+
      '<span>( x '+MIN+'</span>'+inBox('a6c_r1')+'<span>)( x '+MIN+'</span>'+inBox('a6c_r2')+'<span>)</span></div>'+
      sharedKbdHTML();
  }
  return '<div class="answer"><span>f(x) =</span>'+inBox('a6c_a')+
    '<span>x<sup>2</sup> +</span>'+inBox('a6c_b')+'<span>x +</span>'+inBox('a6c_c')+'</div>'+
    sharedKbdHTML();
}
function readA6C(p){
  if(p.form==='factored'){
    var a=parseRat(val('a6c_a')), r1=parseRat(val('a6c_r1')), r2=parseRat(val('a6c_r2'));
    return (a&&r1&&r2)?{a:a,r1:r1,r2:r2}:null;
  }
  var a2=parseRat(val('a6c_a')), b=parseRat(val('a6c_b')), c=parseRat(val('a6c_c'));
  return (a2&&b&&c)?{a:a2,b:b,c:c}:null;
}
function checkA6C(p,ans){
  if(p.form==='factored'){
    var okA=req(ans.a,rint(p.a));
    var okR=(req(ans.r1,rint(p.r1))&&req(ans.r2,rint(p.r2))) ||
            (req(ans.r1,rint(p.r2))&&req(ans.r2,rint(p.r1)));
    return okA && okR;
  }
  return req(ans.a,rint(p.a)) && req(ans.b,rint(p.b)) && req(ans.c,rint(p.c));
}
function stepsA6C(p){
  var s='<span class="st">1. Each solution becomes a factor:  x = '+fmtInt(p.r1)+' \u2192 ('+xMinusH(p.r1)+'),  x = '+fmtInt(p.r2)+' \u2192 ('+xMinusH(p.r2)+').</span>';
  s+='<span class="st">2. Attach the leading coefficient a = '+fmtInt(p.a)+':  '+factoredFormHTML(p.a,p.r1,p.r2)+'.</span>';
  if(p.form==='standard'){
    s+='<span class="st">3. Multiply out:  b = '+MIN+'a(r\u2081+r\u2082) = '+fmtInt(p.b)+',  c = a\u00b7r\u2081\u00b7r\u2082 = '+fmtInt(p.c)+'.</span>';
    s+='<span class="st final">'+standardFormHTML(p.a,p.b,p.c)+'</span>';
  } else {
    s+='<span class="st final">'+factoredFormHTML(p.a,p.r1,p.r2)+'</span>';
  }
  return s;
}
function hintsA6C(p){
  var h=['A solution x = r means (x '+MIN+' r) is a factor. Watch the sign: x = '+MIN+'3 gives (x + 3).'];
  if(p.rep==='graph') h.push('Read the two x-intercepts off the graph \u2014 those are the solutions. Opens up \u2192 a is positive; opens down \u2192 a is negative.');
  h.push('Multiply the two factors together, then multiply by the leading coefficient a.');
  h.push('For standard form: b = '+MIN+'a(r\u2081 + r\u2082) and c = a\u00b7r\u2081\u00b7r\u2082.');
  return h;
}

var current={se:SES[0], p:null, done:false, recorded:false, hintIdx:0, hintLogged:false};
var session={a:0,c:0};
var $=function(s){return document.querySelector(s);};

function stoneStats(id){
  return (window.Portal && Portal.skill) ? Portal.skill(id) : {progress:0, attempts:0, mastered:false};
}
function renderRail(){
  var host=$('#stones'); host.innerHTML='';
  SES.forEach(function(se){
    var st=stoneStats(se.id);
    var cls='stone'+(se===current.se?' active':'')+(st.mastered?' mastered':st.attempts?' started':'');
    var b=document.createElement('button');
    b.type='button'; b.className=cls;
    b.innerHTML='<span class="dot">'+(st.mastered?'\u2713':se.letter)+'</span>'+
      '<span><span class="nm">'+se.id+' \u00b7 '+se.short+'</span>'+
      '<span class="mini"><i style="width:'+Math.round(st.progress*100)+'%"></i></span></span>';
    b.addEventListener('click', function(){ current.se=se; newProblem(); });
    host.appendChild(b);
  });
}
function newProblem(){
  var se=current.se;
  current.p=se.gen(); current.done=false; current.recorded=false; current.hintIdx=0; current.hintLogged=false;
  $('#seTitle').innerHTML=se.title;
  $('#seBlurb').innerHTML=se.blurb;
  $('#seTag').textContent='TEKS '+se.id;
  $('#prompt').innerHTML=se.prompt(current.p);
  $('#answerArea').innerHTML=se.answerHTML(current.p);
  $('#fb').textContent=''; $('#fb').className='fb';
  $('#hintBox').className='note'; $('#hintBox').innerHTML='';
  $('#stepsBox').className='stepsBox'; $('#stepsBox').innerHTML='';
  $('#checkBtn').disabled=false;
  if(se.init) se.init(current.p);
  renderRail();
  var first=$('#answerArea input'); if(first) first.focus();
}
function onCheck(){
  if(current.done) return;
  var se=current.se, ans=se.read(current.p);
  if(!ans){
    $('#fb').className='fb bad';
    $('#fb').textContent=se.emptyMsg||'Fill in every box \u2014 fractions like 3/4 are fine.';
    return;
  }
  var ok=se.check(current.p, ans);
  if(se.allowRecheck){ if(ok) current.done=true; }
  else { current.done=true; $('#checkBtn').disabled=true; if(se.reveal) se.reveal(current.p); }
  if(!current.recorded){
    current.recorded=true;
    session.a++; if(ok) session.c++;
    $('#sesScore').textContent=session.c+' / '+session.a;
    if(window.Portal && Portal.record) Portal.record(se.id, ok);
  }
  $('#fb').className='fb '+(ok?'ok':'bad');
  $('#fb').textContent= ok?'Correct \u2713'
    : (se.allowRecheck?'Not quite \u2717 \u2014 read the tips, adjust, and check again.'
                      :'Not quite \u2717 \u2014 open the steps to see the path.');
  renderRail();
}
function logHintUse(){
  if(!current.hintLogged && window.Portal && Portal.hint){ Portal.hint(current.se.id); current.hintLogged=true; }
}
function onHint(){
  var hints=current.se.hints(current.p);
  var h=hints[Math.min(current.hintIdx, hints.length-1)];
  current.hintIdx++;
  var box=$('#hintBox'); box.classList.add('show');
  box.innerHTML += (box.innerHTML?'<br>':'')+'\u2022 '+h;
  logHintUse();
}
function onSteps(){
  var box=$('#stepsBox'); box.classList.add('show');
  box.innerHTML=current.se.steps(current.p);
  logHintUse();
}
$('#checkBtn').addEventListener('click', onCheck);
$('#hintBtn').addEventListener('click', onHint);
$('#stepsBtn').addEventListener('click', onSteps);
